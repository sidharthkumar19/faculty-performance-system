/* --- Style Block #3 --- */
/* ── Design tokens ─────────────────────────────────────────────── */
:root{
  --s-primary:       #1d4ed8;
  --s-primary-dk:    #1e3a9e;
  --s-primary-tint:  #eff6ff;
  --s-header:        #1e40af;
  --s-header-2:      #1e3a8a;

  --s-bg:            #f8fafc;
  --s-surface:       #ffffff;
  --s-border:        #e2e8f0;
  --s-border-strong: #cbd5e1;
  --s-ink:           #0f172a;
  --s-ink-2:         #334155;
  --s-ink-3:         #64748b;
  --s-ink-4:         #94a3b8;

  /* Accent tints (borders + tinted text only — no gradients on content) */
  --s-blue:      #2563eb;
  --s-green:     #10b981;
  --s-violet:    #8b5cf6;
  --s-amber:     #f59e0b;
  --s-rose:      #f43f5e;

  --s-blue-tint:   #eff6ff;
  --s-green-tint:  #ecfdf5;
  --s-violet-tint: #f5f3ff;
  --s-amber-tint:  #fffbeb;
  --s-rose-tint:   #fef2f2;

  --s-shadow-sm: 0 1px 2px rgba(15,23,42,.04);
  --s-shadow:    0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
  --s-shadow-md: 0 4px 12px rgba(15,23,42,.08);
  --s-shadow-btn:0 4px 12px rgba(29,78,216,.30);

  --s-trans: all 150ms ease-out;
}

/* ══════════════════════════════════════════════════════════════════
   GLOBAL — font + background
   ══════════════════════════════════════════════════════════════════ */
html, body, input, select, textarea, button{
  font-family: 'Manrope', system-ui, sans-serif !important;
}
body{
  background: var(--s-bg) !important;
  color: var(--s-ink) !important;
  font-weight: 500 !important;
  font-feature-settings: "ss01", "cv11";
}

/* Headings — Manrope 800 */
h1, h2, h3, h4, h5, h6,
.ph h2, .card-header h3, .rp-title, .ll-title,
.dash-chart-title, .stat-chart-title, .cat-chart-title,
.dash-last-label, .dash-hist-header h4{
  font-family: 'Manrope', system-ui, sans-serif !important;
  font-weight: 800 !important;
  color: var(--s-ink) !important;
  letter-spacing: -0.01em;
}

/* Secondary / muted text — Manrope 400 */
.muted, .slate, .ph p, .dash-chart-sub, .stat-chart-sub,
small, .small, .secondary, .dash-last-meta, .rch-chips{
  font-family: 'Manrope', system-ui, sans-serif !important;
  font-weight: 400 !important;
  color: var(--s-ink-3) !important;
}

/* Strong stays 700 */
strong, b{ font-weight: 700 !important; color: var(--s-ink) !important; }

/* Kill scrollbar accents from base */
::-webkit-scrollbar-thumb{ background: var(--s-border-strong) !important; }
::-webkit-scrollbar-thumb:hover{ background: var(--s-ink-4) !important; }

/* ══════════════════════════════════════════════════════════════════
   TOPBAR — the ONLY place a gradient is allowed
   ══════════════════════════════════════════════════════════════════ */
.topbar, #topbar, header.topbar{
  background: linear-gradient(90deg, var(--s-header) 0%, var(--s-header-2) 100%) !important;
  border-bottom: 1px solid rgba(255,255,255,.10) !important;
  box-shadow: 0 1px 3px rgba(15,23,42,.12) !important;
  color: #fff !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
}
.topbar *, #topbar *, header.topbar *{ color: #fff !important; }
.topbar .muted, .topbar .slate{ color: rgba(255,255,255,.72) !important; }
.topbar .brand, .topbar strong{ color: #fff !important; font-weight: 800 !important; }

/* The notification dropdown (.nb-panel) is a descendant of .topbar, so the
   rule above would force all its text to white — invisible on the white
   panel. Restore proper dark text inside the notification panel. */
.topbar .nb-panel,
.topbar .nb-panel *{ color: var(--text) !important; }
.topbar .nb-panel .nb-header h4{ color: var(--navy) !important; }
.topbar .nb-panel .nb-title{ color: var(--text) !important; font-weight: 600 !important; }
.topbar .nb-panel .nb-body{ color: var(--slate) !important; }
.topbar .nb-panel .nb-time,
.topbar .nb-panel .nb-footer span,
.topbar .nb-panel .nb-empty{ color: var(--slate-lt) !important; }
.topbar .nb-panel .nb-mark-all{ color: var(--gold-dk) !important; }
.topbar .nb-panel .nb-clear-all{ color: #991b1b !important; }

/* The dept-label pill is also a topbar descendant and needs its dark text
   preserved (white bg + dark text, islanded on the navy topbar). */
.topbar #sb-dept-label{ color: #0f172a !important; }

/* Topbar avatar */
.topbar .avatar, .user-avatar, .tb-avatar{
  background: rgba(255,255,255,.18) !important;
  border: 1px solid rgba(255,255,255,.25) !important;
  color: #fff !important;
  font-weight: 700 !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
}

/* Breadcrumb */
.breadcrumbs, #breadcrumb{ color: rgba(255,255,255,.85) !important; }
.breadcrumbs b, #breadcrumb b{ color: #fff !important; font-weight: 700 !important; }

/* ══════════════════════════════════════════════════════════════════
   SIDEBAR
   ══════════════════════════════════════════════════════════════════ */
.sidebar, #sidebar, aside.sidebar{
  background: var(--s-surface) !important;
  border-right: 1px solid var(--s-border) !important;
  box-shadow: none !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
}

/* Sidebar header bar uses the brand color */
.sidebar-header, .sidebar-top, .sidebar .brand-row, .brand-bar{
  background: var(--s-header) !important;
  color: #fff !important;
  padding: 16px 20px;
}
.sidebar-header *, .sidebar-top *, .sidebar .brand-row *{ color: #fff !important; }

/* Nav items */
.nitem{
  background: transparent !important;
  color: var(--s-ink-2) !important;
  border-radius: 8px !important;
  margin: 2px 8px !important;
  padding: 10px 12px !important;
  font-weight: 500 !important;
  border-left: 3px solid transparent !important;
  transition: var(--s-trans) !important;
}
.nitem:hover{
  background: #f1f5f9 !important;
  color: var(--s-ink) !important;
}

/* Active nav — blue tint + 3px left border */
.nitem.active{
  background: var(--s-primary-tint) !important;
  color: var(--s-primary) !important;
  font-weight: 600 !important;
  border-left: 3px solid var(--s-blue) !important;
  box-shadow: none !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
  padding-left: 12px !important;
}
.nitem.active .nlbl{ color: var(--s-primary) !important; font-weight: 600 !important; }
.nitem .ni{
  background: transparent !important;
  color: inherit !important;
}
.nitem.active .ni{
  background: transparent !important;
  color: var(--s-primary) !important;
}

/* ══════════════════════════════════════════════════════════════════
   CARDS — flat white with 1px border + 12px radius
   ══════════════════════════════════════════════════════════════════ */
.card,
.scard, .stat-chart-card, .dash-chart-card, .dash-last-card, .dash-hist-card,
.dash-deadline, .cat-chart,
.inst-card, .campus-card,
.rc, .prbox{
  background: var(--s-surface) !important;
  border: 1px solid var(--s-border) !important;
  border-radius: 12px !important;
  box-shadow: var(--s-shadow-sm) !important;
  color: var(--s-ink) !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
}
.card:hover, .inst-card:hover, .campus-card:hover{
  box-shadow: var(--s-shadow-md) !important;
  border-color: var(--s-border-strong) !important;
  transform: none !important;
  transition: var(--s-trans) !important;
}

/* Kill any decorative pseudo-elements inherited from previous layers */
.card::before, .card::after,
.inst-card::before, .inst-card::after,
.campus-card::before, .campus-card::after,
.scard::before, .scard::after{
  display: none !important;
}

/* ══════════════════════════════════════════════════════════════════
   KPI CARDS — colored LEFT border only (4px, rotating by position)
   ══════════════════════════════════════════════════════════════════ */
.kpi, .stat-kpi{
  background: var(--s-surface) !important;
  border: 1px solid var(--s-border) !important;
  border-radius: 12px !important;
  box-shadow: var(--s-shadow-sm) !important;
  padding: 20px 22px !important;
  position: relative;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
  transition: var(--s-trans) !important;
}
.kpi:hover, .stat-kpi:hover{
  box-shadow: var(--s-shadow-md) !important;
  border-color: var(--s-border-strong) !important;
  transform: none !important;
}
/* Remove any before/after accent bars from previous layers */
.kpi::before, .kpi::after, .stat-kpi::before, .stat-kpi::after{ display: none !important; }

/* 4px left border, rotating by position — blue, green, violet, amber, rose */
.kpi, .stat-kpi{ border-left: 4px solid var(--s-blue) !important; }
.kpi:nth-child(5n+1), .stat-kpi:nth-child(5n+1) { border-left-color: var(--s-blue)   !important; }
.kpi:nth-child(5n+2), .stat-kpi:nth-child(5n+2) { border-left-color: var(--s-green)  !important; }
.kpi:nth-child(5n+3), .stat-kpi:nth-child(5n+3) { border-left-color: var(--s-violet) !important; }
.kpi:nth-child(5n+4), .stat-kpi:nth-child(5n+4) { border-left-color: var(--s-amber)  !important; }
.kpi:nth-child(5n+5), .stat-kpi:nth-child(5n+5) { border-left-color: var(--s-rose)   !important; }

/* KPI typography */
.kpi-value, .stat-kpi-value{
  color: var(--s-ink) !important;
  font-family: 'Manrope', sans-serif !important;
  font-weight: 800 !important;
  letter-spacing: -0.02em;
}
.kpi-label, .stat-kpi-label{
  color: var(--s-ink-3) !important;
  font-weight: 500 !important;
}

/* KPI icon tile — soft tinted, no gradient */
.kpi-icon, .stat-kpi-icon{
  background: var(--s-blue-tint) !important;
  color: var(--s-blue) !important;
  border: 1px solid var(--s-border) !important;
  border-radius: 10px !important;
  width: 40px !important; height: 40px !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
}
.kpi-blue   .stat-kpi-icon{ background: var(--s-blue-tint)   !important; color: var(--s-blue)   !important; }
.kpi-green  .stat-kpi-icon{ background: var(--s-green-tint)  !important; color: #047857          !important; }
.kpi-amber  .stat-kpi-icon{ background: var(--s-amber-tint)  !important; color: #b45309          !important; }
.kpi-red    .stat-kpi-icon{ background: var(--s-rose-tint)   !important; color: #b91c1c          !important; }
.kpi-purple .stat-kpi-icon{ background: var(--s-violet-tint) !important; color: #6d28d9          !important; }
.kpi-navy   .stat-kpi-icon{ background: #f1f5f9               !important; color: var(--s-ink)    !important; }

/* scard accent dot → left border */
.scard{ border-left: 4px solid var(--s-border-strong) !important; }
.scard.sc-g{ border-left-color: var(--s-green)  !important; }
.scard.sc-a{ border-left-color: var(--s-amber)  !important; }
.scard.sc-r{ border-left-color: var(--s-rose)   !important; }
.scard.sc-p{ border-left-color: var(--s-violet) !important; }
.scard.sc-t{ border-left-color: var(--s-blue)   !important; }

/* ══════════════════════════════════════════════════════════════════
   INSTITUTION + CAMPUS CARDS — flat white, no decorations
   ══════════════════════════════════════════════════════════════════ */
.inst-card, .campus-card{
  background: var(--s-surface) !important;
  border: 1px solid var(--s-border) !important;
  border-radius: 12px !important;
  color: var(--s-ink) !important;
  box-shadow: var(--s-shadow-sm) !important;
  overflow: hidden;
}
.inst-card *, .campus-card *{ color: var(--s-ink) !important; }
.inst-card .muted, .campus-card .muted{ color: var(--s-ink-3) !important; }

/* ══════════════════════════════════════════════════════════════════
   INPUTS — flat white, blue focus ring
   ══════════════════════════════════════════════════════════════════ */
input[type=text], input[type=email], input[type=password], input[type=search],
input[type=number], input[type=date], input[type=tel], input:not([type]),
select, textarea{
  background: var(--s-surface) !important;
  border: 1px solid var(--s-border) !important;
  border-radius: 8px !important;
  color: var(--s-ink) !important;
  padding: 9px 12px !important;
  font-family: 'Manrope', sans-serif !important;
  font-weight: 500 !important;
  transition: var(--s-trans) !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
}
input:focus, select:focus, textarea:focus{
  outline: none !important;
  border-color: var(--s-primary) !important;
  box-shadow: 0 0 0 3px rgba(29,78,216,.15) !important;
  background: var(--s-surface) !important;
}
input::placeholder, textarea::placeholder{
  color: var(--s-ink-4) !important;
  font-weight: 400 !important;
}
input:disabled, select:disabled, textarea:disabled{
  background: #f8fafc !important;
  color: var(--s-ink-4) !important;
  border-color: var(--s-border) !important;
}

/* ══════════════════════════════════════════════════════════════════
   BUTTONS
   ══════════════════════════════════════════════════════════════════ */

/* Base button reset for non-primary variants */
.btn, button.btn, .btn-secondary, .btn-ghost, .btn-outline{
  background: var(--s-surface) !important;
  border: 1px solid var(--s-border) !important;
  color: var(--s-ink) !important;
  border-radius: 8px !important;
  font-family: 'Manrope', sans-serif !important;
  font-weight: 600 !important;
  padding: 8px 16px !important;
  transition: var(--s-trans) !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
  box-shadow: var(--s-shadow-sm) !important;
}
.btn:hover, button.btn:hover, .btn-secondary:hover, .btn-ghost:hover, .btn-outline:hover{
  background: #f8fafc !important;
  border-color: var(--s-border-strong) !important;
  box-shadow: var(--s-shadow) !important;
  transform: none !important;
}

/* Primary — solid #1d4ed8 with blue shadow */
.btn-primary, .btn-navy, .btn.btn-navy, button.btn-primary, .lbtn{
  background: var(--s-primary) !important;
  border: 1px solid var(--s-primary) !important;
  color: #fff !important;
  border-radius: 8px !important;
  font-family: 'Manrope', sans-serif !important;
  font-weight: 700 !important;
  padding: 10px 18px !important;
  box-shadow: var(--s-shadow-btn) !important;
  transition: var(--s-trans) !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
}
.btn-primary:hover, .btn-navy:hover, .btn.btn-navy:hover, button.btn-primary:hover, .lbtn:hover{
  background: var(--s-primary-dk) !important;
  border-color: var(--s-primary-dk) !important;
  box-shadow: 0 6px 16px rgba(29,78,216,.35) !important;
  transform: none !important;
}
.btn-primary:active, .lbtn:active{
  transform: translateY(1px);
  box-shadow: 0 2px 6px rgba(29,78,216,.30) !important;
}

/* Danger button */
.btn-danger{
  background: #dc2626 !important;
  border-color: #dc2626 !important;
  color: #fff !important;
  box-shadow: 0 4px 12px rgba(220,38,38,.25) !important;
}
.btn-danger:hover{
  background: #b91c1c !important;
  border-color: #b91c1c !important;
}

/* ══════════════════════════════════════════════════════════════════
   LOGIN PAGE — command-center theme (see base .login-left rules
   near the top of the file for the full definition). The late
   override block below used to force a flat navy gradient; it's
   now pass-through so the base theme wins. */
#loginPage.active{ background: var(--s-bg) !important; }

.login-left{
  /* Intentionally empty — defer to the base .login-left rule which
     paints the deep-space gradient, breathing glow, and grid overlay. */
  color: #e2e8f0 !important;
}
.login-left *{ color: inherit; }
/* Title stays mono and cyan — don't let the old Manrope override win. */
.login-left .ll-title{ color: #5eead4 !important; font-family: 'JetBrains Mono', ui-monospace, monospace !important; font-weight: 500 !important; letter-spacing: .24em !important; }
.login-left .ll-title em{ color: #e2e8f0 !important; font-style: normal; }

.login-right{
  background: var(--s-surface) !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
  border-left: 1px solid var(--s-border) !important;
}

.lform h2{
  font-family: 'Manrope', sans-serif !important;
  font-weight: 800 !important;
  color: var(--s-ink) !important;
  letter-spacing: -0.02em;
}
.lform p{ color: var(--s-ink-3) !important; font-weight: 400 !important; }

.lform input, .lform select{
  background: var(--s-surface) !important;
  border: 1px solid var(--s-border) !important;
  color: var(--s-ink) !important;
  border-radius: 8px !important;
}
.lform input:focus, .lform select:focus{
  border-color: var(--s-primary) !important;
  box-shadow: 0 0 0 3px rgba(29,78,216,.15) !important;
}

/* Role buttons */
.role-btn{
  background: var(--s-surface) !important;
  border: 1px solid var(--s-border) !important;
  color: var(--s-ink-2) !important;
  border-radius: 10px !important;
  font-weight: 600 !important;
  transition: var(--s-trans) !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
}
.role-btn:hover{
  background: #f8fafc !important;
  border-color: var(--s-border-strong) !important;
}
.role-btn.active{
  background: var(--s-primary-tint) !important;
  border-color: var(--s-primary) !important;
  color: var(--s-primary) !important;
}
.role-btn.active .rb-lbl{ color: var(--s-primary) !important; }

/* ══════════════════════════════════════════════════════════════════
   TABLES — flat, hairline borders
   ══════════════════════════════════════════════════════════════════ */
.tbl, .dash-hist-table, .twrap table{
  background: var(--s-surface) !important;
  border-collapse: separate;
  border-spacing: 0;
}
.tbl thead th, .dash-hist-table thead th, .twrap table thead th{
  background: #f8fafc !important;
  color: var(--s-ink-2) !important;
  font-family: 'Manrope', sans-serif !important;
  font-weight: 700 !important;
  font-size: 11px !important;
  text-transform: uppercase;
  letter-spacing: .06em;
  border-bottom: 1px solid var(--s-border) !important;
  padding: 10px 14px !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
}
.tbl tbody tr, .dash-hist-table tbody tr, .twrap table tbody tr{
  background: var(--s-surface) !important;
  transition: var(--s-trans) !important;
  box-shadow: none !important;
}
.tbl tbody tr:hover, .dash-hist-table tbody tr:hover, .twrap table tbody tr:hover{
  background: #f8fafc !important;
  box-shadow: none !important;
}
.tbl td, .dash-hist-table td, .twrap table td{
  color: var(--s-ink) !important;
  border-bottom: 1px solid var(--s-border) !important;
  padding: 10px 14px !important;
}

/* ══════════════════════════════════════════════════════════════════
   MODALS / TOAST
   ══════════════════════════════════════════════════════════════════ */
.modal-overlay, .modal.open, #modal.open{
  background: rgba(15,23,42,.50) !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
}
.modal-box, .modal-card{
  background: var(--s-surface) !important;
  border: 1px solid var(--s-border) !important;
  border-radius: 12px !important;
  box-shadow: 0 20px 48px rgba(15,23,42,.18) !important;
  color: var(--s-ink) !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
}

.toast, #toast, #toast.show{
  background: var(--s-ink) !important;
  border: 1px solid rgba(255,255,255,.10) !important;
  color: #fff !important;
  border-radius: 10px !important;
  box-shadow: 0 10px 28px rgba(15,23,42,.25) !important;
  font-weight: 500 !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
}

/* ══════════════════════════════════════════════════════════════════
   CHIPS / BADGES — flat tinted, no gradients
   ══════════════════════════════════════════════════════════════════ */
.chip, .bdg, .rch-chip, .badge, .tag{
  background: #f1f5f9 !important;
  border: 1px solid var(--s-border) !important;
  color: var(--s-ink-2) !important;
  font-family: 'Manrope', sans-serif !important;
  font-weight: 600 !important;
  border-radius: 100px !important;
  padding: 3px 10px !important;
  font-size: 12px !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
  transition: var(--s-trans) !important;
}
.chip:hover, .rch-chip:hover{ background: #e2e8f0 !important; transform: none !important; }

/* Status tints — flat, saturated-enough to read */
.chip.ok,       .bdg.ba, .bdg.bf           { background: var(--s-green-tint)  !important; color: #047857 !important; border-color: #a7f3d0 !important; }
.chip.chip-warn,.bdg.bp, .bdg.bv, .bdg.bu  { background: var(--s-amber-tint)  !important; color: #b45309 !important; border-color: #fcd34d !important; }
.chip.reviewed, .bdg.be                    { background: var(--s-violet-tint) !important; color: #6d28d9 !important; border-color: #c4b5fd !important; }
.bdg.br, .chip.err                         { background: var(--s-rose-tint)   !important; color: #b91c1c !important; border-color: #fecaca !important; }
.chip.chip-draft                           { background: #f1f5f9 !important; color: var(--s-ink-2) !important; border-color: var(--s-border) !important; }

/* ══════════════════════════════════════════════════════════════════
   ALERTS — flat tinted
   ══════════════════════════════════════════════════════════════════ */
.alert{
  background: var(--s-surface) !important;
  border: 1px solid var(--s-border) !important;
  color: var(--s-ink) !important;
  border-radius: 10px !important;
  font-weight: 500 !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
}
.alert.ao{ background: var(--s-green-tint)  !important; border-color: #a7f3d0 !important; color: #065f46 !important; }
.alert.ae{ background: var(--s-rose-tint)   !important; border-color: #fecaca !important; color: #991b1b !important; }
.alert.ai{ background: var(--s-blue-tint)   !important; border-color: #bfdbfe !important; color: #1e40af !important; }
.alert.aw{ background: var(--s-amber-tint)  !important; border-color: #fcd34d !important; color: #92400e !important; }

/* ══════════════════════════════════════════════════════════════════
   LINKS
   ══════════════════════════════════════════════════════════════════ */
a, .link, .dash-hist-link{
  color: var(--s-primary) !important;
  font-weight: 600 !important;
  text-decoration: none;
  transition: var(--s-trans) !important;
}
a:hover{ color: var(--s-primary-dk) !important; text-decoration: underline; }

/* ══════════════════════════════════════════════════════════════════
   IPM SUB-PORTAL — scoped SaaS overrides
   ══════════════════════════════════════════════════════════════════ */
#ipm-root{ background: var(--s-bg) !important; }
#ipm-root .card, #ipm-root .entry-box, #ipm-root .section-block,
#ipm-root .kpi, #ipm-root .tbl, #ipm-root .modal-card{
  background: var(--s-surface) !important;
  border: 1px solid var(--s-border) !important;
  border-radius: 12px !important;
  color: var(--s-ink) !important;
  box-shadow: var(--s-shadow-sm) !important;
  -webkit-backdrop-filter: none !important;
          backdrop-filter: none !important;
}
#ipm-root input, #ipm-root select, #ipm-root textarea{
  background: var(--s-surface) !important;
  border: 1px solid var(--s-border) !important;
  color: var(--s-ink) !important;
  border-radius: 8px !important;
}
#ipm-root .topbar{
  background: linear-gradient(90deg, var(--s-header) 0%, var(--s-header-2) 100%) !important;
  color: #fff !important;
}

/* ══════════════════════════════════════════════════════════════════
   GLOBAL TRANSITIONS — 150ms ease-out on every interactive thing
   ══════════════════════════════════════════════════════════════════ */
a, button, .btn, .nitem, .role-btn, .chip, input, select, textarea,
.card, .kpi, .stat-kpi, .inst-card, .campus-card, .scard{
  transition: var(--s-trans) !important;
}

/* Honour reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after{
    transition-duration: .01ms !important;
    animation-duration: .01ms !important;
  }
}

/* ══════════════════════════════════════════════════════════════════
   PRINT STYLES — scoped classes used when the Export-PDF helper
   spawns a hidden iframe and loads this same stylesheet there. We
   don't use @media print on the main window because we don't want
   a manual File → Print to accidentally dump the whole app; the
   Export PDF helper uses explicit iframe printing instead.
   ══════════════════════════════════════════════════════════════════ */
.pdf-print-root{
  background: #fff !important;
  color: #0f172a !important;
  padding: 0 24px 28px;
  font-family: 'Manrope', system-ui, sans-serif;
  font-size: 11px;
  line-height: 1.55;
  orphans: 3;
  widows: 3;
}
.pdf-print-root .pdf-print-header{
  padding: 18px 0 16px;
  margin-bottom: 22px;
  border-bottom: 2px solid #1e40af;
  page-break-after: avoid;
  break-after: avoid;
}
.pdf-print-root .pdf-print-header .pdf-hdr-title-row{
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 14px;
}
.pdf-print-root .pdf-print-header .pdf-sysname{
  font-size: 9px;
  letter-spacing: .14em;
  color: #64748b;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 5px;
}
.pdf-print-root .pdf-print-header h1{
  font-size: 22px;
  font-weight: 800;
  color: #1e40af;
  margin: 0;
  letter-spacing: -0.02em;
  line-height: 1.2;
}
.pdf-print-root .pdf-print-header .pdf-gen-stamp{
  font-size: 9px;
  color: #94a3b8;
  text-align: right;
  flex-shrink: 0;
  margin-top: 2px;
  font-style: italic;
}
.pdf-print-root .pdf-meta-grid{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px 20px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 12px 16px;
  page-break-inside: avoid;
  break-inside: avoid;
}
.pdf-print-root .pdf-meta-item{
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.pdf-print-root .pdf-mi-label{
  font-size: 9px;
  font-weight: 800;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: .07em;
}
.pdf-print-root .pdf-mi-value{
  font-size: 11px;
  font-weight: 700;
  color: #0f172a;
}
.pdf-print-root .pdf-print-footer{
  margin-top: 24px;
  padding-top: 10px;
  border-top: 1px solid #e2e8f0;
  font-size: 10px;
  color: #94a3b8;
  text-align: center;
  letter-spacing: .08em;
  text-transform: uppercase;
}
/* Expand any collapsed submission card so the body is visible in PDF */
.pdf-print-root .rc .rcb{ display: block !important; }
.pdf-print-root .rc{
  box-shadow: none !important;
  border: 1px solid #e2e8f0 !important;
  page-break-inside: avoid;
}
/* Hide interactive controls inside exported content */
.pdf-print-root .rvform,
.pdf-print-root .btn,
.pdf-print-root button,
.pdf-print-root .rch-chevron,
.pdf-print-root .pdf-export-btn{ display: none !important; }
/* Tables shouldn't be forced to scroll in print */
.pdf-print-root .twrap{ overflow: visible !important; }
.pdf-print-root table{ width: 100% !important; border-collapse: collapse; }
.pdf-print-root table th, .pdf-print-root table td{
  border: 1px solid #e2e8f0;
  padding: 6px 10px;
  font-size: 11px;
}
.pdf-print-root table thead th{
  background: #f8fafc;
  color: #1e40af;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
}

/* ── Custom timetable-view styling ──
   Only applied inside the exported PDF; does nothing in the main app. */
.pdf-print-root .pdf-page-break{
  page-break-after: always;
  break-after: page;
  height: 0;
  margin: 0;
  border: 0;
}
.pdf-print-root .pdf-section-title{
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 12px;
  color: #1e40af;
  text-transform: uppercase;
  letter-spacing: .08em;
  margin: 20px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid #e2e8f0;
  page-break-after: avoid;
  break-after: avoid;
}
.pdf-print-root .pdf-tt-grid{
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  font-family: 'Manrope', sans-serif;
}
.pdf-print-root .pdf-tt-grid th,
.pdf-print-root .pdf-tt-grid td{
  border: 1px solid #e2e8f0;
  padding: 4px 6px;
  vertical-align: top;
  word-wrap: break-word;
}
.pdf-print-root .pdf-day-block{
  page-break-inside: avoid;
}
/* Page 1 logo bar — sits in normal document flow above the title block.
   Running headers/footers on pages 2+ are handled by @page margin boxes
   defined in _exportToPdf at runtime, NOT here. */
.pdf-print-root .pdf-running-header{
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 8px 12px 12px;
  margin: 0 0 18px 0;
  background: #fff;
  border-bottom: 2px solid #1e40af;
  page-break-after: avoid;
  break-after: avoid;
}
/* Fallback @page for any caller that DOESN'T go through _exportToPdf
   (none currently, but the rule must exist so direct printing still works).
   The real geometry comes from the inline @page block in _exportToPdf. */
@page { size: A4; margin: 24mm 14mm 20mm 14mm; }

/* --- Style Block #4 --- */
@import url('https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,600;8..144,700&display=swap');

/* ===== M3 TOKENS ===== */
#loginPage.m3-login{
  --m3-primary:#0f2a5c;
  --m3-primary-c:#ffffff;
  --m3-secondary:#14b8a6;
  --m3-secondary-c:#ffffff;
  --m3-tertiary:#c9a84c;
  --m3-surface:#faf9fc;
  --m3-surface-1:#f4f3f8;
  --m3-surface-2:#eceaf2;
  --m3-on-surface:#1a1c23;
  --m3-on-surface-v:#45475a;
  --m3-outline:#c5c6d0;
  --m3-outline-v:#e3e3ea;
  --m3-shadow:rgba(15,42,92,.08);
  --m3-shadow-hi:rgba(15,42,92,.14);
  --m3-ease:cubic-bezier(.05,.7,.1,1);
  --m3-radius:16px;
  --m3-radius-lg:28px;
}

/* ===== LAYOUT: hero + signin side-by-side on desktop (no scroll to login) ===== */
#loginPage.m3-login{
  display:none;
  min-height:100vh;
  background:var(--m3-surface) !important;
  font-family:'Roboto Flex','DM Sans',system-ui,-apple-system,Segoe UI,sans-serif;
  color:var(--m3-on-surface);
  overflow-x:hidden;
}
#loginPage.m3-login.active{
  display:grid !important;
  grid-template-columns:minmax(0, 1.1fr) minmax(380px, 520px);
  grid-template-rows:minmax(100vh, auto) auto;
  align-items:unset !important;
}
/* On narrow screens, collapse to one column and hide the benefits below-the-fold */
@media (max-width:900px){
  #loginPage.m3-login.active{
    grid-template-columns:1fr;
    grid-template-rows:auto auto auto;
  }
}
#loginPage.m3-login *{ box-sizing:border-box; }

/* ===== HERO ===== */
.m3-hero{
  position:relative;padding:64px 56px;
  grid-column:1 / 2;grid-row:1 / 2;
  display:flex;align-items:center;justify-content:flex-start;
  min-height:100vh;
  color:#fff;overflow:hidden;
  background:linear-gradient(135deg, #0a1f45 0%, var(--m3-primary) 55%, #1d4d6b 100%);
}
@media (max-width:900px){
  .m3-hero{grid-column:1 / -1;min-height:auto;padding:48px 24px;}
}
.m3-hero-bg{
  position:absolute;inset:0;pointer-events:none;opacity:.7;
  background:
    radial-gradient(800px 500px at 85% 20%, rgba(20,184,166,.35), transparent 60%),
    radial-gradient(600px 400px at 10% 90%, rgba(201,168,76,.22), transparent 60%);
}
.m3-hero-bg::after{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse at center, rgba(0,0,0,.7) 0%, transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse at center, rgba(0,0,0,.7) 0%, transparent 75%);
}
.m3-hero-inner{
  position:relative;z-index:1;max-width:560px;width:100%;text-align:left;
  animation:m3-fade-up .8s var(--m3-ease) both;
}
@media (max-width:900px){
  .m3-hero-inner{max-width:640px;text-align:center;margin:0 auto;}
}
@keyframes m3-fade-up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.m3-eyebrow{
  display:inline-flex;align-items:center;gap:10px;padding:8px 16px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
  border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(255,255,255,.92);backdrop-filter:blur(6px);margin-bottom:28px;
}
.m3-eyebrow-dot{width:7px;height:7px;border-radius:50%;background:var(--m3-secondary);box-shadow:0 0 10px rgba(20,184,166,.7);}
.m3-hero-title{
  font-family:'Playfair Display','Roboto Flex',serif !important;
  font-size:clamp(38px,6vw,68px);font-weight:700 !important;line-height:1.05;
  margin:0 0 20px;letter-spacing:-.02em;
  /* Global rule at h1{color:var(--s-ink)!important} was winning over a
     non-important color:#fff; use !important here too — specificity .m3-hero-title
     beats h1 so this rule wins. The span inside still uses
     -webkit-text-fill-color:transparent which takes precedence over color
     for the actual text fill, so the "System" gradient is preserved. */
  color:#fff !important;
}
.m3-hero-title span{
  font-style:italic;background:linear-gradient(120deg, var(--m3-secondary) 0%, #5eead4 50%, #fed7aa 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.m3-hero-sub{font-size:clamp(15px,1.4vw,18px);line-height:1.65;color:rgba(255,255,255,.82);max-width:560px;margin:0 0 36px;font-weight:400;}
@media (max-width:900px){
  .m3-hero-sub{margin-left:auto;margin-right:auto;}
}
.m3-hero-cta{
  display:inline-flex;align-items:center;gap:10px;padding:14px 28px;
  background:#fff;color:var(--m3-primary);text-decoration:none;border-radius:999px;
  font-weight:600;font-size:15px;letter-spacing:.02em;
  box-shadow:0 4px 14px rgba(0,0,0,.18), 0 1px 3px rgba(0,0,0,.12);
  transition:transform .28s var(--m3-ease), box-shadow .28s var(--m3-ease), background .22s;
}
/* On desktop, the signin card is already visible to the right — no need for a scroll CTA */
@media (min-width:901px){
  .m3-hero-cta{display:none;}
}
.m3-hero-cta:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.26), 0 2px 6px rgba(0,0,0,.16);background:#f4f5ff;}
.m3-hero-cta:active{transform:translateY(0);}
.m3-hero-cta svg{animation:m3-bounce 2.4s ease-in-out infinite;}
@keyframes m3-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}

/* ===== BENEFITS GRID (row 2, below the hero+signin) ===== */
.m3-benefits{
  grid-column:1 / -1;grid-row:2 / 3;
  padding:72px 24px 56px;background:var(--m3-surface-1);
  border-top:1px solid var(--m3-outline-v);
}
.m3-benefits-inner{max-width:1200px;margin:0 auto;}
.m3-section-title{
  font-family:'Playfair Display',serif;font-size:clamp(24px,2.4vw,32px);
  font-weight:700;color:var(--m3-on-surface);text-align:center;margin:0 0 40px;letter-spacing:-.01em;
}
.m3-bg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;}
.m3-bcard{
  padding:28px 24px;border-radius:var(--m3-radius);background:#fff;
  border:1px solid var(--m3-outline-v);box-shadow:0 1px 3px var(--m3-shadow);
  transition:transform .3s var(--m3-ease), box-shadow .3s var(--m3-ease), border-color .22s;
  animation:m3-fade-up .7s var(--m3-ease) both;
}
.m3-bcard:nth-child(1){animation-delay:.05s}
.m3-bcard:nth-child(2){animation-delay:.12s}
.m3-bcard:nth-child(3){animation-delay:.19s}
.m3-bcard:nth-child(4){animation-delay:.26s}
.m3-bcard:hover{transform:translateY(-4px);box-shadow:0 10px 24px var(--m3-shadow-hi), 0 3px 6px var(--m3-shadow);border-color:var(--m3-outline);}
.m3-bcard h3{margin:16px 0 8px;font-size:18px;font-weight:600;color:var(--m3-on-surface);letter-spacing:-.01em;}
.m3-bcard p{margin:0;font-size:14px;line-height:1.6;color:var(--m3-on-surface-v);}
.m3-bicon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;transition:transform .3s var(--m3-ease);}
.m3-bcard:hover .m3-bicon{transform:scale(1.06) rotate(-3deg);}
.m3-bcard--primary .m3-bicon{background:linear-gradient(135deg, var(--m3-primary) 0%, #1e4180 100%);color:#fff;}
.m3-bcard--secondary .m3-bicon{background:linear-gradient(135deg, var(--m3-secondary) 0%, #0ea5e9 100%);color:#fff;}
.m3-bcard--tertiary .m3-bicon{background:linear-gradient(135deg, #f59e0b 0%, var(--m3-tertiary) 100%);color:#fff;}

/* ===== SIGN-IN WRAP — right column of the hero row on desktop ===== */
.m3-signin-wrap{
  grid-column:2 / 3;grid-row:1 / 2;
  padding:48px 40px;background:var(--m3-surface);
  display:flex;flex-direction:column;align-items:stretch;justify-content:center;gap:20px;
  min-height:100vh;
}
@media (max-width:900px){
  .m3-signin-wrap{grid-column:1 / -1;min-height:auto;padding:32px 20px 48px;align-items:center;}
}
/* Hide the "Sign in to continue" section title on desktop — the hero tells the story.
   The card's own h2 ("Welcome Back") is the heading users see. */
.m3-signin-wrap > .m3-section-title{display:none;}
@media (max-width:900px){
  .m3-signin-wrap > .m3-section-title{display:block;}
}
.m3-signin-col{
  width:100% !important;max-width:480px !important;margin:0 auto;
  padding:0 !important;border:none !important;background:transparent !important;
  display:block !important;flex-shrink:0;align-items:unset !important;justify-content:unset !important;
}
.m3-login .lform{
  background:#fff !important;border:1px solid var(--m3-outline-v) !important;
  border-radius:var(--m3-radius) !important;padding:40px 36px !important;
  box-shadow:0 2px 6px var(--m3-shadow), 0 8px 24px rgba(15,42,92,.06) !important;
  animation:m3-fade-up .7s .15s var(--m3-ease) both;
}
.m3-login .lform label{
  font-weight:500 !important;font-size:13px !important;text-transform:none !important;
  letter-spacing:normal !important;color:var(--m3-on-surface-v) !important;margin-bottom:6px !important;
}
.m3-login .lform input[type=text],
.m3-login .lform input[type=email],
.m3-login .lform input[type=password],
.m3-login .lform input:not([type]),
.m3-login .lform select{
  border-radius:12px !important;border:1px solid var(--m3-outline) !important;
  padding:14px 16px !important;font-size:15px !important;background:var(--m3-surface) !important;
  transition:border-color .22s var(--m3-ease), box-shadow .22s var(--m3-ease), background .22s !important;
}
.m3-login .lform input:focus,
.m3-login .lform select:focus{
  border-color:var(--m3-primary) !important;
  box-shadow:0 0 0 3px rgba(15,42,92,.12) !important;background:#fff !important;
}
.m3-login .lform h2{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--m3-on-surface);margin:0 0 6px;letter-spacing:-.01em;}
.m3-login .lform p{font-size:14px;color:var(--m3-on-surface-v);margin-bottom:24px;line-height:1.6;}

.m3-login .role-btns{gap:10px;}
.m3-login .role-btn{
  border:1px solid var(--m3-outline) !important;border-radius:14px !important;
  padding:18px 12px !important;background:#fff !important;
  transition:all .28s var(--m3-ease) !important;box-shadow:0 1px 2px var(--m3-shadow);
}
.m3-login .role-btn:hover{
  border-color:var(--m3-primary) !important;background:#f4f5ff !important;
  transform:translateY(-2px);box-shadow:0 6px 16px var(--m3-shadow-hi) !important;
}
.m3-login .role-btn.active{
  border-color:var(--m3-primary) !important;
  background:linear-gradient(135deg, var(--m3-primary) 0%, #1e4180 100%) !important;color:#fff;
}
.m3-login .role-btn::before{background:linear-gradient(90deg, var(--m3-secondary), #5eead4) !important;}
.m3-login .rb-icon{width:44px !important;height:44px !important;}
.m3-login .rb-icon svg{width:26px !important;height:26px !important;}

.m3-login .lbtn{
  border-radius:999px !important;font-family:inherit !important;
  padding:14px 24px !important;font-size:15px !important;font-weight:600 !important;
  background:var(--m3-primary) !important;color:#fff !important;border:none !important;letter-spacing:.02em !important;
  box-shadow:0 2px 6px rgba(15,42,92,.2), 0 1px 2px rgba(15,42,92,.12) !important;
  transition:all .22s var(--m3-ease) !important;
}
.m3-login .lbtn:hover{background:#183566 !important;box-shadow:0 6px 18px rgba(15,42,92,.28), 0 2px 4px rgba(15,42,92,.16) !important;transform:translateY(-1px);}
.m3-login .lbtn:active{transform:translateY(0);}

.m3-login .lform-logo{margin-bottom:28px !important;padding-bottom:24px !important;border-bottom:1px solid var(--m3-outline-v) !important;justify-content:center;}
.m3-login .lform-logo img{max-height:80px !important;width:auto !important;}

.m3-login .login-reg-link{margin-top:16px;color:var(--m3-on-surface-v);font-size:13px;text-align:center;}
.m3-login .login-reg-link span{color:var(--m3-primary);font-weight:600;cursor:pointer;}
.m3-login .login-reg-link span:hover{text-decoration:underline;}

.m3-benefits::after{
  content:'Vinayaka Mission\'s Research Foundation (Deemed to be University) · VMRF-DU';
  display:block;margin-top:40px;color:var(--m3-on-surface-v);font-size:12px;text-align:center;letter-spacing:.02em;
}

@media (max-width:600px){
  .m3-hero-title{font-size:34px;}
  .m3-benefits{padding:48px 20px 32px;}
  .m3-login .lform{padding:28px 22px !important;}
}

/* --- Style Block #5 --- */
/* ===== Meridian Authority — Shell tokens ===== */
.topbar, .sidebar{
  --ms-primary:#0C1E3C;
  --ms-primary-hi:#1A3D72;
  --ms-secondary:#C49A2A;
  --ms-surface:#FFFFFF;
  --ms-surface-1:#F5F7FB;
  --ms-on-surface:#070F1C;
  --ms-on-surface-v:#2C4460;
  --ms-outline:#C8D0E0;
  --ms-outline-v:#E8ECF4;
  --ms-shadow:rgba(7,15,28,.08);
  --ms-shadow-hi:rgba(7,15,28,.14);
  --ms-ease:cubic-bezier(.4,0,.2,1);
  font-family:'Inter',system-ui,-apple-system,sans-serif !important;
}

/* ===== TOPBAR — Deep Ultramarine + Gold meridian ===== */
.topbar{
  height:62px !important;
  background:linear-gradient(135deg,#050D1E 0%,#0C1E3C 50%,#0E2448 100%) !important;
  border-bottom:none !important;
  box-shadow:0 2px 16px rgba(7,15,28,.28),0 1px 3px rgba(7,15,28,.18) !important;
  padding:0 28px !important;
  position:relative;z-index:100;
}
/* Burnished gold meridian line */
.topbar::after{
  content:'';position:absolute;left:0;right:0;bottom:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,#C49A2A 25%,#E8B84B 50%,#C49A2A 75%,transparent 100%);
  opacity:.65;
}
.topbar .tb-logo-box{
  height:46px !important;padding:0 10px !important;
  background:rgba(255,255,255,.08) !important;
  border:1px solid rgba(196,154,42,.28) !important;
  border-radius:9px !important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07) !important;
}
.topbar .tb-brand strong{font-weight:700 !important;letter-spacing:-.1px !important;color:#fff !important;}
.topbar .tb-brand span{color:rgba(255,255,255,.58) !important;font-weight:400 !important;}
.topbar .tb-divider{background:rgba(255,255,255,.12) !important;height:30px !important;}
.topbar .tb-breadcrumb{color:rgba(255,255,255,.72) !important;font-weight:400 !important;}
.topbar .tb-breadcrumb b{color:#E8B84B !important;font-weight:600 !important;}
.topbar .tb-user{color:rgba(255,255,255,.82) !important;font-weight:400 !important;}

/* Role pills — sovereign tonal chips */
.topbar .role-pill{
  border-radius:999px !important;padding:5px 13px !important;
  font-size:12px !important;font-weight:700 !important;letter-spacing:.04em !important;
  border:1px solid transparent !important;
}
.topbar .rp-FACULTY{background:rgba(9,92,53,.28) !important;color:#4ade80 !important;border-color:rgba(74,222,128,.3) !important;}
.topbar .rp-HOD    {background:rgba(10,48,112,.28) !important;color:#7db8ff !important;border-color:rgba(125,184,255,.3) !important;}
.topbar .rp-HOI    {background:rgba(61,13,106,.28) !important;color:#c084fc !important;border-color:rgba(192,132,252,.3) !important;}
.topbar .rp-IMO    {background:rgba(120,80,0,.28) !important;color:#E8B84B !important;border-color:rgba(196,154,42,.38) !important;}

/* Logout & notification buttons */
.topbar .btn-logout{
  border-radius:999px !important;padding:7px 17px !important;
  border:1px solid rgba(255,255,255,.2) !important;
  color:rgba(255,255,255,.88) !important;
  background:transparent !important;font-weight:500 !important;font-size:13px !important;
  transition:all .22s var(--ms-ease) !important;
}
.topbar .btn-logout:hover{
  background:rgba(255,255,255,.1) !important;
  border-color:rgba(196,154,42,.5) !important;color:#fff !important;
}
.topbar .nb-btn{
  border-radius:10px !important;width:40px !important;height:40px !important;
  background:rgba(255,255,255,.07) !important;
  border:1px solid rgba(255,255,255,.12) !important;
  color:rgba(255,255,255,.88) !important;
  transition:all .22s var(--ms-ease) !important;
}
.topbar .nb-btn:hover{background:rgba(255,255,255,.14) !important;border-color:rgba(196,154,42,.4) !important;}

/* ===== SIDEBAR — Meridian Authority surface ===== */
.sidebar{
  background:var(--ms-surface) !important;
  border-right:1px solid var(--ms-outline-v) !important;
  box-shadow:1px 0 4px rgba(7,15,28,.05) !important;
  padding:20px 12px !important;
  font-family:'Inter',system-ui,-apple-system,sans-serif !important;
}
.sidebar .nav-item{
  border-radius:10px !important;
  margin-bottom:3px !important;
  padding:11px 14px !important;
  font-weight:500 !important;font-size:14px !important;
  color:var(--ms-on-surface-v) !important;
  letter-spacing:normal !important;
  transition:all .18s var(--ms-ease) !important;
  border:1px solid transparent !important;
  position:relative;overflow:hidden;
}
.sidebar .nav-item::after{
  content:'';position:absolute;inset:0;border-radius:10px;pointer-events:none;
  background:radial-gradient(160px 90px at 0% 50%,rgba(12,30,60,.05),transparent 70%);
  opacity:0;transition:opacity .18s var(--ms-ease);
}
.sidebar .nav-item:hover{
  background:var(--ms-surface-1) !important;
  color:var(--ms-on-surface) !important;
  transform:translateX(2px);
}
.sidebar .nav-item:hover::after{opacity:1;}
.sidebar .nav-item.active{
  background:linear-gradient(135deg,var(--ms-primary) 0%,var(--ms-primary-hi) 100%) !important;
  color:#fff !important;
  font-weight:600 !important;
  border-color:transparent !important;
  box-shadow:0 4px 14px rgba(12,30,60,.22),0 1px 3px rgba(12,30,60,.12) !important;
  transform:translateX(0);
}
.sidebar .nav-item.active::before{
  background:var(--ms-secondary) !important;
  box-shadow:0 0 12px rgba(196,154,42,.6) !important;
  height:22px !important;
}
.sidebar .nav-item.active::after{display:none;}

/* Sidebar section dividers */
.sidebar .sdiv,.sidebar .nav-sec{
  font-size:11px !important;font-weight:700 !important;letter-spacing:.08em !important;
  text-transform:uppercase !important;color:var(--ms-on-surface-v) !important;
  padding:14px 14px 8px !important;margin-top:4px;
}
/* Nav footer */
.sidebar .nav-footer{
  border-top:1px solid var(--ms-outline-v) !important;
  padding-top:14px !important;margin-top:12px !important;
}
.sidebar .nav-footer p{font-size:11px !important;color:var(--ms-on-surface-v) !important;line-height:1.5 !important;}

/* --- Style Block #6 --- */
/* ═══════════════════════════════════════════════════════════════════
   NEW LOGIN UI  ·  scoped under #loginPage.nl-v2 to override legacy
   selectors without touching anything else in the app.
═══════════════════════════════════════════════════════════════════ */
#loginPage.nl-v2{
  --nl-navy:#0a1a33;
  --nl-navy-2:#0f2547;
  --nl-navy-3:#152e57;
  --nl-gold:#c49a2a;
  --nl-gold-lt:#e0c074;
  --nl-gold-soft:#f6ecd0;
  --nl-ink:#0c1232;
  --nl-ink-2:#3a4566;
  --nl-muted:#6b7894;
  --nl-line:#e3e7f0;
  --nl-line-2:#eef0f7;
  --nl-surface:#ffffff;
  --nl-surface-2:#f7f9fc;
  --nl-danger:#b91c1c;
  --nl-danger-soft:#fdecec;
  --nl-shadow-sm:0 1px 2px rgba(15,30,60,.06);
  --nl-shadow-md:0 8px 24px -8px rgba(15,30,60,.18), 0 2px 4px rgba(15,30,60,.05);
  --nl-shadow-lg:0 24px 60px -20px rgba(15,30,60,.30), 0 6px 14px rgba(15,30,60,.08);

}
#loginPage.nl-v2,
#loginPage.nl-v2 *,
#loginPage.nl-v2 *::before,
#loginPage.nl-v2 *::after{ box-sizing:border-box; }

#loginPage.nl-v2{
  display:none;
  min-height:100vh;
  width:100%;
}
#loginPage.nl-v2.active{ display:flex; }

/* ── BRAND PANE (left) ────────────────────────────────────────────── */
.nl-brand{
  flex:0 0 50%;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(900px 700px at -10% 10%, rgba(196,154,42,.12), transparent 55%),
    radial-gradient(700px 600px at 110% 95%, rgba(20,52,110,.55), transparent 55%),
    linear-gradient(155deg, #050d1e 0%, #0a1a33 45%, #0e2549 100%);
  color:#e8edf6;
  padding:56px 56px 44px;
  display:flex;
  flex-direction:column;
}
.nl-brand::before{
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(196,154,42,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(196,154,42,.05) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 70% 80% at 25% 35%, rgba(0,0,0,.7) 0%, transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse 70% 80% at 25% 35%, rgba(0,0,0,.7) 0%, transparent 75%);
}
.nl-brand::after{
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:linear-gradient(180deg, transparent 0%, var(--nl-gold) 25%, var(--nl-gold-lt) 50%, var(--nl-gold) 75%, transparent 100%);
  opacity:.65; box-shadow:0 0 32px rgba(196,154,42,.3);
}
.nl-brand-orb{
  position:absolute; right:-180px; bottom:-180px;
  width:560px; height:560px; border-radius:50%;
  background:radial-gradient(circle, rgba(196,154,42,.10) 0%, transparent 65%);
  pointer-events:none; filter:blur(2px);
}
.nl-brand-inner{ position:relative; z-index:1; display:flex; flex-direction:column; height:100%; gap:28px; }

.nl-brand-top{
  display:flex; flex-direction:column;
  align-items:flex-start; gap:14px;
  animation:nl-fade-up .6s ease both;
}
.nl-brand-mark{
  display:inline-flex;
  flex-shrink:0;
  max-width:100%;
  width:100%;                       /* let the mark fill brand-pane content area */
}
.nl-brand-mark img{
  display:block;
  width:100%;                       /* fill the mark — much larger than 443px native */
  max-width:640px;                  /* cap upscale to keep AVIF crisp */
  height:auto;                      /* preserve aspect on shrink */
  border-radius:6px;
  filter:drop-shadow(0 10px 26px rgba(0,0,0,.34));
}
/* Text fallback if the AVIF can't be decoded by the browser */
.nl-brand-mark.fb::before{
  content:'VMRF-DU';
  font-family:'Playfair Display',Georgia,serif;
  font-weight:700; font-size:28px; letter-spacing:.5px;
  color:#ffffff;
  padding:8px 4px;
}
.nl-brand-orgline{
  font-family:'DM Mono','SF Mono',Consolas,monospace;
  font-size:11px; letter-spacing:.22em; text-transform:uppercase;
  color:rgba(224,192,116,.88); margin:0 0 4px;
}
.nl-brand-orgsub{
  font-size:13px; color:rgba(232,237,246,.72); margin:0;
  font-weight:400;
}

.nl-brand-mid{ flex:1; display:flex; flex-direction:column; justify-content:center; gap:22px; padding-bottom:32px; }
.nl-brand-eyebrow{
  display:inline-flex; align-items:center; gap:10px;
  font-family:'DM Mono','SF Mono',Consolas,monospace;
  font-size:10px; letter-spacing:.24em; text-transform:uppercase;
  color:rgba(224,192,116,.9);
  padding:7px 13px; border:1px solid rgba(196,154,42,.28); border-radius:6px;

.nl-brand-eyebrow span.dot{

.nl-brand-title{

.nl-brand-title em{

.nl-brand-feats{

  border:1px solid rgba(196,154,42,.3); color:var(--nl-gold-lt);
}
.nl-feat-bd{ display:flex; flex-direction:column; gap:2px; min-width:0; }
.nl-feat-ttl{ font-size:13px; font-weight:600; color:#f1f5f9; letter-spacing:.2px; }
.nl-feat-sub{ font-size:11.5px; color:rgba(226,232,240,.62); line-height:1.45; }

.nl-brand-bottom{
  display:flex; align-items:center; justify-content:space-between; gap:14px;
  font-family:'DM Mono','SF Mono',Consolas,monospace;
  font-size:10.5px; letter-spacing:.18em; text-transform:uppercase;
  color:rgba(226,232,240,.42);
  animation:nl-fade-up .8s .35s ease both;
}
.nl-brand-bottom .v{ display:inline-flex; align-items:center; gap:6px; }
.nl-brand-bottom .v::before{
  content:''; width:5px; height:5px; border-radius:50%; background:var(--nl-gold); opacity:.7;
}

@keyframes nl-fade-up{
  from{ opacity:0; transform:translateY(14px); }
  to  { opacity:1; transform:none; }
}

/* ── WIZARD PANE (right) ──────────────────────────────────────────── */
.nl-wiz{
  flex:1; min-width:0;
  display:flex; flex-direction:column;
  padding:40px clamp(28px, 5vw, 64px) 44px;
  position:relative;
  overflow-y:auto;
}
.nl-wiz::-webkit-scrollbar{ width:8px; }
.nl-wiz::-webkit-scrollbar-thumb{ background:rgba(15,30,60,.12); border-radius:8px; }

.nl-wiz-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:30px; gap:20px; flex-wrap:wrap; }

/* Step indicator ── beads */
.nl-stepper{ display:flex; align-items:center; gap:8px; }
.nl-bead{
  display:flex; align-items:center; gap:8px;
  font-family:'DM Mono','SF Mono',Consolas,monospace;
  font-size:11px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--nl-muted); transition:color .25s;
}
.nl-bead-dot{
  width:24px; height:24px; border-radius:50%;
  border:1.5px solid var(--nl-line);
  background:var(--nl-surface);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:600; color:var(--nl-muted);
  transition:all .25s;
}
.nl-bead.done .nl-bead-dot{ background:var(--nl-gold); border-color:var(--nl-gold); color:#fff; }
.nl-bead.active .nl-bead-dot{ background:var(--nl-navy); border-color:var(--nl-navy); color:#fff; box-shadow:0 0 0 4px rgba(10,26,51,.10); }
.nl-bead.active{ color:var(--nl-navy); font-weight:600; }
.nl-bead-rule{ width:24px; height:1.5px; background:var(--nl-line); border-radius:2px; }
.nl-bead-rule.done{ background:var(--nl-gold); }

/* Help link top right */
.nl-help{
  font-size:13.5px; color:var(--nl-muted);
  display:flex; align-items:center; gap:6px;
}
.nl-help a{ color:var(--nl-navy); font-weight:600; text-decoration:none; }
.nl-help a:hover{ color:var(--nl-gold); }

/* Step container */
.nl-step{
  flex:1; max-width:780px; margin:0 auto; width:100%;
  animation:nl-step-in .42s cubic-bezier(.2,.65,.25,1);
}
@keyframes nl-step-in{
  from{ opacity:0; transform:translateY(10px); }
  to  { opacity:1; transform:none; }
}

/* Step header */
.nl-step-head{ margin-bottom:30px; }
.nl-step-back{
  display:inline-flex; align-items:center; gap:7px;
  font-size:13.5px; color:var(--nl-muted);
  background:none; border:none; cursor:pointer;
  padding:6px 10px 6px 0; margin-bottom:14px;
  font-family:inherit;
  transition:color .2s;
}
.nl-step-back:hover{ color:var(--nl-navy); }
.nl-step-back:disabled{ opacity:0; pointer-events:none; }

.nl-bcrumb{
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  font-family:'DM Mono','SF Mono',Consolas,monospace;
  font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--nl-muted); margin-bottom:8px;
}
.nl-bcrumb-it{ color:var(--nl-navy); font-weight:600; }
.nl-bcrumb-sep{ color:var(--nl-line); }

.nl-step-title{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(28px, 3.2vw, 36px);
  font-weight:700; letter-spacing:-.4px; line-height:1.15;
  color:var(--nl-ink); margin:0 0 8px;
}
.nl-step-sub{
  font-size:15px; line-height:1.6; color:var(--nl-muted);
  margin:0; max-width:600px;
}

/* ── Role grid (Step 1) ───────────────────────────────────────────── */
.nl-roles{
  display:grid; grid-template-columns:repeat(2,1fr);
  gap:14px;
}
.nl-role{
  position:relative; padding:22px 22px 20px;
  background:var(--nl-surface); border:1.5px solid var(--nl-line);
  border-radius:var(--nl-radius-md);
  cursor:pointer; text-align:left;
  font-family:inherit; color:var(--nl-ink);
  transition:transform .25s, border-color .25s, box-shadow .25s, background .25s;
  display:flex; gap:16px; align-items:flex-start;
  overflow:hidden;
}
.nl-role::before{
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:var(--nl-gold); transform:scaleY(0); transform-origin:center;
  transition:transform .3s cubic-bezier(.2,.65,.25,1);
}
.nl-role:hover{
  border-color:rgba(196,154,42,.55);
  transform:translateY(-2px);
  box-shadow:var(--nl-shadow-md);
}
.nl-role:hover::before{ transform:scaleY(1); }
.nl-role:focus-visible{ outline:none; border-color:var(--nl-navy); box-shadow:0 0 0 3px rgba(10,26,51,.12); }

.nl-role-ic{
  width:46px; height:46px; border-radius:11px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, var(--nl-gold-soft), #fff);
  border:1px solid var(--nl-gold-soft);
  color:var(--nl-gold); transition:transform .25s;
}
.nl-role:hover .nl-role-ic{ transform:scale(1.05); }
.nl-role-bd{ flex:1; min-width:0; }
.nl-role-ttl{
  font-family:'Playfair Display',Georgia,serif;
  font-size:19px; font-weight:600; letter-spacing:-.2px;
  color:var(--nl-ink); margin:0 0 4px;
}
.nl-role-sub{
  font-size:13px; line-height:1.5; color:var(--nl-muted); margin:0 0 8px;
}
.nl-role-arrow{
  display:inline-flex; align-items:center; gap:4px;
  font-family:'DM Mono','SF Mono',Consolas,monospace;
  font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--nl-gold); font-weight:600;
}
.nl-role-arrow svg{ transition:transform .25s; }
.nl-role:hover .nl-role-arrow svg{ transform:translateX(3px); }

/* ── Campus picker (Step 2) ───────────────────────────────────────── */
.nl-campuses{
  display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
  gap:18px;
}
.nl-campus{
  background:var(--nl-surface); border:1.5px solid var(--nl-line);
  border-radius:var(--nl-radius-md); cursor:pointer;
  padding:0; overflow:hidden;
  font-family:inherit; color:var(--nl-ink); text-align:left;
  transition:transform .25s, border-color .25s, box-shadow .25s;
  display:flex; flex-direction:column;
}
.nl-campus:hover{ transform:translateY(-3px); border-color:rgba(196,154,42,.5); box-shadow:var(--nl-shadow-md); }
.nl-campus:focus-visible{ outline:none; border-color:var(--nl-navy); box-shadow:0 0 0 3px rgba(10,26,51,.12); }
.nl-campus-banner{
  height:120px; width:100%;
  background:linear-gradient(135deg, var(--nl-navy) 0%, var(--nl-navy-2) 60%, var(--nl-navy-3) 100%);
  position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
.nl-campus-banner img{
  max-width:88%; max-height:80%;
  object-fit:contain;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.25));
}
.nl-campus-banner.no-img::before{
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(400px 240px at 30% 70%, rgba(196,154,42,.18), transparent 60%),
    linear-gradient(135deg, rgba(255,255,255,.04) 0%, transparent 60%);
}
.nl-campus-banner.no-img::after{
  content:attr(data-letter);
  font-family:'Playfair Display',Georgia,serif;
  font-size:64px; font-weight:700; color:rgba(255,255,255,.18);
  letter-spacing:-2px;
}
.nl-campus-bd{ padding:18px 20px 20px; display:flex; flex-direction:column; gap:6px; }
.nl-campus-meta{
  font-family:'DM Mono','SF Mono',Consolas,monospace;
  font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--nl-gold); font-weight:600;
}
.nl-campus-name{
  font-family:'Playfair Display',Georgia,serif;
  font-size:18px; font-weight:600; line-height:1.25;
  color:var(--nl-ink); margin:0;
}
.nl-campus-sub{ font-size:13px; color:var(--nl-muted); margin:0; line-height:1.5; }
.nl-campus-go{
  margin-top:6px; display:inline-flex; align-items:center; gap:6px;
  font-family:'DM Mono','SF Mono',Consolas,monospace;
  font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--nl-navy); font-weight:600;
}

/* ── Institution grid (Step 3) ────────────────────────────────────── */
.nl-insts{
  display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
  gap:14px;
}
.nl-inst{
  position:relative; padding:18px 16px 16px;
  background:var(--nl-surface); border:1.5px solid var(--nl-line);
  border-radius:var(--nl-radius-md); cursor:pointer;
  font-family:inherit; color:var(--nl-ink); text-align:center;
  transition:transform .25s, border-color .25s, box-shadow .25s;
  display:flex; flex-direction:column; align-items:center; gap:12px;
  min-height:170px;
}
.nl-inst:hover{ transform:translateY(-3px); border-color:rgba(196,154,42,.5); box-shadow:var(--nl-shadow-md); }
.nl-inst:focus-visible{ outline:none; border-color:var(--nl-navy); box-shadow:0 0 0 3px rgba(10,26,51,.12); }
.nl-inst-logo{
  width:72px; height:72px; border-radius:12px;
  background:#fff; border:1px solid var(--nl-line-2);
  padding:8px; display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.nl-inst-logo img{ max-width:100%; max-height:100%; object-fit:contain; }
.nl-inst-logo.fallback{
  background:linear-gradient(135deg, var(--nl-navy), var(--nl-navy-2));
  color:#fff;
  font-family:'Playfair Display',Georgia,serif;
  font-weight:700; font-size:22px; letter-spacing:-.5px;
  border-color:transparent;
}
.nl-inst-name{
  font-size:13.5px; font-weight:600; line-height:1.35;
  color:var(--nl-ink); margin:0;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
}
.nl-inst-code{
  font-family:'DM Mono','SF Mono',Consolas,monospace;
  font-size:10px; letter-spacing:.14em;
  color:var(--nl-gold); font-weight:600;
  padding:2px 8px; border:1px solid var(--nl-gold-soft);
  background:var(--nl-gold-soft); border-radius:5px;
}

/* ── Department picker (Step 4 — HOD only) ────────────────────────── */
.nl-depts-wrap{ position:relative; }
.nl-search{
  width:100%; padding:13px 16px 13px 42px; font-size:14.5px;
  border:1.5px solid var(--nl-line); border-radius:var(--nl-radius-sm);
  background:var(--nl-surface); color:var(--nl-ink);
  font-family:inherit; outline:none;
  transition:border-color .2s, box-shadow .2s;
  margin-bottom:16px;
}
.nl-search:focus{ border-color:var(--nl-navy); box-shadow:0 0 0 3px rgba(10,26,51,.10); }
.nl-search-ic{
  position:absolute; left:14px; top:14px; color:var(--nl-muted); pointer-events:none;
}
.nl-depts{ display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:10px; }
.nl-dept{
  padding:13px 16px; background:var(--nl-surface);
  border:1.5px solid var(--nl-line); border-radius:var(--nl-radius-sm);
  font-family:inherit; font-size:14px; color:var(--nl-ink);
  text-align:left; cursor:pointer;
  transition:all .2s; display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.nl-dept:hover{ border-color:var(--nl-navy); background:#f7f9fc; }
.nl-dept svg{ color:var(--nl-muted); flex-shrink:0; }
.nl-dept:hover svg{ color:var(--nl-gold); }

/* ── Credentials form (Step 5) ────────────────────────────────────── */
.nl-creds-card{
  background:var(--nl-surface); border:1px solid var(--nl-line);
  border-radius:var(--nl-radius-lg); padding:32px;
  box-shadow:var(--nl-shadow-md);
  max-width:480px; margin:0 auto;
}
.nl-creds-scope{
  display:flex; align-items:center; gap:14px;
  padding:14px 16px; margin:-8px -8px 22px;
  background:var(--nl-surface-2); border-radius:var(--nl-radius-md);
  border:1px solid var(--nl-line-2);
}
.nl-creds-scope-logo{
  width:46px; height:46px; border-radius:10px;
  background:#fff; border:1px solid var(--nl-line-2);
  padding:5px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.nl-creds-scope-logo img{ max-width:100%; max-height:100%; object-fit:contain; }
.nl-creds-scope-logo.fallback{
  background:linear-gradient(135deg, var(--nl-navy), var(--nl-navy-2));
  color:#fff;
  font-family:'Playfair Display',Georgia,serif;
  font-weight:700; font-size:16px; border-color:transparent;
}
.nl-creds-scope-bd{ flex:1; min-width:0; }
.nl-creds-scope-meta{
  font-family:'DM Mono','SF Mono',Consolas,monospace;
  font-size:10px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--nl-gold); font-weight:600;
}
.nl-creds-scope-name{
  font-size:13.5px; font-weight:600; color:var(--nl-ink);
  line-height:1.35; margin:2px 0 0;
}

.nl-fld{ margin-bottom:14px; }
.nl-lbl{
  display:block; font-size:13px; font-weight:600; color:var(--nl-ink);
  margin-bottom:6px; letter-spacing:.1px;
}
.nl-lbl-req{ color:var(--nl-gold); margin-left:2px; }

.nl-input{
  width:100%; padding:12px 14px; font-size:14.5px;
  border:1.5px solid var(--nl-line); border-radius:var(--nl-radius-sm);
  background:var(--nl-surface); color:var(--nl-ink);
  font-family:inherit; outline:none;
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.nl-input:focus{ border-color:var(--nl-navy); box-shadow:0 0 0 3px rgba(10,26,51,.10); }
.nl-input:disabled{ background:var(--nl-line-2); color:var(--nl-muted); cursor:not-allowed; }
.nl-input::placeholder{ color:#a8b0c2; }

.nl-pw{ position:relative; }
.nl-pw .nl-input{ padding-right:46px; }
.nl-pw-eye{
  position:absolute; right:8px; top:50%; transform:translateY(-50%);
  width:34px; height:34px; border-radius:6px;
  background:none; border:none; cursor:pointer;
  color:var(--nl-muted);
  display:flex; align-items:center; justify-content:center;
  transition:color .2s, background .2s;
}
.nl-pw-eye:hover{ color:var(--nl-navy); background:var(--nl-line-2); }

.nl-btn-primary{
  width:100%; margin-top:8px;
  padding:14px 20px; font-size:14.5px; font-weight:600;
  letter-spacing:.2px; color:#fff;
  background:linear-gradient(135deg, var(--nl-navy) 0%, var(--nl-navy-2) 100%);
  border:none; border-radius:var(--nl-radius-sm);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:10px;
  font-family:inherit;
  transition:transform .15s, box-shadow .25s, opacity .2s;
  box-shadow:0 6px 16px -6px rgba(10,26,51,.55);
  position:relative; overflow:hidden;
}
.nl-btn-primary::before{
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, var(--nl-gold) 0%, var(--nl-gold-lt) 100%);
  opacity:0; transition:opacity .25s;
}
.nl-btn-primary > *{ position:relative; z-index:1; }
.nl-btn-primary:hover{ transform:translateY(-1px); box-shadow:0 10px 22px -8px rgba(10,26,51,.65); }
.nl-btn-primary:hover::before{ opacity:.18; }
.nl-btn-primary:active{ transform:translateY(0); }
.nl-btn-primary:disabled{ opacity:.6; cursor:wait; transform:none; }

.nl-creds-row{
  display:flex; align-items:center; justify-content:space-between;
  margin-top:14px; gap:10px; flex-wrap:wrap;
}
.nl-link{
  font-size:13.5px; color:var(--nl-navy); cursor:pointer;
  text-decoration:none; font-weight:500;
  transition:color .2s;
}
.nl-link:hover{ color:var(--nl-gold); text-decoration:underline; }
.nl-link.muted{ color:var(--nl-muted); }
.nl-link.muted:hover{ color:var(--nl-navy); }

.nl-msg{
  margin-top:12px; font-size:13.5px; line-height:1.5;
  padding:0; border-radius:var(--nl-radius-sm);
}
.nl-msg:not(:empty){ padding:10px 13px; }
.nl-msg.err, .nl-msg .ae{ color:var(--nl-danger); background:var(--nl-danger-soft); }
.nl-msg.ok{ color:#0d6f4a; background:#e6f6ee; }

.nl-foot{
  margin-top:22px; padding-top:18px; border-top:1px solid var(--nl-line-2);
  text-align:center; font-size:13.5px; color:var(--nl-muted);
}
.nl-foot a, .nl-foot span[data-link]{
  color:var(--nl-navy); font-weight:600; cursor:pointer; text-decoration:none;
}
.nl-foot a:hover, .nl-foot span[data-link]:hover{ color:var(--nl-gold); text-decoration:underline; }

/* ── Hidden cascade host (keeps existing IDs alive for JS) ────────── */
.nl-cascade-host{
  position:absolute !important; left:-9999px !important; top:auto !important;
  width:1px !important; height:1px !important; overflow:hidden !important;
  visibility:hidden !important;
}
.nl-cascade-host .role-panel{ display:none !important; }

/* ── Loading shimmer ──────────────────────────────────────────────── */
.nl-skel{
  position:relative; overflow:hidden;
  background:var(--nl-line-2); border-radius:var(--nl-radius-md);
}
.nl-skel::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.6), transparent);
  animation:nl-shimmer 1.2s ease-in-out infinite;
}
@keyframes nl-shimmer{
  0%  { transform:translateX(-100%); }
  100%{ transform:translateX(100%); }
}

/* ── Spinner (in-button) ──────────────────────────────────────────── */
.nl-spin{
  width:16px; height:16px; border-radius:50%;
  border:2px solid rgba(255,255,255,.3); border-top-color:#fff;
  animation:nl-spin .7s linear infinite;
}
@keyframes nl-spin{ to{ transform:rotate(360deg); } }

/* ── Responsive ───────────────────────────────────────────────────── */
@media (max-width: 1024px){
  #loginPage.nl-v2{ flex-direction:column; }
  .nl-brand{ flex:0 0 auto; padding:32px 28px 28px; }
  .nl-brand-mid{ padding-bottom:16px; gap:14px; }
  .nl-brand-feats{ display:none; }
  .nl-brand-bottom{ display:none; }
  .nl-wiz{ padding:28px 22px 36px; }
}
@media (max-width: 640px){
  .nl-roles{ grid-template-columns:1fr; }
  .nl-brand-title{ font-size:24px; }
  .nl-step-title{ font-size:24px; }
  .nl-creds-card{ padding:22px; }
  .nl-wiz-top{ margin-bottom:22px; }
  .nl-bead-rule{ width:14px; }
}

/* ═══════════════════════════════════════════════════════════════════
   ANIMATED ATMOSPHERE  (v2.1)
   Flowing gradient blobs + drifting particle field. Colours and
   palette are unchanged — only motion is added.
═══════════════════════════════════════════════════════════════════ */

/* Flowing gradient blobs in brand pane */
#loginPage.nl-v2 .nl-bg-flow{
  position:absolute; border-radius:50%; pointer-events:none;
  filter:blur(80px); will-change:transform;
}
#loginPage.nl-v2 .nl-bg-flow-1{
  width:520px; height:520px;
  background:radial-gradient(circle, rgba(196,154,42,.22) 0%, rgba(196,154,42,.08) 40%, transparent 70%);
  top:-120px; left:-160px;
  animation:nl-flow-1 24s ease-in-out infinite alternate;
}
#loginPage.nl-v2 .nl-bg-flow-2{
  width:640px; height:640px;
  background:radial-gradient(circle, rgba(38,92,180,.30) 0%, rgba(20,52,110,.15) 45%, transparent 75%);
  bottom:-220px; right:-200px;
  animation:nl-flow-2 32s ease-in-out infinite alternate;
}
#loginPage.nl-v2 .nl-bg-flow-3{
  width:360px; height:360px;
  background:radial-gradient(circle, rgba(224,192,116,.14) 0%, transparent 65%);
  top:35%; left:25%; opacity:.7;
  animation:nl-flow-3 18s ease-in-out infinite alternate;
}
@keyframes nl-flow-1{
  0%   { transform:translate(0,0)        scale(1);    }
  50%  { transform:translate(80px,40px)  scale(1.05); }
  100% { transform:translate(160px,90px) scale(1.10); }
}
@keyframes nl-flow-2{
  0%   { transform:translate(0,0)          scale(1);    }
  50%  { transform:translate(-90px,-50px)  scale(.95);  }
  100% { transform:translate(-150px,-120px) scale(1.08); }
}
@keyframes nl-flow-3{
  0%   { transform:translate(0,0);        opacity:.55; }
  100% { transform:translate(-60px,80px); opacity:.85; }
}

/* The static gold meridian line — give it a slow shimmer */
#loginPage.nl-v2 .nl-brand::after{
  animation:nl-meridian 5s ease-in-out infinite alternate;
}
@keyframes nl-meridian{

/* Particle field — two layers of star-like dots drifting upward.
   ::before and ::after are stacked 1000px apart so when one
   loops to the top, the other has just finished filling — the
   user perceives an endless gentle drift.                      */
#loginPage.nl-v2 .nl-particles{
  position:absolute; inset:0; overflow:hidden; pointer-events:none;
}
#loginPage.nl-v2 .nl-particles::before,
#loginPage.nl-v2 .nl-particles::after{
  content:''; position:absolute; left:0;
  width:2px; height:2px; border-radius:50%; background:transparent;
  will-change:transform;
}
#loginPage.nl-v2 .nl-particles::before{
  top:0;
  box-shadow:
    24px  120px rgba(255,255,255,.45), 78px  300px rgba(255,255,255,.30), 132px 60px  rgba(255,255,255,.50),
    186px 380px rgba(255,255,255,.25), 240px 200px rgba(255,255,255,.45), 294px 520px rgba(255,255,255,.30),
    348px 80px  rgba(255,255,255,.55), 402px 460px rgba(255,255,255,.25), 456px 260px rgba(255,255,255,.40),
    510px 620px rgba(255,255,255,.30), 564px 40px  rgba(255,255,255,.50), 618px 340px rgba(255,255,255,.25),
    50px  720px rgba(255,255,255,.35), 220px 800px rgba(255,255,255,.45), 380px 880px rgba(255,255,255,.25),
    540px 760px rgba(255,255,255,.50), 100px 540px rgba(255,255,255,.30), 320px 660px rgba(255,255,255,.40),
    480px 920px rgba(255,255,255,.30), 600px 580px rgba(255,255,255,.40);
  animation:nl-particle-drift 120s linear infinite;
}
#loginPage.nl-v2 .nl-particles::after{
  top:1000px; width:3px; height:3px;
  box-shadow:
    60px  150px rgba(224,192,116,.55), 160px 320px rgba(224,192,116,.40), 250px 80px  rgba(224,192,116,.50),
    340px 460px rgba(224,192,116,.35), 430px 220px rgba(224,192,116,.55), 520px 600px rgba(224,192,116,.40),
    100px 800px rgba(224,192,116,.45), 280px 900px rgba(224,192,116,.35), 460px 740px rgba(224,192,116,.50),
    580px 880px rgba(224,192,116,.40), 380px 540px rgba(224,192,116,.45), 200px 660px rgba(224,192,116,.55);
  animation:nl-particle-drift 120s linear infinite;
}
@keyframes nl-particle-drift{
  from { transform:translateY(0); }
  to   { transform:translateY(-1000px); }
}

/* Wizard pane: a much subtler twin atmosphere — light side, faint */
#loginPage.nl-v2 .nl-wiz-atmos{
  position:absolute; inset:0; pointer-events:none; z-index:0; overflow:hidden;
}
#loginPage.nl-v2 .nl-wiz-atmos::before,
#loginPage.nl-v2 .nl-wiz-atmos::after{
  content:''; position:absolute; border-radius:50%;
  filter:blur(40px); will-change:transform;
}
#loginPage.nl-v2 .nl-wiz-atmos::before{
  width:520px; height:520px;
  background:radial-gradient(circle, rgba(196,154,42,.06) 0%, transparent 65%);
  top:-180px; right:-180px;
  animation:nl-flow-3 22s ease-in-out infinite alternate;
}
#loginPage.nl-v2 .nl-wiz-atmos::after{
  width:420px; height:420px;
  background:radial-gradient(circle, rgba(20,52,110,.05) 0%, transparent 65%);
  bottom:-160px; left:-180px;

/* Lift wizard content above its atmosphere */
#loginPage.nl-v2 .nl-wiz > .nl-wiz-top,
#loginPage.nl-v2 .nl-wiz > #nl-step-host,
#loginPage.nl-v2 .nl-wiz > .nl-cascade-host{ position:relative; z-index:1; }

/* Card hover gets a soft glow that picks up the gold accent */
#loginPage.nl-v2 .nl-role:hover,
#loginPage.nl-v2 .nl-campus:hover,

/* Step transition refinement — slide a touch from the right */

/* Respect users who prefer reduced motion: pause every animation */

/* --- Style Block #10 --- */
/* ═══════════════════════════════════════════════════
     Inline-mount overrides for the embedded IPM portal
     ═══════════════════════════════════════════════════
     When the IPM is rendered inline inside the main app's content area,
     its own topbar becomes redundant — the main app already shows the
     user name, role, logout, breadcrumb, etc.  Hide it.  We also remove
     the top padding from .content so the inner page starts flush with
     the main app's topbar instead of leaving a large empty band.
     These rules are scoped under #ipm-root so they affect ONLY the
     embedded IPM and nothing else.
  */
  #ipm-root .topbar { display: none !important; }
  #ipm-root .content { padding-top: 0 !important; }
  /* Also hide the IPM's own login/modal/toast overlays while embedded —
     the main app owns those concerns. (Login view never shows anyway
     because the user is pre-authenticated.) */
  #ipm-root #view-login { display: none !important; }

<style>

<style>

<style>
/* ═══════════════════════════════════════════════════════════════════════
   MERIDIAN POLISH LAYER · PHASE 4 — MOTION & INTERACTION
   Append-only. Sits after Phase 3 at the end of IndexStyles.html.
   Delete this block to fully revert Phase 4.

   Motion doctrine: ONE entrance moment per surface, three micro-
   interactions everywhere (button lift/press and focus rings shipped
   in v1; input ring bloom rides the existing input transitions).
     §1  Page entrance — setMain() rebuilds #mainContent on every
         navigation, so a CSS animation on its children replays
         naturally on each page switch. Zero JS.
     §2  Skeleton shimmer — .skeleton placeholders existed in markup
         but had no styles at all; they now shimmer.
     §3  Status-pill entrance — gentle pop when pills render
     §4  Toast — slide-up entrance + gold signature edge
     §5  Modal blur re-win — the slate layer's backdrop-filter:none
         !important was silently defeating v1's blur
   Honestly skipped (would require JS/markup, parked for sign-off):
   the sliding sidebar indicator (needs a shared indicator element)
   and the approve/reject row flash (CSS alone cannot distinguish a
   status change from an ordinary re-render, so it would flash on
   every table load).
   All motion respects prefers-reduced-motion via v1 §8.
   ═══════════════════════════════════════════════════════════════════════ */

@keyframes mplPageIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:none}
}
@keyframes mplPillIn{
  from{opacity:0;transform:scale(.88)}
  to{opacity:1;transform:none}
}
@keyframes mplToastIn{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes mplShimmer{
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}

/* ─────────────────────────────────────────────────────────────
   §1 · PAGE ENTRANCE — orchestrated stagger on navigation
   ───────────────────────────────────────────────────────────── */
#appShell #mainContent > *{
  animation:mplPageIn .28s cubic-bezier(.16,1,.3,1) both;
}
#appShell #mainContent > *:nth-child(2){animation-delay:.04s;}
#appShell #mainContent > *:nth-child(3){animation-delay:.08s;}
#appShell #mainContent > *:nth-child(4){animation-delay:.12s;}
#appShell #mainContent > *:nth-child(n+5){animation-delay:.15s;}

/* ─────────────────────────────────────────────────────────────
   §2 · SKELETON SHIMMER — placeholders were completely unstyled
   ───────────────────────────────────────────────────────────── */
.skeleton{
  position:relative;
  overflow:hidden;
  background:var(--ivory-2);
  border-radius:var(--r8);
}
.skeleton::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.65) 50%,transparent 100%);
  animation:mplShimmer 1.4s ease-in-out infinite;
}

/* ─────────────────────────────────────────────────────────────
   §3 · STATUS-PILL ENTRANCE
   ───────────────────────────────────────────────────────────── */
.bdg, .chip, .rch-chip{
  animation:mplPillIn .2s cubic-bezier(.34,1.4,.64,1) both;
}

/* ─────────────────────────────────────────────────────────────
   §4 · TOAST — entrance + gold signature edge
   ───────────────────────────────────────────────────────────── */
#toast.show{
  animation:mplToastIn .28s cubic-bezier(.16,1,.3,1) both;
}
#toast{
  border-left:3px solid var(--gold) !important;
}
/* IPM toast gets the same signature edge (!important — IPMStyles loads later) */
#ipm-root .toast{
  border-left:3px solid var(--gold) !important;
}

/* ─────────────────────────────────────────────────────────────
   §6 · PRINT & PDF GUARD — animations must never reach exports.
   A cloned/printed DOM can freeze on an animation's opacity:0
   first frame, producing invisible content.
   ───────────────────────────────────────────────────────────── */
.pdf-print-root *,
.pdf-print-root .bdg,
.pdf-print-root .chip{
  animation:none !important;
}
@media print{
  *, *::before, *::after{
    animation:none !important;
    transition:none !important;
  }
}

<style>
/* --- Style Block #1 --- */
/* ══════════════════════════════════════════════════════════
   DESIGN SYSTEM — Meridian Authority
   Theme: Sovereign Academic (Custom)
   Palette: Deep Ultramarine · Burnished Gold · Cool Ivory · Warm Slate
   Type: Playfair Display (headings) + Inter (body) + DM Mono (data)
══════════════════════════════════════════════════════════ */
:root{
  /* ── SOVEREIGN ACADEMIC PALETTE ── */
  --navy:    #0C1E3C;
  --navy-2:  #102B52;
  --navy-3:  #1A3D72;
  --navy-4:  #234E8A;
  --gold:    #C49A2A;
  --gold-lt: #E8B84B;
  --gold-dk: #7A5C0D;
  --gold-pale:#FBF1D8;
  --ivory:   #F5F7FB;
  --ivory-2: #E8ECF4;
  --ivory-3: #C8D0E0;
  --slate:   #0E2038;
  --slate-lt:#2C4460;
  --slate-2: #4A6280;
  --white:   #FFFFFF;
  --text:    #070F1C;
  --text-lt: #1A2E46;

  /* ── STATUS PALETTE (accessible contrast on light bg) ── */
  --green:   #095C35; --green-bg: #C3EFD8;
  --amber:   #6B3800; --amber-bg: #FCE0A8;
  --red:     #7A1010; --red-bg:   #FBCECE;
  --blue:    #0A3070; --blue-bg:  #C0D5F8;
  --purple:  #3D0D6A; --purple-bg:#E0CCFA;
  --teal:    #0A3E3E; --teal-bg:  #AADEDF;

  /* ── RADIUS ── */
  --r4:4px; --r8:8px; --r12:12px; --r16:16px;

  /* ── SHADOW SYSTEM ── */
  --shadow-xs: 0 1px 3px rgba(7,15,28,.08);
  --shadow-sm: 0 2px 8px rgba(7,15,28,.10), 0 1px 2px rgba(7,15,28,.06);
  --shadow-md: 0 4px 20px rgba(7,15,28,.13), 0 2px 6px rgba(7,15,28,.07);
  --shadow-lg: 0 10px 40px rgba(7,15,28,.18), 0 4px 10px rgba(7,15,28,.08);
  --shadow-gold: 0 4px 18px rgba(196,154,42,.28);

  /* ── TRANSITIONS ── */
  --ease: cubic-bezier(.4,0,.2,1);
  --trans: all .2s cubic-bezier(.4,0,.2,1);
}

*{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--ivory);
  color:var(--text);
  height:100%;
  font-size:15px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
input,select,textarea,button{font-family:'Inter',system-ui,-apple-system,sans-serif;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--ivory-3);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:var(--slate-lt);}

/* ══════════════════════════════════════════════════════════
   LOGIN PAGE
══════════════════════════════════════════════════════════ */
#loginPage{
  min-height:100vh;display:none;align-items:stretch;
}
#loginPage.active{display:flex;}

.login-left{
  flex:1;
  background:
    radial-gradient(900px 700px at -5% 10%, rgba(196,154,42,.07), transparent 55%),
    radial-gradient(700px 600px at 105% 90%, rgba(26,61,114,.35), transparent 55%),
    linear-gradient(160deg, #050D1E 0%, #0C1E3C 45%, #0D2244 100%);
  color:#e2e8f0;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:clamp(32px,4vw,56px) clamp(32px,5vw,68px);position:relative;
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:none;-ms-overflow-style:none;
}
.login-left::-webkit-scrollbar{display:none;width:0;height:0;}
/* Fine diagonal grid — academic ruled-paper feel */
.login-left::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(196,154,42,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(196,154,42,.028) 1px, transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse 70% 80% at 20% 40%, rgba(0,0,0,.75) 0%, rgba(0,0,0,.2) 60%, transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 70% 80% at 20% 40%, rgba(0,0,0,.75) 0%, rgba(0,0,0,.2) 60%, transparent 100%);
}
/* Gold meridian line — left edge */
.login-left::after{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;z-index:2;
  background:linear-gradient(180deg,transparent 0%,var(--gold) 20%,var(--gold-lt) 50%,var(--gold) 80%,transparent 100%);
  opacity:.7;
  box-shadow:0 0 28px rgba(196,154,42,.35);
}
.login-left > *{position:relative;z-index:1;}
/* Gold orb glow bottom-right */
.ll-orb{
  position:absolute;pointer-events:none;z-index:0;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle, rgba(196,154,42,.08) 0%, rgba(196,154,42,.03) 35%, transparent 65%);
  right:-200px;bottom:-200px;filter:blur(2px);
}
.ll-accent-bar{display:none;}
/* HUD tag strip */
.ll-hud-tag{
  display:inline-flex;align-items:center;gap:10px;
  font-family:'DM Mono','SFMono-Regular',Consolas,monospace;
  font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(196,154,42,.85);
  padding:6px 12px;border:1px solid rgba(196,154,42,.25);border-radius:6px;
  background:rgba(12,30,60,.6);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:ll-fade-up .6s ease both;
}
.ll-hud-dot{
  width:6px;height:6px;border-radius:50%;background:var(--gold);
  box-shadow:0 0 0 0 rgba(196,154,42,.5);
  animation:ll-dot-pulse-g 2.2s ease-in-out infinite;
}
@keyframes ll-dot-pulse-g{
  0%,100%{box-shadow:0 0 0 0 rgba(196,154,42,.6)}
  50%{box-shadow:0 0 0 8px rgba(196,154,42,0)}
}
.ll-hud-node{
  margin-left:6px;padding:2px 7px;border-radius:4px;
  background:rgba(196,154,42,.12);color:var(--gold-lt);border:1px solid rgba(196,154,42,.2);
  font-size:9px;
}
@keyframes ll-fade-up{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:none}
}
.ll-top{position:relative;z-index:1;margin-bottom:28px;}
.ll-hr{display:none;}
.ll-content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 0 28px;gap:20px;}
.ll-badge{
  font-family:'Playfair Display',serif;
  font-size:clamp(28px,3.8vw,46px);font-weight:700;line-height:1.1;
  color:#f1f5f9;margin:0;letter-spacing:-.3px;
  background:linear-gradient(135deg,#ffffff 0%,#e8d9b4 45%,#c4a86a 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:ll-fade-up .7s .05s ease both;
}
.ll-badge span{display:none;}
.ll-title{
  font-family:'DM Mono','SFMono-Regular',monospace;
  font-size:clamp(11px,1.1vw,13px);font-weight:500;
  letter-spacing:.22em;text-transform:uppercase;
  color:rgba(196,154,42,.85);margin:0;
  animation:ll-fade-up .7s .1s ease both;
}
.ll-title em{color:rgba(255,255,255,.75);font-style:normal;}
.ll-title::before{content:'// ';color:rgba(196,154,42,.45);}
.ll-desc{
  font-size:15px;color:rgba(226,232,240,.68);line-height:1.75;
  max-width:440px;margin:0 0 10px;
  animation:ll-fade-up .7s .15s ease both;
}
/* Stat tile grid */
.ll-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  animation:ll-fade-up .8s .2s ease both;
}
.ll-stat{
  position:relative;padding:14px 16px 12px;
  background:rgba(12,30,60,.55);
  border:1px solid rgba(196,154,42,.14);border-radius:10px;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  transition:border-color .25s,transform .25s,box-shadow .25s;
  overflow:hidden;
}
.ll-stat::before{
  content:'';position:absolute;inset:0;border-radius:10px;pointer-events:none;
  background:linear-gradient(135deg, rgba(196,154,42,.2), transparent 40%, transparent 60%, rgba(196,154,42,.12));
  opacity:0;transition:opacity .3s;
}
.ll-stat:hover{transform:translateY(-2px);border-color:rgba(196,154,42,.35);box-shadow:0 8px 24px rgba(196,154,42,.12);}
.ll-stat:hover::before{opacity:.25;}
.ll-stat-lbl{
  font-family:'DM Mono','SFMono-Regular',Consolas,monospace;
  font-size:10px;font-weight:600;letter-spacing:.2em;
  color:rgba(196,154,42,.82);margin-bottom:6px;
}
.ll-stat-val{
  font-family:'DM Mono','SFMono-Regular',Consolas,monospace;
  font-size:30px;font-weight:700;line-height:1;
  color:#f8f4ec;font-variant-numeric:tabular-nums;
  margin-bottom:6px;
}
.ll-stat-unit{font-size:15px;color:var(--gold-lt);font-weight:500;margin-left:2px;}
.ll-stat-sub{
  display:flex;align-items:center;gap:8px;
  font-size:11.5px;color:rgba(200,210,225,.60);line-height:1.3;
}
.ll-stat-bar{
  width:12px;height:2px;background:var(--gold);flex-shrink:0;border-radius:2px;
  box-shadow:0 0 6px rgba(196,154,42,.5);
}
.ll-features{display:none;}
/* Bottom HUD strip */
.ll-bottom{
  position:relative;z-index:1;
  border-top:1px solid rgba(196,154,42,.12);padding-top:16px;margin-top:18px;
}
.ll-hud-bar{
  display:flex;align-items:center;flex-wrap:wrap;gap:10px;
  font-family:'DM Mono','SFMono-Regular',Consolas,monospace;
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(196,154,42,.65);
  animation:ll-fade-up .8s .25s ease both;
}
.ll-hud-pulse{
  width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;
  box-shadow:0 0 0 0 rgba(34,197,94,.55);
  animation:ll-dot-pulse-g 2.2s ease-in-out infinite;
}
@keyframes ll-dot-pulse-g{
  0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}
  50%{box-shadow:0 0 0 8px rgba(34,197,94,0)}
}
.ll-hud-k{color:rgba(196,154,42,.45);}
.ll-hud-v{color:rgba(255,248,235,.88);font-weight:600;letter-spacing:.12em;}
.ll-hud-sep{color:rgba(196,154,42,.25);margin:0 2px;}
.ll-footer{font-size:12px;color:rgba(220,215,200,.5);letter-spacing:.5px;line-height:1.8;}
.ll-footer b{color:rgba(196,154,42,.82);font-weight:600;}

/* ══════════════════════════════════════════════════════════
   RIGHT PANEL — Sovereign Academic Login Card
══════════════════════════════════════════════════════════ */
.login-right{
  width:520px;flex-shrink:0;
  background:var(--ivory);
  display:flex;align-items:center;justify-content:center;
  padding:52px 56px;
  border-left:1px solid var(--ivory-2);
}
.lform{width:100%;}
.lform-logo{
  display:flex;align-items:center;gap:14px;
  margin-bottom:32px;padding-bottom:24px;
  border-bottom:2px solid var(--ivory-2);
  max-width:100%;overflow:hidden;
  flex-wrap:wrap;
}
/* Logo image — keep it inside the card. The inline style on the <img>
   sets height:65px;width:auto, which makes the natural image width
   ~3x larger than the .lform card can hold on 500px-wide screens and
   beyond, so it overflowed the right edge (visible as the NAAC + DSIR
   badges getting cut off). Force the image to shrink to the card. */
.lform-logo img{
  max-width:100% !important;
  height:auto !important;
  max-height:54px !important;
  object-fit:contain !important;
}
.lform-logo-icon{
  width:46px;height:46px;border-radius:10px;
  background:var(--navy);display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  box-shadow:0 4px 14px rgba(12,30,60,.22);
}
.lform-logo-text strong{
  display:block;font-size:15px;font-weight:700;
  color:var(--navy);letter-spacing:-.1px;
}
.lform-logo-text span{font-size:13px;color:var(--slate-2);margin-top:1px;display:block;}
.lform h2{
  font-family:'Playfair Display',serif;
  font-size:26px;font-weight:700;color:var(--navy);margin-bottom:5px;letter-spacing:-.2px;
}
.lform p{font-size:15px;color:var(--slate-lt);margin-bottom:22px;line-height:1.65;}
.lform label{
  display:block;font-size:12px;font-weight:700;
  color:var(--slate-lt);letter-spacing:.7px;text-transform:uppercase;margin-bottom:6px;
}
.lform select,
.lform input[type=password],
.lform input[type=text],
.lform input[type=email],
.lform input:not([type]){
  width:100%;padding:12px 16px;
  border:1.5px solid var(--ivory-3);border-radius:var(--r8);
  font-size:15px;color:var(--text);background:var(--white);
  transition:var(--trans);margin-bottom:14px;outline:none;
  box-shadow:var(--shadow-xs);font-family:inherit;
}
.lform select:focus,
.lform input[type=password]:focus,
.lform input[type=text]:focus,
.lform input[type=email]:focus,
.lform input:not([type]):focus{
  border-color:var(--navy-3);background:var(--white);
  box-shadow:0 0 0 3px rgba(12,30,60,.08);
}
.lbtn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
  color:var(--white);
  border:none;border-radius:var(--r8);font-size:15px;font-weight:700;
  cursor:pointer;transition:var(--trans);letter-spacing:.6px;text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 20px rgba(12,30,60,.35),0 1px 3px rgba(12,30,60,.2);
  position:relative;overflow:hidden;
}
.lbtn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(196,154,42,.18) 0%,transparent 60%);
  pointer-events:none;border-radius:inherit;
}
.lbtn:hover:not(:disabled){
  background:linear-gradient(135deg,var(--navy-2) 0%,var(--navy-3) 100%);
  box-shadow:0 6px 28px rgba(12,30,60,.42),0 2px 6px rgba(12,30,60,.18);
  transform:translateY(-1px);
}
.lbtn:active:not(:disabled){transform:translateY(0);}
.lbtn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.lhint{
  text-align:center;margin-top:18px;padding:12px 16px;
  background:var(--ivory);border-radius:var(--r8);
  border:1px solid var(--ivory-2);
  font-size:13px;color:var(--slate-2);line-height:2;
}
.lhint b{color:var(--navy);font-weight:700;}
#loginMsg{margin-top:14px;}

/* ══════════════════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════════════════ */
#appShell{display:none;flex-direction:column;height:100vh;}

/* ── TOPBAR — Meridian Authority ── */
.topbar{
  height:62px;
  background:linear-gradient(135deg,#050D1E 0%,var(--navy) 50%,#0E2448 100%);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;flex-shrink:0;z-index:100;
  border-bottom:1px solid rgba(196,154,42,.25);
  box-shadow:0 2px 16px rgba(7,15,28,.28),0 1px 3px rgba(7,15,28,.18);
}
/* Gold meridian accent strip under topbar */
.topbar::after{
  content:'';position:absolute;left:0;right:0;bottom:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--gold) 25%,var(--gold-lt) 50%,var(--gold) 75%,transparent 100%);
  opacity:.6;
}
.topbar{position:relative;}
.tb-left{display:flex;align-items:center;gap:16px;}
.tb-logo-box{
  height:46px;padding:0 10px;border-radius:9px;
  background:rgba(255,255,255,.09);border:1px solid rgba(196,154,42,.28);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07);
}
.tb-brand strong{display:block;font-size:15px;font-weight:700;color:var(--white);letter-spacing:-.1px;}
.tb-brand span{font-size:12px;color:rgba(255,255,255,.58);letter-spacing:.4px;}
.tb-divider{width:1px;height:28px;background:rgba(255,255,255,.1);margin:0 8px;}
.tb-breadcrumb{font-size:14px;color:rgba(255,255,255,.72);font-weight:400;}
.tb-breadcrumb b{color:var(--gold-lt);font-weight:600;}
.tb-right{display:flex;align-items:center;gap:12px;}
.role-pill{
  padding:5px 14px;border-radius:100px;font-size:12px;font-weight:700;letter-spacing:.5px;
  border:1px solid;
}
.rp-FACULTY{background:rgba(9,92,53,.3);border-color:rgba(9,150,70,.5);color:#4ade80;}
.rp-HOD{background:rgba(10,48,112,.3);border-color:rgba(26,100,200,.5);color:#7db8ff;}
.rp-HOI{background:rgba(61,13,106,.3);border-color:rgba(100,40,180,.5);color:#c084fc;}
.rp-IMO{background:rgba(120,60,0,.3);border-color:rgba(196,154,42,.45);color:#e8b84b;}
.tb-user{font-size:14px;color:rgba(255,255,255,.82);font-weight:400;}
.btn-logout{
  padding:7px 18px;border-radius:100px;
  background:transparent;border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.88);font-size:13px;cursor:pointer;font-weight:500;
  transition:var(--trans);letter-spacing:.1px;
}
.btn-logout:hover{background:rgba(255,255,255,.1);color:var(--white);border-color:rgba(196,154,42,.4);}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR — Refined Authority ── */
.sidenav{
  width:252px;background:var(--white);flex-shrink:0;
  border-right:1px solid var(--ivory-2);
  display:flex;flex-direction:column;overflow-y:auto;
  box-shadow:1px 0 4px rgba(7,15,28,.05);
}
.nav-header{padding:22px 20px 10px;}
.nav-header span{
  font-size:11px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;
  color:var(--slate-2);
}
.nitem{
  display:flex;align-items:center;gap:11px;
  padding:10px 16px 10px 20px;font-size:14px;color:var(--slate-lt);
  cursor:pointer;border-left:3px solid transparent;
  transition:var(--trans);user-select:none;position:relative;
  margin:1px 8px 1px 0;border-radius:0 var(--r8) var(--r8) 0;
  font-weight:500;
}
.nitem:hover{background:var(--ivory);color:var(--navy);}
.nitem.active{
  background:linear-gradient(90deg,rgba(12,30,60,.06) 0%,rgba(12,30,60,.02) 100%);
  color:var(--navy);font-weight:700;
  border-left-color:var(--gold);
  box-shadow:inset 0 0 0 0 transparent;
}
.nitem .ni{
  width:30px;height:30px;border-radius:var(--r8);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  background:var(--ivory);flex-shrink:0;transition:var(--trans);
}
.nitem.active .ni{background:var(--gold-pale);color:var(--gold-dk);}
.nitem:hover .ni{background:var(--ivory-2);}
.nitem .nlbl{flex:1;}
.nav-footer{margin-top:auto;padding:8px 14px 12px;border-top:1px solid var(--ivory-2);}
.nav-footer p{font-size:12px;color:var(--slate-2);line-height:1.75;}
.nav-footer b{color:var(--gold-dk);font-weight:700;}

/* ── Deadline badge — lives in the topbar ── */
.dl-badge{
  display:inline-flex;align-items:center;gap:7px;
  padding:4px 10px 4px 8px;border-radius:100px;
  background:transparent;
  border:1.5px solid rgba(196,154,42,.50);
  transition:background .3s,border-color .3s;
  flex-shrink:0;
}
.dl-badge-icon{font-size:13px;flex-shrink:0;line-height:1;}
.dl-badge-body{display:flex;flex-direction:column;gap:0;min-width:0;}
.dl-badge-label{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:rgba(196,154,42,.90);line-height:1.2;}
.dl-badge-time{font-size:11px;font-weight:600;color:rgba(255,255,255,.88);line-height:1.3;white-space:nowrap;}
.dl-badge-sub{font-size:11px;color:var(--slate-2);margin:0;line-height:1.4;padding-left:1px;}

/* Friday — due today warning */
.dl-badge.dl-warn{
  background:rgba(239,68,68,.15);
  border-color:rgba(239,68,68,.65);
  animation:dl-pulse 2.2s ease-in-out infinite;
}
.dl-badge.dl-warn .dl-badge-label{color:rgba(252,165,165,.95);}
.dl-badge.dl-warn .dl-badge-time{color:#fff;font-weight:700;}
@keyframes dl-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4);}
  50%{box-shadow:0 0 0 4px rgba(239,68,68,.0);}
}

/* Friday after 3PM — deadline passed */
.dl-badge.dl-over{
  background:rgba(185,28,28,.22);
  border-color:rgba(239,68,68,.75);
}
.dl-badge.dl-over .dl-badge-label{color:rgba(252,165,165,.95);}
.dl-badge.dl-over .dl-badge-time{color:#fff;font-weight:700;}

/* MAIN CONTENT */
.main{flex:1;padding:32px 36px;overflow-y:auto;background:var(--ivory);}
.ph{margin-bottom:26px;}
.ph-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.ph h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--navy);line-height:1.2;letter-spacing:-.2px;}
.ph p{font-size:15px;color:var(--slate-lt);margin-top:5px;max-width:560px;line-height:1.65;}
.ph-actions{flex-shrink:0;}

/* ══ STAT CARDS ══ */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px;}
.scard{
  background:var(--white);border-radius:var(--r12);padding:22px 20px;
  border:1px solid var(--ivory-2);border-top:none;position:relative;overflow:hidden;
  transition:var(--trans);cursor:default;
  box-shadow:var(--shadow-sm);
}
.scard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:var(--navy);border-radius:var(--r12) var(--r12) 0 0;
}
.scard.sc-g::before{background:linear-gradient(90deg,var(--green),#0d7a47);}
.scard.sc-a::before{background:linear-gradient(90deg,#c06800,#e07800);}
.scard.sc-r::before{background:linear-gradient(90deg,var(--red),#a01818);}
.scard.sc-p::before{background:linear-gradient(90deg,var(--purple),#5a1a8a);}
.scard.sc-t::before{background:linear-gradient(90deg,var(--teal),#0d5a5a);}
.scard:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.snum{font-family:'DM Mono',monospace;font-size:36px;font-weight:500;color:var(--navy);line-height:1;}
.sc-g .snum{color:var(--green);}
.sc-a .snum{color:#b45309;}
.sc-r .snum{color:var(--red);}
.sc-p .snum{color:var(--purple);}
.sc-t .snum{color:var(--teal);}
.slbl{font-size:13px;color:var(--slate-2);margin-top:8px;font-weight:500;letter-spacing:.3px;}
.scard-icon{position:absolute;right:16px;top:20px;font-size:24px;opacity:.12;}

/* ══ CARDS ══ */
.card{
  background:var(--white);border-radius:var(--r12);padding:24px;
  border:1px solid var(--ivory-2);margin-bottom:20px;
  box-shadow:var(--shadow-sm);
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--ivory-2);
}
.card-header h3{
  font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--navy);letter-spacing:-.1px;
}
.card-subtitle{font-size:14px;color:var(--slate-2);margin-top:3px;}

/* ══ FORMS ══ */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.fg{display:flex;flex-direction:column;gap:6px;}
.fg.full{grid-column:1/-1;}
.fg.c3{grid-column:span 1;}
.fg label{
  font-size:12px;font-weight:700;color:var(--slate-lt);
  letter-spacing:.6px;text-transform:uppercase;
}
.fg input,.fg select,.fg textarea{
  padding:10px 14px;border:1.5px solid var(--ivory-3);
  border-radius:var(--r8);font-size:15px;color:var(--text);
  background:var(--white);transition:var(--trans);outline:none;
  box-shadow:var(--shadow-xs);
}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  border-color:var(--navy-3);box-shadow:0 0 0 3px rgba(12,30,60,.07);
}
.fg textarea{resize:vertical;min-height:88px;line-height:1.6;}
.sdiv{
  grid-column:1/-1;
  display:flex;align-items:center;gap:12px;
  font-size:12px;font-weight:700;color:var(--navy);
  text-transform:uppercase;letter-spacing:.8px;
  padding:6px 0;margin-top:4px;
}
.sdiv::before{content:'';width:20px;height:2.5px;background:var(--gold);border-radius:2px;flex-shrink:0;}
.sdiv::after{content:'';flex:1;height:1px;background:var(--ivory-2);}
/* ── Faculty profile card ── */
.fac-profile-card{display:flex;align-items:center;gap:14px;background:var(--ivory);border:1.5px solid var(--ivory-3);border-radius:var(--r12);padding:14px 18px;}
.fac-profile-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-3) 100%);color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:.5px;box-shadow:0 2px 8px rgba(12,30,60,.2);}
.fac-profile-name{font-size:16px;font-weight:700;color:var(--navy);line-height:1.3;}
.fac-profile-meta{font-size:13px;color:var(--slate-2);margin-top:2px;}
.fac-profile-badge{margin-left:auto;background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0;}
/* ── Declaration radio group ── */
.declare-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:2px;}
.declare-opt{display:flex;align-items:center;gap:8px;padding:12px 18px;border:1.5px solid var(--ivory-3);border-radius:var(--r8);cursor:pointer;font-size:14px;font-weight:500;color:var(--slate-lt);background:var(--white);transition:all .15s;flex:1;min-width:180px;}
.declare-opt:hover{border-color:var(--navy);color:var(--navy);}
.declare-opt input[type=radio]{accent-color:var(--navy);width:16px;height:16px;flex-shrink:0;cursor:pointer;}
.declare-opt.selected-yes{background:#f0fdf4;border-color:#10b981;color:#065f46;}
.declare-opt.selected-no{background:#fff1f2;border-color:#ef4444;color:#991b1b;}

/* ══ TIMESHEET ══ */
.dtabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.dtab{
  padding:7px 20px;border-radius:100px;
  border:1.5px solid var(--ivory-3);background:var(--white);
  font-size:14px;cursor:pointer;font-weight:600;color:var(--slate-lt);
  transition:var(--trans);
}
.dtab:hover{border-color:var(--navy-3);color:var(--navy);}
.dtab.active{background:var(--navy);color:var(--gold-lt);border-color:var(--navy);box-shadow:0 2px 10px rgba(12,30,60,.28);}
.dpanel{display:none;}
.dpanel.active{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.ts-grid{display:grid;gap:8px;}
.srow{
  display:grid;grid-template-columns:200px 1fr;gap:12px;align-items:center;
  padding:10px 14px;background:var(--ivory);
  border-radius:var(--r8);border:1px solid var(--ivory-2);
  transition:border-color .15s;
}
.srow:hover{border-color:var(--ivory-3);}
.stime{
  font-family:'DM Mono',monospace;font-size:13px;font-weight:500;
  color:var(--slate-lt);display:flex;align-items:center;gap:6px;
}
.stime::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.srow select{
  padding:7px 10px;border:1.5px solid var(--ivory-3);
  border-radius:6px;font-size:14px;color:var(--text);background:var(--white);
  transition:var(--trans);outline:none;
}
.srow select:focus{border-color:var(--navy);}

/* ══ BUTTONS ══ */
.btn{
  padding:10px 22px;border:none;border-radius:var(--r8);
  font-size:14px;font-weight:600;cursor:pointer;
  transition:var(--trans);display:inline-flex;align-items:center;gap:7px;
  letter-spacing:.2px;font-family:inherit;
}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-navy{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);color:var(--white);box-shadow:0 2px 10px rgba(12,30,60,.22);}
.btn-navy:hover:not(:disabled){background:linear-gradient(135deg,var(--navy-2) 0%,var(--navy-3) 100%);box-shadow:0 4px 16px rgba(12,30,60,.3);}
.btn-gold{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-lt) 100%);color:var(--navy);box-shadow:var(--shadow-gold);}
.btn-gold:hover:not(:disabled){background:linear-gradient(135deg,var(--gold-lt) 0%,var(--gold) 100%);}
.btn-green{background:var(--green);color:var(--white);box-shadow:0 2px 8px rgba(9,92,53,.2);}
.btn-green:hover:not(:disabled){background:#0d6e40;}
.btn-hod{background:var(--blue);color:var(--white);box-shadow:0 2px 8px rgba(10,48,112,.2);}
.btn-hod:hover:not(:disabled){background:#163d80;}
.btn-hoi{background:var(--purple);color:var(--white);box-shadow:0 2px 8px rgba(61,13,106,.2);}
.btn-hoi:hover:not(:disabled){background:#521888;}
.btn-imo{background:linear-gradient(135deg,#7A3800 0%,#993D00 100%);color:var(--white);box-shadow:0 2px 8px rgba(120,56,0,.2);}
.btn-imo:hover:not(:disabled){background:linear-gradient(135deg,#993D00 0%,#B84800 100%);}
.btn-ghost{
  background:transparent;color:var(--slate-lt);
  border:1.5px solid var(--ivory-3);
}
.btn-ghost:hover:not(:disabled){border-color:var(--navy);color:var(--navy);background:var(--ivory);}
.btn-secondary{
  background:var(--white);color:var(--slate-lt);
  border:1.5px solid var(--ivory-3);
  box-shadow:var(--shadow-xs);
}
.btn-secondary:hover:not(:disabled){border-color:var(--navy-3);color:var(--navy);background:var(--ivory);}

/* ══ ALERTS ══ */
.alert{
  padding:12px 16px;border-radius:var(--r8);font-size:15px;margin:12px 0;
  display:flex;align-items:flex-start;gap:10px;
  border:1px solid;
}
.alert-icon{flex-shrink:0;font-size:15px;margin-top:1px;}
.ao{background:var(--green-bg);color:var(--green);border-color:rgba(46,107,79,.2);}
.ae{background:var(--red-bg);color:var(--red);border-color:rgba(139,32,32,.2);}
.ai{background:var(--blue-bg);color:var(--blue);border-color:rgba(26,75,138,.2);}
.aw{background:var(--amber-bg);color:var(--amber);border-color:rgba(138,97,0,.2);}

/* ══ TABLE ══ */
.twrap{overflow-x:auto;border-radius:var(--r12);border:1px solid var(--ivory-2);}
table{width:100%;border-collapse:collapse;font-size:15px;}
thead th{
  background:var(--navy);color:#ffffff;
  padding:12px 16px;text-align:left;font-size:13px;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase;
}
thead th:first-child{border-radius:var(--r12) 0 0 0;}
thead th:last-child{border-radius:0 var(--r12) 0 0;}
tbody td{padding:12px 16px;border-bottom:1px solid var(--ivory-2);vertical-align:top;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:#eef1f8;}

/* ══ BADGES ══ */
.bdg{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:100px;font-size:13px;font-weight:600;
  border:1px solid;
}
.bdg::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.bp{background:var(--ivory-2);color:var(--slate);border-color:var(--ivory-3);}
.bp::before{background:var(--slate-lt);}
.ba{background:var(--green-bg);color:var(--green);border-color:rgba(46,107,79,.2);}
.ba::before{background:var(--green);}
.bv{background:var(--amber-bg);color:var(--amber);border-color:rgba(138,97,0,.2);}
.bv::before{background:#d97706;}
.br{background:var(--red-bg);color:var(--red);border-color:rgba(139,32,32,.2);}
.br::before{background:var(--red);}
.bf{background:var(--green-bg);color:var(--green);border-color:rgba(46,107,79,.2);}
.bf::before{background:var(--green);}
.be{background:var(--red-bg);color:var(--red);border-color:rgba(139,32,32,.2);}
.be::before{background:var(--red);}
.bu{background:var(--teal-bg);color:var(--teal);border-color:rgba(26,107,107,.2);}
.bu::before{background:var(--teal);}

/* ══ REVIEW CARDS — COMPACT ══ */
.rc{
  background:var(--white);border-radius:var(--r12);
  border:1px solid var(--ivory-2);margin-bottom:10px;
  overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .2s;
}
.rc:hover{box-shadow:var(--shadow-md);}
.rc.done{opacity:.7;}
.rc.done .rch{background:#f0faf4;}

.rch{
  padding:12px 16px;background:var(--white);
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;cursor:pointer;user-select:none;
  border-bottom:1px solid transparent;transition:background .15s,border-color .15s;
}
.rch:hover{background:var(--ivory);}
.rc.open .rch{background:var(--ivory);border-bottom-color:var(--ivory-2);}
.rch-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1;}
.rch-avatar{
  width:34px;height:34px;border-radius:8px;background:rgba(14,31,56,.08);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:15px;font-weight:700;
  color:var(--navy);flex-shrink:0;
}
.rch-info{min-width:0;}
.rch-info h4{
  font-size:15px;font-weight:700;color:var(--navy);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0 0 2px;
}
.rch-chips{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.rch-chip{
  font-size:12px;padding:2px 7px;border-radius:100px;
  background:var(--ivory-2);color:var(--slate);font-weight:500;white-space:nowrap;
}
.rch-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.rch-per{
  font-family:monospace;font-size:13px;color:var(--navy);
  font-weight:600;white-space:nowrap;
}
.rch-chevron{font-size:12px;color:var(--slate-lt);transition:transform .2s;}
.rc.open .rch-chevron{transform:rotate(180deg);}

.rcb{display:none;padding:16px 18px;}
.rc.open .rcb{display:block;}

.info-grid{
  display:flex;flex-wrap:wrap;gap:8px 20px;margin-bottom:14px;
  padding:10px 14px;background:var(--ivory);border-radius:var(--r8);
}
.ii label{
  font-size:11px;font-weight:700;color:var(--slate-lt);
  text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:2px;
}
.ii p{font-size:14px;color:var(--text);font-weight:500;}

.info-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:14px;margin-bottom:18px;
  padding:14px 16px;background:var(--ivory);border-radius:var(--r8);
}
.ii label{
  font-size:12px;font-weight:700;color:var(--slate-lt);
  text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px;
}
.ii p{font-size:15px;color:var(--text);font-weight:500;}

.section-label{
  font-size:12px;font-weight:700;color:var(--slate-lt);
  text-transform:uppercase;letter-spacing:.8px;margin:12px 0 8px;
  display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--ivory-2);}

.tstbl{width:100%;border-collapse:collapse;font-size:14px;}
.tstbl th{
  background:var(--navy);color:#ffffff;
  padding:8px 12px;text-align:left;font-size:12px;
  font-weight:700;letter-spacing:.5px;text-transform:uppercase;
}
.tstbl td{padding:8px 12px;border-bottom:1px solid var(--ivory-2);}
.tstbl tr:last-child td{border-bottom:none;}
.tstbl tr:nth-child(even) td{background:#edf1f8;}

.sabox{
  background:var(--ivory-2);border-left:4px solid var(--navy);
  padding:12px 16px;border-radius:0 var(--r8) var(--r8) 0;
  margin:8px 0;font-size:15px;line-height:1.7;color:var(--text);
}
.sabox strong{
  display:block;color:var(--navy);font-size:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;
}

.prbox{
  padding:12px 16px;border-radius:0 var(--r8) var(--r8) 0;
  margin:8px 0;font-size:15px;line-height:1.7;border-left:3px solid;
}
.pr-hod{background:var(--blue-bg);border-left-color:var(--blue);color:var(--text);}
.pr-hoi{background:var(--purple-bg);border-left-color:var(--purple);color:var(--text);}
.prbox .prlbl{
  font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;display:flex;align-items:center;gap:8px;margin-bottom:6px;
}
.pr-hod .prlbl{color:var(--blue);}
.pr-hoi .prlbl{color:var(--purple);}

.rvform{
  border-top:1px solid var(--ivory-2);
  padding:12px 0 0;margin-top:12px;
}
.rvform .rvt{
  font-size:15px;font-weight:700;color:var(--navy);margin-bottom:10px;
}
.rvform label{
  font-size:13px;font-weight:600;color:var(--slate);
  letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:6px;margin-top:14px;
}
.rvform textarea,.rvform select{
  width:100%;padding:10px 14px;border:1.5px solid var(--ivory-3);
  border-radius:var(--r8);font-size:15px;color:var(--text);background:var(--white);
  transition:var(--trans);outline:none;
}
.rvform textarea{resize:vertical;min-height:60px;line-height:1.6;font-size:14px;}
.rvform textarea:focus,.rvform select:focus{
  border-color:var(--navy);box-shadow:0 0 0 3px rgba(14,31,56,.06);
}

/* ══ LOADER / EMPTY ══ */
.loader{text-align:center;padding:64px 24px;color:var(--slate-lt);}
.spin{
  display:inline-block;width:32px;height:32px;
  border:3px solid var(--ivory-2);border-top-color:var(--gold);
  border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px;
}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:64px 24px;}
.empty-icon{font-size:48px;opacity:.35;margin-bottom:12px;}
.empty p{font-size:15px;color:var(--slate-lt);}

/* ══ DIVIDER ══ */
.divider{height:1px;background:var(--ivory-2);margin:20px 0;}

/* ══ HISTORY TABLE TWEAKS ══ */
.sub-id{font-family:monospace;font-size:13px;color:var(--slate-lt);}
.period-cell strong{font-size:15px;color:var(--text);}
.period-cell small{font-size:13px;color:var(--slate-lt);display:block;margin-top:2px;}

/* ══ FLOW STEPS (Login left) ══ */
.flow-steps{display:flex;flex-direction:column;gap:0;margin-top:32px;}
.fs{display:flex;align-items:flex-start;gap:14px;padding:10px 0;position:relative;}
.fs:not(:last-child)::after{
  content:'';position:absolute;left:15px;top:36px;bottom:-10px;
  width:1px;background:rgba(230,168,0,.35);
}
.fs-num{
  width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(245,196,48,.7);
  color:var(--gold-lt);font-size:14px;font-weight:700;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;background:rgba(230,168,0,.15);
}
.fs-text strong{display:block;font-size:15px;color:rgba(255,255,255,.85);font-weight:600;}
.fs-text span{font-size:13px;color:rgba(255,255,255,.65);}

/* ══ ANIMATIONS ══ */
.fade-up{animation:fadeUp .35s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.delay-1{animation-delay:.08s;}
.delay-2{animation-delay:.16s;}
.delay-3{animation-delay:.24s;}

/* ══ NOTIFICATIONS ══ */
.nb-wrap{position:relative;}
.nb-btn{
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.8);font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:var(--trans);flex-shrink:0;position:relative;
}
.nb-btn:hover{background:rgba(255,255,255,.16);color:#fff;}
.nb-badge{
  position:absolute;top:-4px;right:-4px;
  min-width:18px;height:18px;border-radius:9px;
  background:#d10000;color:#fff;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;border:2px solid var(--navy);
  animation:badgePop .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes badgePop{from{transform:scale(0)}to{transform:scale(1)}}
.nb-badge.hidden{display:none;}

.nb-panel{
  position:absolute;top:calc(100% + 12px);right:0;
  width:380px;background:var(--white);border-radius:var(--r12);
  border:1px solid var(--ivory-2);box-shadow:0 16px 48px rgba(6,17,31,.34);
  z-index:9999;overflow:hidden;
  animation:panelDrop .2s cubic-bezier(.4,0,.2,1);
  display:none;
}
.nb-panel.open{display:block;}
@keyframes panelDrop{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.nb-header{
  padding:14px 18px;border-bottom:1px solid var(--ivory-2);
  display:flex;align-items:center;justify-content:space-between;
}
.nb-header h4{
  font-family:'Playfair Display',serif;font-size:15px;
  font-weight:700;color:var(--navy);
}
.nb-mark-all{
  font-size:13px;color:var(--gold-dk);cursor:pointer;font-weight:600;
  background:none;border:none;padding:0;transition:color .15s;
}
.nb-mark-all:hover{color:var(--gold);}
.nb-list{max-height:400px;overflow-y:auto;}
.nb-empty{
  padding:40px 24px;text-align:center;
  color:var(--slate-lt);font-size:15px;
}
.nb-empty span{display:block;font-size:32px;margin-bottom:8px;opacity:.35;}
.nb-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 18px;border-bottom:1px solid var(--ivory-2);
  cursor:pointer;transition:background .15s;position:relative;
}
.nb-item:last-child{border-bottom:none;}
.nb-item:hover{background:var(--ivory);}
.nb-item.unread{background:#fdfaf4;}
.nb-item.unread::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--gold);border-radius:0 2px 2px 0;
}
.nb-icon{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  margin-top:1px;
}
.ni-new_submission{background:rgba(26,75,138,.1);}
.ni-hod_approved{background:rgba(46,107,79,.1);}
.ni-hoi_approved{background:rgba(46,107,79,.1);}
.ni-needs_revision{background:rgba(138,97,0,.1);}
.ni-status_update{background:rgba(26,107,107,.1);}
.ni-imo_decision{background:rgba(46,107,79,.1);}
.nb-content{flex:1;min-width:0;}
.nb-title{
  font-size:15px;font-weight:600;color:var(--text);
  margin-bottom:3px;line-height:1.4;
}
.nb-body{
  font-size:14px;color:var(--slate);line-height:1.5;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.nb-time{font-size:12px;color:var(--slate-lt);margin-top:4px;font-family:monospace;}
.nb-footer{
  padding:10px 18px;border-top:1px solid var(--ivory-2);
  background:var(--ivory);text-align:center;
}
.nb-footer span{font-size:13px;color:var(--slate-lt);}

/* ll-features */
.ll-features{display:flex;flex-direction:column;gap:12px;margin-top:0;}
.ll-feat{
  display:flex;align-items:center;gap:14px;
  font-size:15px;color:rgba(255,255,255,.78);
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,.1);
}
.ll-feat:last-child{border-bottom:none;}
.ll-feat-icon{
  font-size:15px;width:32px;height:32px;border-radius:8px;
  background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.18);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* Datalist input styling matches select */
.fg input[list]{
  padding:10px 14px;border:1.5px solid var(--ivory-3);
  border-radius:var(--r8);font-size:15px;color:var(--text);
  background:var(--white);transition:var(--trans);outline:none;width:100%;
}
.fg input[list]:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(14,31,56,.06);}

/* REGISTRATION PAGE */
#regPage{min-height:100vh;display:none;align-items:stretch;}
#regPage.active{display:flex;}

/* Login tabs */
.login-tabs{display:flex;gap:0;margin:20px 0 0;border-radius:var(--r8);overflow:hidden;border:1.5px solid var(--ivory-3);}
.ltab{flex:1;padding:10px 0;font-size:15px;font-weight:600;background:var(--ivory);color:var(--slate);
  border:none;cursor:pointer;transition:var(--trans);}
.ltab:first-child{border-right:1.5px solid var(--ivory-3);}
.ltab.active{background:var(--navy);color:var(--white);}
.ltab:hover:not(.active){background:var(--ivory-2);}

/* Login divider */
.login-divider{display:flex;align-items:center;gap:12px;margin:18px 0 0;color:var(--slate-lt);font-size:13px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--ivory-3);}
/* Google button */
.lbtn-google{background:#fff !important;color:#3c4043 !important;border:1.5px solid #dadce0 !important;
  display:flex !important;align-items:center;justify-content:center;gap:10px;margin-top:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.08) !important;}
.lbtn-google:hover{background:#f8f9fa !important;box-shadow:0 2px 6px rgba(0,0,0,.12) !important;}

.rg-lbl{display:block;font-size:13px;font-weight:600;color:var(--slate);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;margin-top:2px;}
.rg-req{color:#c0392b;}
.role-btns{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0 0;
}
.role-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:18px 10px 15px;
  border:1.5px solid var(--ivory-3);border-radius:12px;
  background:var(--white);cursor:pointer;
  transition:all .22s cubic-bezier(.4,0,.2,1);font-family:inherit;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-xs);
}
/* Gold shimmer bottom line */
.role-btn::before{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2.5px;
  background:linear-gradient(90deg,var(--gold),var(--gold-lt));
  transform:scaleX(0);transition:transform .22s ease;
  border-radius:0 0 2px 2px;
}
/* Subtle warm glow on hover */
.role-btn::after{
  content:'';position:absolute;inset:0;pointer-events:none;border-radius:12px;
  background:radial-gradient(130px 90px at 50% 100%, rgba(196,154,42,.1), transparent 70%);
  opacity:0;transition:opacity .22s;
}
.role-btn:hover{
  border-color:rgba(196,154,42,.45);
  background:#FDFAF3;
  box-shadow:0 4px 16px rgba(196,154,42,.12), 0 1px 3px rgba(12,30,60,.06);
  transform:translateY(-2px);
}
.role-btn:hover::before{transform:scaleX(1);}
.role-btn:hover::after{opacity:1;}
.role-btn:active{transform:translateY(0);box-shadow:var(--shadow-xs);}
.role-btn.active{
  border-color:var(--navy);
  background:linear-gradient(155deg,var(--navy) 0%,var(--navy-2) 60%,#1A3D72 100%);
  box-shadow:0 6px 20px rgba(12,30,60,.30);
  transform:translateY(-1px);
}
.role-btn.active::before{transform:scaleX(1);background:linear-gradient(90deg,var(--gold),var(--gold-lt));}
.role-btn.active .rb-lbl{color:var(--white);}
.rb-icon{
  display:flex;align-items:center;justify-content:center;
  width:40px;height:40px;line-height:1;
}
.rb-icon svg{width:24px;height:24px;display:block;}
.role-btn.active .rb-icon svg path[fill],
.role-btn.active .rb-icon svg circle[fill]{fill-opacity:.9;}
.rb-lbl{font-size:12px;font-weight:700;color:var(--slate-lt);letter-spacing:.7px;text-transform:uppercase;}
.role-panel{margin-top:18px;}
.role-panel label{display:block;font-size:12px;font-weight:700;color:var(--slate-lt);
  letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px;}
.rp-title{
  font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--slate-2);margin-bottom:16px;padding-bottom:12px;
  border-bottom:1.5px solid var(--ivory-2);
  display:flex;align-items:center;gap:8px;
}
.rp-title::before{content:'';width:14px;height:2.5px;background:linear-gradient(90deg,var(--gold),var(--gold-lt));border-radius:2px;}
.login-reg-link{text-align:center;margin-top:14px;font-size:14px;color:var(--slate-2);}
.login-reg-link span{color:var(--navy);font-weight:700;cursor:pointer;text-decoration:underline;text-underline-offset:2px;}

/* ── Calendar week view ── */
.cal-week{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:8px;}
.cal-day{border:1.5px solid var(--ivory-3);border-radius:var(--r12);background:var(--white);overflow:hidden;transition:var(--trans);}
.cal-day.active{border-color:var(--navy);box-shadow:0 4px 16px rgba(14,31,56,.12);}
.cal-day-header{padding:14px 12px 10px;display:flex;flex-direction:column;align-items:center;transition:background .15s;background:var(--ivory);cursor:pointer;}
.cal-day-header:hover{background:rgba(14,31,56,.05);}
.cal-day.active .cal-day-header{background:var(--navy);}
.cal-day.active .cal-weekday{color:var(--gold);}
.cal-day.active .cal-date{color:var(--white);}
.cal-day.active .cal-month{color:rgba(255,255,255,.88);}
.cal-weekday{font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--slate-lt);margin-bottom:6px;}
.cal-date{font-size:26px;font-weight:700;color:var(--navy);line-height:1;}
.cal-month{font-size:12px;color:var(--slate-lt);margin-top:3px;}
.cal-dot{display:none;width:6px;height:6px;border-radius:50%;background:var(--gold);margin-top:6px;}
.cal-day.has-data .cal-dot{display:block;}
.cal-slots{display:none;border-top:1px solid var(--ivory-2);padding:12px 10px;}
.cal-day.active .cal-slots{display:block;animation:fadeIn .2s ease;}
.cslot-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;padding:6px 8px;background:var(--ivory);border-radius:6px;border:1px solid var(--ivory-2);}
.cslot-row:last-child{margin-bottom:0;}
.cslot-time{font-family:monospace;font-size:12px;font-weight:600;color:var(--slate);white-space:nowrap;min-width:110px;flex-shrink:0;}
.cslot-row select{flex:1;font-size:13px;padding:5px 8px;border:1.5px solid var(--ivory-3);border-radius:6px;background:var(--white);outline:none;transition:var(--trans);}
.cslot-row select:focus{border-color:var(--navy);}

/* ════ FULL CALENDAR PICKER ════ */
.cal-picker{background:var(--white);border:1.5px solid var(--ivory-3);border-radius:var(--r12);overflow:hidden;margin-bottom:4px;}
.cal-picker-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--navy);color:var(--white);}
.cal-picker-nav button{background:none;border:1px solid rgba(255,255,255,.25);color:var(--white);border-radius:6px;width:30px;height:30px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:var(--trans);}
.cal-picker-nav button:hover{background:rgba(255,255,255,.15);}
.cal-picker-month{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;}
.cal-picker-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-picker-dayname{text-align:center;padding:8px 0;font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--slate-lt);background:var(--ivory);}
.cal-picker-cell{
  text-align:center;padding:10px 4px;font-size:15px;cursor:pointer;
  border:1px solid transparent;transition:var(--trans);position:relative;
}
.cal-picker-cell:hover:not(.cal-empty):not(.cal-other){background:rgba(14,31,56,.06);border-radius:6px;}
.cal-picker-cell.cal-empty,.cal-picker-cell.cal-other{color:var(--ivory-3);cursor:default;pointer-events:none;}
.cal-picker-cell.cal-today{font-weight:700;color:var(--navy);}
.cal-picker-cell.cal-today::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--gold);margin:2px auto 0;}
.cal-picker-cell.cal-in-range{background:rgba(14,31,56,.06);}
.cal-picker-cell.cal-range-start,.cal-picker-cell.cal-range-end{background:var(--navy)!important;color:var(--white)!important;border-radius:6px;font-weight:700;}
.cal-picker-cell.cal-submitted{background:#f0f4ff!important;color:#6366f1!important;cursor:not-allowed;border-radius:6px;}
.cal-picker-cell.cal-submitted::after{content:'🔒';display:block;font-size:7px;text-align:center;margin-top:1px;}
.cal-picker-cell.cal-holiday{background:#fff5f5!important;color:#dc2626!important;cursor:not-allowed;border-radius:6px;}
.cal-picker-cell.cal-holiday::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:#dc2626;margin:2px auto 0;}
.cal-picker-cell.cal-has-data{cursor:pointer;}
.cal-picker-cell.cal-has-data::before{content:'';display:block;width:5px;height:5px;border-radius:50%;background:var(--gold);margin:0 auto 2px;}
.cal-picker-cell.cal-selected{background:var(--navy)!important;color:var(--white)!important;border-radius:6px!important;font-weight:700;}
.cal-picker-cell.cal-weekend{color:var(--slate-lt);}
.cal-picker-cell.cal-sunday{background:#fff7ed!important;color:#c2410c!important;border-radius:6px;}
.cal-picker-cell.cal-evensat{background:#fef9c3!important;color:#a16207!important;border-radius:6px;}
.cal-picker-dayname.cal-sun-hdr{color:#c2410c!important;background:#fff7ed!important;border-radius:4px;}
.cal-legend{display:flex;gap:16px;padding:10px 18px;border-top:1px solid var(--ivory-2);font-size:13px;color:var(--slate);}
.cal-legend span{display:flex;align-items:center;gap:5px;}
.cal-legend span::before{content:'';display:inline-block;width:10px;height:10px;border-radius:3px;}
.cal-legend .leg-holiday::before{background:#dc2626;}
.cal-legend .leg-sel::before{background:var(--navy);}
.cal-legend .leg-data::before{background:var(--gold);border-radius:50%;}
/* Activity modal */
.act-modal-overlay{position:fixed;inset:0;background:rgba(14,31,56,.5);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.act-modal-overlay.open{display:flex;animation:fadeIn .15s ease;}
.act-modal{background:var(--white);border-radius:var(--r12);width:820px;max-width:95vw;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(14,31,56,.3);}
.act-modal-header{background:var(--navy);padding:18px 22px;color:var(--white);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.act-modal-header h3{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;margin:0;}
.act-modal-header p{font-size:13px;color:rgba(255,255,255,.82);margin:3px 0 0;}
.act-modal-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;padding:0;line-height:1;}
.act-modal-close:hover{color:var(--white);}
.act-modal-body{padding:16px 20px;overflow-y:auto;flex:1;}
.act-slot-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--ivory-2);background:var(--ivory);margin-bottom:8px;}
.act-slot-row:last-child{margin-bottom:0;}
.act-slot-time{font-family:monospace;font-size:12px;font-weight:600;color:var(--slate);min-width:120px;flex-shrink:0;padding-top:8px;}
.act-slot-row select{width:100%;font-size:14px;padding:6px 10px;border:1.5px solid var(--ivory-3);border-radius:6px;background:var(--white);outline:none;transition:var(--trans);}
.act-slot-row select:focus{border-color:var(--navy);}
.act-slot-inputs{flex:1;display:flex;flex-direction:column;gap:6px;}
.act-cascade-label{font-size:12px;font-weight:600;color:var(--slate-lt);text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px;}
.act-details-inp{width:100%;font-size:14px;padding:6px 10px;border:1.5px solid var(--navy);border-radius:6px;outline:none;box-sizing:border-box;background:var(--white);}
.act-slot-summary{font-size:13px;color:var(--navy);font-weight:600;padding:4px 8px;background:#eff6ff;border-radius:6px;border-left:3px solid var(--navy);}
.act-modal-footer{padding:14px 20px;border-top:1px solid var(--ivory-2);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0;}


/* ══ COMPACT TIMESHEET GRID ══ */
.ts-compact{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:0;}
.ts-day-col{background:var(--ivory);border-radius:var(--r8);overflow:hidden;border:1px solid var(--ivory-2);}
.ts-day-hdr{
  background:var(--navy);color:var(--white);
  padding:6px 10px;font-size:12px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;text-align:center;
}
.ts-day-date{font-size:11px;color:rgba(255,255,255,.82);font-weight:400;display:block;margin-top:1px;}
.ts-slot{cursor:pointer;}
.ts-slot:hover .ts-slot-act{color:var(--navy);text-decoration:underline;}
/* ── Slot detail popup ── */
.ts-detail-overlay{position:fixed;inset:0;background:rgba(14,31,56,.45);z-index:1100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.ts-detail-overlay.open{display:flex;animation:fadeIn .15s ease;}
.ts-detail-box{background:var(--white);border-radius:var(--r12);width:620px;max-width:95vw;box-shadow:0 20px 60px rgba(14,31,56,.3);overflow:hidden;}
.ts-detail-hdr{background:var(--navy);padding:16px 20px;color:var(--white);display:flex;align-items:center;justify-content:space-between;}
.ts-detail-hdr h4{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;margin:0;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.6px;}
.ts-detail-hdr span{font-size:19px;font-weight:700;color:var(--white);margin-top:4px;display:block;letter-spacing:.2px;}
.ts-detail-body{padding:20px 22px 22px;}
.ts-detail-row{margin-bottom:10px;background:var(--ivory);border-radius:10px;padding:13px 15px;border-left:4px solid var(--ivory-3);transition:border-color .15s;}
.ts-detail-row:hover{border-left-color:var(--navy);}
.ts-detail-row:nth-child(2){border-left-color:#6366f1;}
.ts-detail-row:nth-child(3){border-left-color:#0ea5e9;}
.ts-detail-row:nth-child(4){border-left-color:#10b981;}
.ts-detail-label{font-size:11px;font-weight:700;color:var(--slate-lt);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.ts-detail-val{font-size:15px;color:var(--navy);font-weight:600;line-height:1.45;}
.ts-detail-val.empty{color:var(--slate-lt);font-style:italic;font-weight:400;}
.ts-detail-desc{font-size:14px;color:var(--text);line-height:1.7;}
.ts-detail-close{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.9);font-size:16px;cursor:pointer;padding:4px 8px;line-height:1;border-radius:6px;transition:background .15s;}
.ts-detail-close:hover{background:rgba(255,255,255,.25);}
.ts-slot{
  display:flex;align-items:flex-start;gap:6px;
  padding:5px 8px;border-bottom:1px solid var(--ivory-2);
  font-size:12px;
}
.ts-slot:last-child{border-bottom:none;}
.ts-slot-time{
  color:var(--slate-lt);white-space:nowrap;flex-shrink:0;
  font-family:monospace;font-size:11px;padding-top:1px;min-width:70px;
}
.ts-slot-act{
  color:var(--text);font-weight:500;line-height:1.35;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.ts-slot-act.empty{color:var(--slate-lt);font-style:italic;font-weight:400;}

/* ════ PRESENTABLE TIMESHEET TABLE (My Submissions view) ════ */
.ts-table-wrap{overflow-x:auto;margin:8px 0;}
.ts-table{width:100%;border-collapse:separate;border-spacing:0;font-size:15px;border-radius:10px;overflow:hidden;border:1px solid var(--ivory-2);}
.ts-table thead th{
  background:var(--navy);color:#fff;padding:12px 10px;font-size:12px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;text-align:center;
  border-right:1px solid rgba(255,255,255,.1);
}
.ts-table thead th:first-child{text-align:left;padding-left:14px;min-width:110px;background:#0a2540;}
.ts-table thead th:last-child{border-right:none;}
.ts-table thead th .ts-th-date{display:block;font-size:12px;font-weight:400;color:rgba(255,255,255,.78);margin-top:2px;letter-spacing:0;text-transform:none;}
.ts-table tbody tr{transition:background .15s;}
.ts-table tbody tr:hover{background:rgba(14,31,56,.02);}
.ts-table tbody tr:nth-child(even){background:rgba(247,243,237,.5);}
.ts-table tbody tr:nth-child(even):hover{background:rgba(247,243,237,.8);}
.ts-table td{padding:10px 8px;border-right:1px solid var(--ivory-2);border-bottom:1px solid var(--ivory-2);vertical-align:top;text-align:center;}
.ts-table td:first-child{
  font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--slate);
  text-align:left;padding-left:14px;background:rgba(247,243,237,.4);white-space:nowrap;
}
.ts-table td:last-child{border-right:none;}
.ts-table tbody tr:last-child td{border-bottom:none;}
.ts-cell{min-height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:6px;transition:background .15s;}
.ts-cell[onclick]:hover{background:rgba(14,31,56,.04);}
.ts-cell-act{
  font-size:13px;font-weight:600;color:var(--navy);line-height:1.3;
  max-width:130px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.ts-cell-det{font-size:11px;color:var(--slate-lt);line-height:1.2;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ts-cell-empty{font-size:12px;color:var(--ivory-3);font-style:italic;}
.ts-cell-attach{font-size:11px;color:var(--navy);text-decoration:none;display:inline-flex;align-items:center;gap:2px;margin-top:2px;}
.ts-cell-attach:hover{text-decoration:underline;}
.ts-cell-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:4px;}
.ts-fill-summary{
  display:flex;align-items:center;gap:14px;margin:8px 0 4px;padding:8px 14px;
  background:var(--ivory);border-radius:8px;font-size:13px;color:var(--slate);
}
.ts-fill-bar{flex:1;height:6px;background:var(--ivory-2);border-radius:100px;overflow:hidden;}
.ts-fill-bar-inner{height:100%;border-radius:100px;background:linear-gradient(90deg,#10b981,#059669);transition:width .6s;}
@media(max-width:768px){
  .ts-table{font-size:12px;}
  .ts-table thead th{padding:8px 4px;font-size:11px;}
  .ts-table td{padding:6px 4px;}
  .ts-table td:first-child{padding-left:8px;}
  .ts-cell-act{font-size:12px;max-width:90px;}
}

/* ════ CATEGORY CLASSIFICATION CHART ════ */
.cat-chart{background:var(--ivory);border-radius:10px;padding:14px 16px;margin:8px 0 12px;}
.cat-chart-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:10px;}
.cat-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.cat-bar-label{width:140px;flex-shrink:0;font-size:13px;font-weight:600;color:var(--navy);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cat-bar-track{flex:1;height:20px;background:var(--ivory-2);border-radius:6px;overflow:hidden;position:relative;}
.cat-bar-fill{height:100%;border-radius:6px;transition:width .5s;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;}
.cat-bar-val{font-size:12px;font-weight:700;color:#fff;}
.cat-bar-pct{font-size:12px;color:var(--slate-lt);min-width:36px;text-align:right;flex-shrink:0;}
.cat-stacked{height:10px;background:var(--ivory-2);border-radius:100px;overflow:hidden;display:flex;margin-top:8px;}
.cat-stacked-seg{height:100%;transition:width .5s;}
.cat-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.cat-legend-item{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--slate);}
.cat-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
@media(max-width:768px){.cat-bar-label{width:100px;font-size:12px;}}


/* ══ MODALS ══ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(14,31,56,.55);
  z-index:900;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(3px);animation:fadeIn .15s ease;
}
.modal-box{
  background:var(--white);border-radius:var(--r12);
  padding:40px 36px;max-width:560px;width:92%;text-align:center;
  box-shadow:0 24px 64px rgba(14,31,56,.25);
  animation:fadeUp .2s ease;
}
.modal-icon{font-size:36px;margin-bottom:12px;line-height:1;}
.modal-title{
  font-family:'Playfair Display',serif;font-size:20px;font-weight:700;
  color:var(--navy);margin-bottom:8px;
}
.modal-desc{font-size:15px;color:var(--slate);line-height:1.7;margin-bottom:24px;}
.modal-actions{display:flex;gap:12px;justify-content:center;}


/* ══ STATISTICS DASHBOARD ══ */
.stat-dashboard{display:flex;flex-direction:column;gap:20px;}
.stat-row{display:grid;gap:16px;}
.stat-row-4{grid-template-columns:repeat(4,1fr);}
.stat-row-3{grid-template-columns:repeat(3,1fr);}
.stat-row-2{grid-template-columns:1fr 1fr;}
.stat-kpi{
  background:var(--white);border-radius:var(--r12);padding:20px 22px;
  border:1px solid var(--ivory-2);box-shadow:var(--shadow-sm);
  display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;
}
.stat-kpi::before{
  content:'';position:absolute;top:0;left:0;bottom:0;width:3px;
  border-radius:3px 0 0 3px;
}
.stat-kpi.kpi-blue::before{background:#3b82f6;}
.stat-kpi.kpi-green::before{background:#10b981;}
.stat-kpi.kpi-amber::before{background:#f59e0b;}
.stat-kpi.kpi-red::before{background:#ef4444;}
.stat-kpi.kpi-purple::before{background:#8b5cf6;}
.stat-kpi.kpi-navy::before{background:var(--navy);}
.stat-kpi-icon{
  width:44px;height:44px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0;
}
.kpi-blue .stat-kpi-icon{background:#eff6ff;}
.kpi-green .stat-kpi-icon{background:#ecfdf5;}
.kpi-amber .stat-kpi-icon{background:#fffbeb;}
.kpi-red .stat-kpi-icon{background:#fef2f2;}
.kpi-purple .stat-kpi-icon{background:#f5f3ff;}
.kpi-navy .stat-kpi-icon{background:rgba(14,31,56,.06);}
.stat-kpi-info{flex:1;}
.stat-kpi-val{font-size:28px;font-weight:800;color:var(--navy);line-height:1;}
.stat-kpi-lbl{font-size:13px;color:var(--slate-lt);margin-top:3px;font-weight:500;}
.stat-kpi-trend{font-size:13px;font-weight:600;margin-top:4px;}
.trend-up{color:#10b981;} .trend-dn{color:#ef4444;} .trend-nt{color:var(--slate-lt);}

.stat-chart-card{
  background:var(--white);border-radius:var(--r12);padding:20px 22px;
  border:1px solid var(--ivory-2);box-shadow:var(--shadow-sm);
}
.stat-chart-title{
  font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px;
}
.stat-chart-sub{font-size:13px;color:var(--slate-lt);margin-bottom:16px;}

/* Donut */
.donut-wrap{display:flex;align-items:center;gap:20px;}
.donut-legend{display:flex;flex-direction:column;gap:8px;flex:1;}
.dl-item{display:flex;align-items:center;gap:8px;font-size:14px;}
.dl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dl-lbl{color:var(--slate);flex:1;}
.dl-val{font-weight:700;color:var(--navy);}

/* Bar chart */
.bar-chart{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-label{font-size:13px;color:var(--slate);width:80px;flex-shrink:0;text-align:right;}
.bar-track{flex:1;height:8px;background:var(--ivory-2);border-radius:100px;overflow:hidden;}
.bar-fill{height:100%;border-radius:100px;transition:width .6s ease;}
.bar-count{font-size:13px;font-weight:700;color:var(--navy);width:28px;flex-shrink:0;}

/* Activity breakdown */
.act-breakdown{display:flex;flex-direction:column;gap:6px;}
.act-bar-row{display:flex;align-items:center;gap:8px;}
.act-bar-name{font-size:12px;color:var(--slate);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.act-bar-track{width:120px;height:6px;background:var(--ivory-2);border-radius:100px;flex-shrink:0;}
.act-bar-fill{height:100%;border-radius:100px;background:var(--navy);}
.act-bar-pct{font-size:12px;font-weight:600;color:var(--slate-lt);width:30px;text-align:right;flex-shrink:0;}


/* ══ KPI DRILL-DOWN PANEL ══ */
.kpi-drilldown-overlay{
  position:fixed;inset:0;background:rgba(14,31,56,.55);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(3px);animation:fadeIn .15s ease;
}
.kpi-drilldown{
  background:var(--white);border-radius:var(--r12);
  width:92vw;max-width:1280px;max-height:92vh;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 24px 64px rgba(14,31,56,.3);animation:fadeUp .2s ease;
}
.kpi-drilldown-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;background:var(--navy);color:var(--white);flex-shrink:0;
}
.kpi-drilldown-header h4{font-family:'Playfair Display',serif;font-size:15px;margin:0;}
.kpi-drilldown-header p{font-size:13px;color:rgba(255,255,255,.82);margin:3px 0 0;}
.kpi-drilldown-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;padding:0;line-height:1;}
.kpi-drilldown-close:hover{color:var(--white);}
.kpi-drilldown-body{padding:16px 20px;overflow-y:auto;flex:1;}
.kpi-drilldown-empty{font-size:14px;color:var(--slate-lt);font-style:italic;padding:8px 0;}
.dd-table{width:100%;border-collapse:collapse;font-size:14px;}
.dd-table th{
  background:var(--ivory);color:var(--slate-lt);
  padding:7px 12px;text-align:left;font-size:12px;
  font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  border-bottom:1px solid var(--ivory-2);
}
.dd-table td{padding:8px 12px;border-bottom:1px solid var(--ivory-2);color:var(--text);}
.dd-table tr:last-child td{border-bottom:none;}
.dd-table tr:hover td{background:var(--ivory);}
.dd-name{font-weight:600;color:var(--navy);}
.dd-meta{font-size:13px;color:var(--slate-lt);}
.dd-period{font-family:monospace;font-size:12px;color:var(--slate);}
.stat-kpi{cursor:pointer;}
.stat-kpi:hover{box-shadow:0 4px 16px rgba(14,31,56,.12);transform:translateY(-1px);}
.stat-kpi.kpi-active{box-shadow:0 4px 20px rgba(14,31,56,.15);border:1.5px solid var(--navy);}


/* ════ FACULTY DASHBOARD ════ */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px;}
.dash-mini-card{
  background:var(--white);border-radius:var(--r12);padding:16px 18px;
  border:1px solid var(--ivory-2);box-shadow:var(--shadow-sm);
  display:flex;align-items:center;gap:12px;
}
.dash-mini-icon{
  width:40px;height:40px;border-radius:10px;display:flex;
  align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
}
.dmi-blue{background:#eff6ff;} .dmi-green{background:#ecfdf5;}
.dmi-amber{background:#fffbeb;} .dmi-red{background:#fef2f2;}
.dash-mini-val{font-size:26px;font-weight:800;color:var(--navy);line-height:1;}
.dash-mini-lbl{font-size:13px;color:var(--slate-lt);margin-top:2px;}

.dash-deadline{
  background:linear-gradient(135deg,var(--navy) 0%,#1a3a5c 100%);
  border-radius:var(--r12);padding:14px 18px;
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
  border:1px solid rgba(201,168,76,.2);
}
.dash-deadline-icon{font-size:22px;}
.dash-deadline-text strong{font-size:15px;color:var(--white);display:block;}
.dash-deadline-text span{font-size:13px;color:rgba(255,255,255,.78);}

.dash-last-card{
  background:var(--white);border-radius:var(--r12);padding:14px 18px;
  border:1px solid var(--ivory-2);box-shadow:var(--shadow-sm);margin-bottom:14px;
}
.dash-last-label{font-size:12px;font-weight:700;color:var(--slate-lt);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}
.dash-last-period{font-family:monospace;font-size:15px;font-weight:700;color:var(--navy);}
.dash-last-meta{font-size:13px;color:var(--slate-lt);margin-top:2px;margin-bottom:8px;}
.dash-status-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.dash-status-item{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:var(--slate);}

.dash-hist-card{
  background:var(--white);border-radius:var(--r12);
  border:1px solid var(--ivory-2);box-shadow:var(--shadow-sm);overflow:hidden;
}
.dash-hist-header{
  padding:11px 16px;background:var(--ivory);border-bottom:1px solid var(--ivory-2);
  display:flex;align-items:center;justify-content:space-between;
}
.dash-hist-header h4{font-size:15px;font-weight:700;color:var(--navy);margin:0;}
.dash-hist-link{font-size:13px;color:var(--navy);cursor:pointer;text-decoration:underline;}
.dash-hist-table{width:100%;border-collapse:collapse;font-size:13px;}
.dash-hist-table th{
  padding:7px 12px;background:var(--ivory);color:var(--slate-lt);
  font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  border-bottom:1px solid var(--ivory-2);text-align:left;
}
.dash-hist-table td{padding:7px 12px;border-bottom:1px solid var(--ivory-2);color:var(--text);}
.dash-hist-table tr:last-child td{border-bottom:none;}
.dash-hist-table tr:hover td{background:var(--ivory);}
.dht-period{font-weight:600;color:var(--navy);font-size:14px;}
.dht-sem{font-size:12px;color:var(--slate-lt);}

/* ════ ENHANCED DASHBOARD CHARTS ════ */
.dash-charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.dash-chart-card{
  background:var(--white);border-radius:var(--r12);border:1px solid var(--ivory-2);
  padding:18px 20px;box-shadow:var(--shadow-sm);
}
.dash-chart-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.dash-chart-sub{font-size:13px;color:var(--slate-lt);margin-bottom:14px;}
.dash-gauge-wrap{display:flex;justify-content:center;align-items:center;margin:12px 0 8px;}
.dash-legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-top:8px;}
.dash-legend-item{display:flex;align-items:center;gap:6px;font-size:13px;}
.dash-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dash-legend-lbl{color:var(--slate);flex:1;}
.dash-legend-val{font-weight:700;color:var(--navy);}
.dsb-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.dsb-left{display:flex;align-items:center;gap:8px;width:118px;flex-shrink:0;}
.dsb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dsb-lbl{font-size:13px;color:var(--slate);white-space:nowrap;}
.dsb-right{display:flex;align-items:center;gap:8px;flex:1;}
.dsb-bar-wrap{flex:1;height:8px;background:var(--ivory-2);border-radius:4px;overflow:hidden;}
.dsb-bar{height:100%;border-radius:4px;transition:width .6s ease;}
.dsb-count{font-size:13px;font-weight:700;color:var(--navy);min-width:22px;text-align:right;}
.dsb-total{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--ivory-2);font-size:13px;font-weight:700;color:var(--navy);}
.vbar-chart{display:flex;align-items:flex-end;gap:8px;height:140px;padding:0 8px;margin:8px 0 6px;}
.vbar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px;}
.vbar-val{font-size:12px;font-weight:700;color:var(--navy);}
.vbar-bar{width:100%;border-radius:6px 6px 0 0;transition:height .8s cubic-bezier(.4,0,.2,1);min-height:2px;}
.vbar-lbl{font-size:11px;color:var(--slate-lt);text-align:center;line-height:1.2;max-width:56px;word-wrap:break-word;}
.hoi-dept-card{
  background:var(--white);border-radius:var(--r12);border:1px solid var(--ivory-2);
  padding:18px 20px;box-shadow:var(--shadow-sm);margin-bottom:14px;
}
.hier-tile{
  background:var(--ivory);border:1.5px solid var(--ivory-3);border-radius:10px;
  padding:12px 14px;transition:all .2s ease;
}
.hier-tile[style*="cursor:pointer"]:hover{
  background:var(--white);border-color:var(--navy);box-shadow:0 4px 12px rgba(14,31,56,.1);transform:translateY(-2px);
}
.hoi-dept-btn{
  padding:8px 16px;border-radius:8px;border:1.5px solid var(--ivory-3);background:var(--white);
  font-size:13px;font-weight:600;color:var(--slate);cursor:pointer;transition:all .15s ease;
  font-family:inherit;
}
.hoi-dept-btn:hover{border-color:var(--navy);color:var(--navy);}
.hoi-dept-btn.active{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 2px 8px rgba(14,31,56,.2);}
.hoi-dept-bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.hoi-dept-name{font-size:14px;font-weight:600;color:var(--navy);width:200px;flex-shrink:0;}
.hoi-dept-track{flex:1;height:22px;background:var(--ivory-2);border-radius:6px;overflow:hidden;display:flex;position:relative;}
.hoi-dept-seg{height:100%;transition:width .6s ease;}
.hoi-dept-count{font-size:13px;font-weight:700;color:var(--navy);width:32px;flex-shrink:0;text-align:right;}
@media(max-width:768px){
  .dash-charts-row{grid-template-columns:1fr;}
  .dash-grid{grid-template-columns:1fr 1fr;}
  .dash-legend-grid{grid-template-columns:1fr;}
  .vbar-chart{height:110px;}
}
@media(max-width:480px){
  .dash-grid{grid-template-columns:1fr;}
}

/* ════ IMO QUEUE TABS — ENHANCED ════ */
.imo-q-tab{
  padding:11px 22px;font-size:14px;font-weight:600;color:var(--slate);
  background:none;border:none;cursor:pointer;border-bottom:2.5px solid transparent;
  transition:all .2s;display:flex;align-items:center;gap:7px;letter-spacing:.01em;
}
.imo-q-tab:hover{color:var(--navy);background:rgba(14,31,56,.03);}
.imo-q-tab.active{color:var(--navy);border-bottom-color:#f59e0b;background:rgba(245,158,11,.04);}
.imo-q-badge{
  font-size:11px;font-weight:700;padding:2px 8px;border-radius:100px;
  background:var(--ivory-2);color:var(--slate);min-width:18px;text-align:center;transition:all .2s;
}
.imo-q-tab.active .imo-q-badge{background:#f59e0b;color:#fff;box-shadow:0 2px 6px rgba(245,158,11,.3);}

/* ════ IMO PORTAL — DESIGN SYSTEM ════ */
/* ── IMO Dashboard Header Banner ── */
.imo-header-banner{
  background:linear-gradient(135deg,#071526 0%,#0d2240 55%,#163354 100%);
  border-radius:16px;padding:26px 30px;margin-bottom:18px;
  position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(14,31,56,.22),0 2px 8px rgba(14,31,56,.14);
  border:1px solid rgba(255,255,255,.06);
}
.imo-header-banner::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(245,158,11,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(245,158,11,.04) 1px,transparent 1px);
  background-size:28px 28px;
  mask-image:radial-gradient(ellipse 80% 100% at 0% 50%,rgba(0,0,0,.9) 0%,rgba(0,0,0,.3) 60%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 80% 100% at 0% 50%,rgba(0,0,0,.9) 0%,rgba(0,0,0,.3) 60%,transparent 100%);
}
.imo-header-banner::after{
  content:'';position:absolute;pointer-events:none;
  width:380px;height:380px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,158,11,.11) 0%,transparent 70%);
  right:-80px;top:-100px;filter:blur(4px);
}
.imo-banner-inner{position:relative;z-index:1;}
.imo-banner-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);
  border-radius:100px;padding:4px 13px;font-size:11px;font-weight:700;
  letter-spacing:.7px;text-transform:uppercase;color:#fcd34d;margin-bottom:10px;
}
.imo-banner-title{
  font-family:'Playfair Display',serif;font-size:23px;font-weight:700;
  color:#fff;margin-bottom:4px;letter-spacing:-.01em;
}
.imo-banner-sub{font-size:13px;color:rgba(255,255,255,.55);letter-spacing:.01em;}
.imo-banner-stats{
  display:flex;gap:28px;margin-top:18px;padding-top:16px;
  border-top:1px solid rgba(255,255,255,.09);flex-wrap:wrap;
}
.imo-banner-stat{display:flex;flex-direction:column;gap:2px;}
.imo-banner-stat-val{font-size:24px;font-weight:800;color:#fcd34d;line-height:1;font-family:'DM Sans',sans-serif;}
.imo-banner-stat-lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.48);text-transform:uppercase;letter-spacing:.5px;}

/* ── IMO Breadcrumb Navigation ── */
.imo-nav-path{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.imo-nav-crumb{
  display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;
  color:var(--slate-lt);background:var(--white);border:1px solid var(--ivory-2);
  border-radius:100px;padding:5px 13px;cursor:pointer;transition:all .15s;
}
.imo-nav-crumb:hover{border-color:var(--navy);color:var(--navy);}
.imo-nav-crumb.active{background:var(--navy);color:#fff;border-color:var(--navy);cursor:default;}
.imo-nav-sep{color:var(--ivory-3);font-size:11px;font-weight:700;}

/* ── IMO Campus Cards ── */
.imo-campus-card{
  position:relative;border-radius:14px;overflow:hidden;background:var(--white);
  border:1px solid var(--ivory-2);box-shadow:0 2px 10px rgba(14,31,56,.08);
  cursor:pointer;display:flex;flex-direction:column;
  transition:transform .22s cubic-bezier(.4,0,.2,1),box-shadow .22s cubic-bezier(.4,0,.2,1);
}
.imo-campus-card:hover{transform:translateY(-5px);box-shadow:0 14px 36px rgba(14,31,56,.16);}
.imo-campus-img-wrap{
  width:100%;background:#fff;display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:26px 34px;border-bottom:1px solid var(--ivory-2);min-height:140px;
}
.imo-campus-img-fallback{
  width:100%;min-height:140px;
  background:linear-gradient(135deg,#071526 0%,#153261 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:700;font-size:22px;
  color:rgba(245,158,11,.92);padding:0 28px;text-align:center;position:relative;
}
.imo-campus-img-fallback::after{
  content:'';position:absolute;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,158,11,.08) 0%,transparent 70%);
  right:-30px;bottom:-60px;pointer-events:none;
}
.imo-campus-body{padding:16px 20px;}
.imo-campus-code{font-size:10px;font-weight:700;color:var(--slate-lt);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.imo-campus-name{font-size:17px;font-weight:800;color:var(--navy);line-height:1.25;margin-bottom:12px;}
.imo-campus-footer{display:flex;justify-content:space-between;align-items:center;}
.imo-inst-pill{
  display:inline-flex;align-items:center;gap:5px;background:#eff6ff;
  border:1px solid #bfdbfe;border-radius:100px;padding:4px 11px;
  font-size:12px;font-weight:700;color:var(--navy);
}
.imo-campus-arrow{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#071526 0%,#1d4d6b 100%);
  display:inline-flex;align-items:center;justify-content:center;
  color:#fff;font-size:14px;transition:transform .2s;
  box-shadow:0 3px 10px rgba(14,31,56,.25);
}
.imo-campus-card:hover .imo-campus-arrow{transform:translateX(3px);}

/* ── IMO Institution Cards ── */
.imo-inst-card{
  border-radius:12px;background:var(--white);border:1px solid var(--ivory-2);
  box-shadow:0 2px 8px rgba(14,31,56,.07);overflow:hidden;cursor:pointer;
  display:flex;flex-direction:column;
  transition:transform .18s cubic-bezier(.4,0,.2,1),box-shadow .18s;
}
.imo-inst-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(14,31,56,.13);}
.imo-inst-logo-area{
  background:#f8faff;border-bottom:1px solid var(--ivory-2);
  display:flex;align-items:center;justify-content:center;padding:16px 20px;min-height:96px;
}
.imo-inst-logo-fallback{
  min-height:96px;background:linear-gradient(135deg,#eff6ff,#dbeafe);
  border-bottom:1px solid var(--ivory-2);display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:800;font-size:22px;color:var(--navy);
  letter-spacing:.02em;
}
.imo-inst-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;}
.imo-inst-code{font-size:10px;font-weight:700;color:var(--slate-lt);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px;}
.imo-inst-name{font-size:13px;font-weight:800;color:var(--navy);line-height:1.35;margin-bottom:8px;flex:1;}
.imo-inst-footer{display:flex;justify-content:space-between;align-items:center;}
.imo-inst-dept-count{font-size:11px;color:var(--slate-lt);font-weight:600;}
.imo-inst-arrow{
  width:24px;height:24px;border-radius:50%;background:var(--navy);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;transition:transform .18s;
}
.imo-inst-card:hover .imo-inst-arrow{transform:translateX(2px);}

/* ── IMO Back Button Row ── */
.imo-back-row{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;
}
.imo-back-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--white);border:1.5px solid var(--ivory-2);border-radius:8px;
  padding:7px 14px;font-size:13px;font-weight:700;color:var(--slate);
  cursor:pointer;transition:all .18s;text-decoration:none;
  box-shadow:0 1px 4px rgba(14,31,56,.06);
}
.imo-back-btn:hover{border-color:var(--navy);color:var(--navy);background:#f7faff;box-shadow:0 3px 10px rgba(14,31,56,.1);}

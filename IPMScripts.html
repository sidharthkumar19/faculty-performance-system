<!--
  IPM Scripts — wrapped in an IIFE so its globals (state, $, toast, call,
  setRole, setSemester …) do not collide with the main VMRF app.
  Public entry points are exposed on window.IPM and window.IPM_G.

  Every server call goes through the call() wrapper, whose names were
  rewritten from bare (login, submitReport, imoTree …) to the namespaced
  backend functions (ipmLogin, ipmSubmitReport, ipmImoTree …) that live
  in Code.gs alongside the main app.
-->
<script>
(function(){
  // Re-entry guard — IPM may be mounted multiple times (navigating in & out
  // of the Institutional Monitoring page), but we only want ONE instance.
  if (window.IPM && window.IPM.__booted) {
    window.IPM.__rerender && window.IPM.__rerender();
    return;
  }

// ============ STATE ============
let state = { token: null, user: null, tree: null, activities: null, selectedCampus: null, dirty: false };
let idleTimer = null, warnTimer = null, countdownTimer = null;
const IDLE_MS = 15 * 60 * 1000;
const WARN_MS = 60 * 1000;

// ============ EARLY GLOBALS (must exist before any inline onclick fires) ============
function setRole(role){
  try {
    const isHoi = role === 'HOI';
    document.querySelectorAll('#roleSeg .seg-btn').forEach(x => x.classList.toggle('active', x.dataset.role === role));
    const hf = document.getElementById('hoiFields');
    if(hf) hf.style.display = isHoi ? 'block' : 'none';
    const cs = document.getElementById('campus'), is = document.getElementById('institution');
    if(cs){ cs.required = isHoi; cs.disabled = !isHoi; }
    if(is){ is.required = isHoi; is.disabled = !isHoi; }
    if(!isHoi){
      const lp = document.getElementById('loginLogoPreview'); if(lp) lp.style.display = 'none';
      const li = document.getElementById('loginLogoImg'); if(li) li.src = '';
    }
    // Sequential reveal reset — hide downstream steps when role/campus changes
    const instGrp = document.getElementById('institutionGroup');
    if(instGrp) instGrp.style.display = 'none';
    const credsGrp = document.getElementById('credentialsGroup');
    if(credsGrp) credsGrp.style.display = isHoi ? 'none' : 'block';
    const loginBtn = document.getElementById('loginBtn');
    if(loginBtn) loginBtn.style.display = isHoi ? 'none' : '';
    const campusSel = document.getElementById('campus');
    if(campusSel && !isHoi){ campusSel.value = ''; if(window.cdReset) window.cdReset('campus'); }
    const le = document.getElementById('loginError'); if(le) le.textContent = '';
  } catch(e){ console.error('setRole failed', e); }
}
function setSemester(sem){
  try {
    document.querySelectorAll('#hoi-submit .seg-btn').forEach(x => x.classList.toggle('active', x.dataset.sem === sem));
    const s = document.getElementById('semester'); if(s) s.value = sem;
    // Repopulate week selector for the newly chosen semester
    const cur = (document.getElementById('weekOf')||{}).value;
    // weekOf is always current Monday — just refresh the label
    try { if(typeof _ipmUpdateWeekLabel === 'function') _ipmUpdateWeekLabel(); } catch(_){}
    // Carry-forward depends on (semester, weekOf) — refresh when either changes
    try { if (typeof _ipmRefreshCarryForward === 'function') _ipmRefreshCarryForward(); } catch(_){}
  } catch(e){ console.error('setSemester failed', e); }
}


// ============ UTIL ============
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg, type='ok'){ const t=$('#toast'); t.textContent=msg; t.className='toast show '+type; setTimeout(()=>t.className='toast',2800); }
function showView(id){ $$('.view').forEach(v=>v.classList.remove('active')); $('#'+id).classList.add('active'); }
function openModal(html){ $('#modalBody').innerHTML=html; $('#modal').classList.add('open'); }
function closeModal(){
  const m = $('#modal');
  if(m && m.dataset.locked === '1') return;
  if(m) m.classList.remove('open');
  // Fully reset card and body — cssText wipes ALL inline styles set by any modal
  const card = m?.querySelector('.modal-card');
  if(card){
    card.classList.remove('modal-card-wide');
    card.removeAttribute('style');  // wipes cssText + any individual style props
  }
  const body = m?.querySelector('#modalBody');
  if(body){
    body.removeAttribute('style');
    body.innerHTML = '';
  }
  if(typeof resolveConfirm==='function') resolveConfirm(false);
}

// ============ SHOW/HIDE PASSWORD ============
document.addEventListener('click', e => {
  const btn = e.target.closest('.pw-eye');
  if (!btn) return;
  const inp = document.getElementById(btn.dataset.target);
  if (!inp) return;
  const showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  btn.classList.toggle('on', !showing);
  btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
});

// ============ CONFIRM DIALOG ============
let _activeConfirmResolver = null;
function confirmDialog(opts){
  return new Promise(res => {
    _activeConfirmResolver = res;
    openModal(`
      <div class="confirm">
        <div class="confirm-icon ${opts.danger?'danger':'info'}">
          ${opts.danger
            ? '<svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
            : '<svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'}
        </div>
        <h2>${esc(opts.title)}</h2>
        <p>${esc(opts.message)}</p>
        <div class="confirm-actions">
          <button id="cnfCancel" class="btn-ghost">${esc(opts.cancelText||'Cancel')}</button>
          <button id="cnfOk" class="${opts.danger?'btn-danger':'btn-primary'}">${esc(opts.okText||'Confirm')}</button>
        </div>
      </div>`);
    document.getElementById('cnfCancel').onclick = ()=>{ resolveConfirm(false); closeModal(); };
    document.getElementById('cnfOk').onclick = ()=>{ resolveConfirm(true); closeModal(); };
    // Auto-focus the safe option
    setTimeout(()=>{ const t = document.getElementById(opts.danger?'cnfCancel':'cnfOk'); if(t) t.focus(); }, 50);
  });
}
function resolveConfirm(value){
  if(_activeConfirmResolver){ const r = _activeConfirmResolver; _activeConfirmResolver = null; r(value); }
}

// Escape key + backdrop click closes the modal (and resolves any pending confirm as cancel)
document.addEventListener('keydown', e => {
  if(e.key === 'Escape' && $('#modal').classList.contains('open')){
    closeModal(); resolveConfirm(false);
  }
});
document.addEventListener('click', e => {
  if(e.target && e.target.id === 'modal'){
    closeModal(); resolveConfirm(false);
  }
});

// ============ SERVER WRAPPER ============
function call(fn, ...args){
  return new Promise((res, rej)=>{
    google.script.run.withSuccessHandler(res).withFailureHandler(e=>rej(e)).withUserObject(null)[fn](...args);
  });
}
async function withBusy(btn, fn){
  if(btn){ btn.disabled=true; btn._oldText=btn.textContent; btn.textContent='Working…'; }
  try { return await fn(); }
  finally { if(btn){ btn.disabled=false; btn.textContent=btn._oldText||btn.textContent; } }
}

// ============ INACTIVITY ============
function resetIdle(){
  if(!state.token) return;
  clearTimeout(idleTimer); clearTimeout(warnTimer); clearInterval(countdownTimer);
  idleTimer = setTimeout(showIdleWarning, IDLE_MS - WARN_MS);
}
async function showIdleWarning(){
  if(!state.token) return; // guard: user already logged out
  let remaining = WARN_MS / 1000;
  openModal(`
    <div class="confirm">
      <div class="confirm-icon danger">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <h2>Session Timeout Warning</h2>
      <p>You've been inactive. You'll be logged out in <strong id="idleSec">${remaining}</strong> seconds.</p>
      <div class="confirm-actions">
        <button id="idleLogout" class="btn-ghost">Log out now</button>
        <button id="idleStay" class="btn-primary">Stay signed in</button>
      </div>
    </div>`);
  countdownTimer = setInterval(()=>{
    remaining--;
    const el = document.getElementById('idleSec');
    if(el) el.textContent = remaining;
    if(remaining <= 0){ clearInterval(countdownTimer); doLogout(true); }
  }, 1000);
  document.getElementById('idleStay').onclick = async ()=>{
    clearInterval(countdownTimer); closeModal();
    try { await call('ipmPingSession', state.token); } catch(_){}
    resetIdle();
  };
  document.getElementById('idleLogout').onclick = ()=>{ clearInterval(countdownTimer); doLogout(false); };
}
['mousemove','keydown','click','scroll','touchstart'].forEach(ev =>
  document.addEventListener(ev, ()=>{ if(state.token && !$('#modal').classList.contains('open')) resetIdle(); }, {passive:true})
);

// ============ DIRTY-FORM GUARD ============
window.addEventListener('beforeunload', e => { if(state.dirty){ e.preventDefault(); e.returnValue=''; } });

// ============ LOGIN ============
async function initLogin(){
  const errEl = $('#loginError');
  try{
    errEl.style.color = '#6b7280';
    errEl.textContent = 'Loading campuses…';
    state.tree = await call('ipmGetCampusTree');
    const keys = Object.keys(state.tree || {});
    if(keys.length === 0){
      errEl.style.color = '#b91c1c';
      errEl.textContent = 'No institutions found. Verify Institutions sheet is populated and DB_SHEET_ID script property points to the spreadsheet.';
      return;
    }
    const csel = $('#campus'); csel.innerHTML = '<option value="">Select campus</option>';
    keys.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; csel.appendChild(o); });
    errEl.textContent = '';
    console.log('[IPM] Loaded ' + keys.length + ' campuses:', keys);
    // Load logos in background — non-blocking, enables institution logo preview
    call('ipmGetLogos').then(logos => {
      if(!logos || !state.tree) return;
      state._logos = logos;
      Object.values(state.tree).forEach(arr =>
        arr.forEach(inst => { inst.logo = logos[inst.code] || ''; })
      );
    }).catch(() => {});
  }catch(e){
    errEl.style.color = '#b91c1c';
    errEl.textContent = 'Failed to load: ' + (e && e.message ? e.message : e);
    console.error('[IPM] initLogin failed:', e);
  }
}

async function bindLoginEvents(){
  // Role segment — DELEGATED click handler so it works even if elements re-render
  const roleSeg = $('#roleSeg');
  if(roleSeg && !roleSeg._bound){
    roleSeg._bound = true;
    roleSeg.addEventListener('click', e => {
      const btn = e.target.closest('.seg-btn');
      if(!btn || !roleSeg.contains(btn)) return;
      e.preventDefault();
      setRole(btn.dataset.role);
    });
  }

  // Campus → cascading institution dropdown
  const campusEl = $('#campus');
  if(campusEl && !campusEl._bound){
    campusEl._bound = true;
    campusEl.addEventListener('change', ()=>{
      const c = campusEl.value;
      const isel = $('#institution');
      const instGroup = document.getElementById('institutionGroup');
      const logoPreview = $('#loginLogoPreview');
      const logoImg = $('#loginLogoImg');
      // Reset institution
      isel.innerHTML = '<option value="">Choose an institution…</option>';
      if(logoPreview) logoPreview.style.display = 'none';
      if(logoImg) logoImg.src = '';
      if(!c){
        // No campus selected — hide institution and credentials
        if(instGroup) instGroup.style.display = 'none';
        const cg=document.getElementById('credentialsGroup'); if(cg) cg.style.display='none';
        const lb=document.getElementById('loginBtn'); if(lb) lb.style.display='none';
        if(window.cdReset) window.cdReset('institution');
        return;
      }
      // Campus changed — hide credentials until institution re-selected
      const cg2=document.getElementById('credentialsGroup'); if(cg2) cg2.style.display='none';
      const lb2=document.getElementById('loginBtn'); if(lb2) lb2.style.display='none';
      // Campus selected — populate and reveal institution
      if(state.tree && state.tree[c]){
        state.tree[c].forEach(i => {
          const o = document.createElement('option');
          o.value = i.code;
          o.textContent = i.name + ' (' + i.code + ')';
          isel.appendChild(o);
        });
      }
      if(window.cdReset) window.cdReset('institution');
      if(instGroup){
        instGroup.style.display = 'block';
        // Smooth reveal
        instGroup.style.opacity = '0';
        instGroup.style.transform = 'translateY(-6px)';
        requestAnimationFrame(()=>{
          instGroup.style.transition = 'opacity .2s ease, transform .2s ease';
          instGroup.style.opacity = '1';
          instGroup.style.transform = 'translateY(0)';
        });
      }
    });
  }

  // Institution → logo preview
  const instEl = $('#institution');
  if(instEl && !instEl._bound){
    instEl._bound = true;
    instEl.addEventListener('change', ()=>{
      const c = $('#campus').value, code = instEl.value;
      const inst = (state.tree && state.tree[c] || []).find(i => i.code === code);
      const wrap = $('#loginLogoPreview'), img = $('#loginLogoImg');
      if(inst && inst.logo){ img.src = inst.logo; wrap.style.display = 'flex'; }
      else { wrap.style.display = 'none'; img.src = ''; }
      // Reveal credentials once institution chosen
      const credsGrp = document.getElementById('credentialsGroup');
      const loginBtn = document.getElementById('loginBtn');
      if(!code){
        if(credsGrp) credsGrp.style.display='none';
        if(loginBtn) loginBtn.style.display='none';
        return;
      }
      if(credsGrp && credsGrp.style.display==='none'){
        credsGrp.style.display='block';
        credsGrp.style.opacity='0';
        credsGrp.style.transform='translateY(-6px)';
        requestAnimationFrame(()=>{
          credsGrp.style.transition='opacity .2s ease,transform .2s ease';
          credsGrp.style.opacity='1';
          credsGrp.style.transform='translateY(0)';
          // Focus username after reveal
          setTimeout(()=>{ document.getElementById('username')?.focus(); }, 220);
        });
      }
      if(loginBtn && loginBtn.style.display==='none'){
        loginBtn.style.display='';
        loginBtn.style.opacity='0';
        requestAnimationFrame(()=>{
          loginBtn.style.transition='opacity .2s ease';
          loginBtn.style.opacity='1';
        });
      }
    });
  }

  // Form submit
  const lf = $('#loginForm');
  if(lf && !lf._bound){
    lf._bound = true;
    lf.addEventListener('submit', async e => {
      e.preventDefault();
      $('#loginError').textContent = '';
      const activeBtn = document.querySelector('#roleSeg .seg-btn.active');
      const role = activeBtn ? activeBtn.dataset.role : 'HOI';
      const isHoi = role === 'HOI';
      if(isHoi && (!$('#campus').value || !$('#institution').value)){
        $('#loginError').textContent = 'Please select your campus and institution';
        return;
      }
      if(!$('#username').value.trim() || !$('#password').value){
        $('#loginError').textContent = 'Please enter username and password';
        return;
      }
      const payload = {
        role: role,
        campus: isHoi ? $('#campus').value : '',
        institution: isHoi ? $('#institution').value : '',
        username: $('#username').value.trim(),
        password: $('#password').value
      };
      const btn = $('#loginBtn');
      await withBusy(btn, async ()=>{
        try{
          const r = await call('ipmLogin', payload);
          if(!r.ok){ $('#loginError').textContent = r.error; return; }
          if(r.user.role !== role){
            $('#loginError').textContent = 'Role mismatch. Please try again.';
            return;
          }
          state.token = r.token; state.user = r.user;
          resetIdle();
          loadLogos();
          if(r.user.role === 'HOI') await enterHoi(); else await enterImo();
          // Force password change if user is on a default/seeded password
          if(r.mustChangePassword){
            setTimeout(()=>{
              toast('You must change your default password before continuing','err');
              openChangePassword(true); // forced=true
            }, 400);
          }
        }catch(err){ $('#loginError').textContent = err.message || 'Login failed'; }
      });
    });
  }
}

// ============ LOGOUT ============
async function confirmLogout(){
  if(state.dirty){
    const proceed = await confirmDialog({
      title:'Discard unsaved report?',
      message:'You have unsaved changes in the weekly report form. Sign out anyway?',
      okText:'Yes, sign out', cancelText:'Stay', danger:true
    });
    if(!proceed) return;
  }
  const ok = await confirmDialog({
    title:'Sign out?',
    message:'You will be returned to the login screen and will need to enter your username and password again to access the portal.',
    okText:'Yes, sign out', cancelText:'Stay signed in', danger:true
  });
  if(ok) doLogout(false);
}

async function doLogout(expired){
  // Stop all timers
  clearTimeout(idleTimer); clearInterval(countdownTimer);
  idleTimer=null; countdownTimer=null;
  // Revoke server session
  try { if(state.token) await call('ipmLogout', state.token); } catch(_){}
  // CRITICAL: mutate `state` in place — do NOT reassign. window.IPM_G.state
  // is a reference to this same object; reassigning here would detach the
  // main-app's reference and break SSO on the next login (causing Weekly
  // Updates to silently fail with "Cannot read property 'fullName' of null").
  state.token = null;
  state.user = null;
  // Keep state.tree (it's global — works across sessions)
  state.activities = null;
  state.selectedCampus = null;
  state.dirty = false;
  // Reset login form completely
  const lf = $('#loginForm');
  if(lf) lf.reset();
  $('#username').value='';
  $('#password').value='';
  $('#password').type='password';
  // Re-arm readonly so the browser doesn't autofill the previous user's
  // saved credentials back into these fields when the login view becomes
  // visible again. The focus listener (attached once at boot) will lift
  // readonly the moment the next user actually clicks into a field.
  try {
    if (typeof window._armLoginReadonly === 'function') {
      window._armLoginReadonly();
    } else {
      $('#username').setAttribute('readonly', 'readonly');
      $('#password').setAttribute('readonly', 'readonly');
    }
  } catch(_){}
  document.querySelectorAll('.pw-eye.on').forEach(b=>b.classList.remove('on'));
  $('#loginError').textContent='';
  $('#loginLogoPreview').style.display='none';
  $('#loginLogoImg').src='';
  // Reset role to HOI default (uses helper so all related state syncs)
  setRole('HOI');
  populateWeekSelect('Odd');
  $('#campus').value=''; if(typeof cdReset==='function') cdReset('campus');
  $('#institution').innerHTML='<option value="">Select institution</option>';
  // Reset HOI portal tabs to dashboard
  $$('#view-hoi .tab').forEach(t=>t.classList.toggle('active', t.dataset.tab==='hoi-dashboard'));
  $$('#view-hoi .tab-pane').forEach(p=>p.classList.toggle('active', p.id==='hoi-dashboard'));
  // Clear HOI form & header data
  const rf = $('#reportForm'); if(rf) rf.reset();
  $('#activitiesHost').innerHTML='';
  $('#hoiName').textContent=''; $('#hoiMeta').textContent=''; $('#hoiLogo').innerHTML='';
  $('#kpiTotal').textContent='–'; $('#kpiMonth').textContent='–';
  const ch=$('#chartHost'); if(ch) ch.innerHTML='';
  const pa=$('#dashPendingAlert'); if(pa) pa.innerHTML='';
  const dsm=$('#dashStatusMain'); if(dsm) dsm.innerHTML='';
  const dcta=$('#dashSubmitCta'); if(dcta) dcta.innerHTML='';
  const dwl=$('#dashWeekLabel'); if(dwl) dwl.textContent='';
  $('#mySubsBody').innerHTML='<tr><td colspan="5" class="muted">Loading…</td></tr>';
  // Clear IMO body
  $('#imoBody').innerHTML=''; $('#imoKpis').innerHTML='';
  // Close any open modal (except the one we may show next)
  closeModal();
  // Switch view
  showView('view-login');
  if(expired) toast('Signed out due to inactivity. Please log in again.','err');
}
function logout(){ confirmLogout(); }

// ============ CHANGE PASSWORD ============
function openChangePassword(forced){
  state._forcedPwChange = !!forced;
  const banner = forced
    ? '<div class="pw-warn-banner"><strong>Action required:</strong> You are using the default password issued by the administrator. For security, you must change it before continuing.</div>'
    : '';
  openModal(`
    <h2 style="margin:0 0 14px;color:var(--navy)">Change Password</h2>
    ${banner}
    <label>Current Password</label>
    <div class="pw-wrap"><input id="cpCur" type="password" placeholder="Current password" autocomplete="current-password"><button type="button" class="pw-eye" data-target="cpCur" aria-label="Show password"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
    <label>New Password</label>
    <div class="pw-wrap"><input id="cpNew" type="password" placeholder="Min. 8 characters" autocomplete="new-password"><button type="button" class="pw-eye" data-target="cpNew" aria-label="Show password"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
    <label>Confirm New Password</label>
    <div class="pw-wrap"><input id="cpConf" type="password" placeholder="Repeat new password" autocomplete="new-password"><button type="button" class="pw-eye" data-target="cpConf" aria-label="Show password"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
    <div id="cpErr" class="err"></div>
    <button id="cpBtn" class="btn-primary" onclick="doChangePassword()">Update Password</button>`);
  // If forced, prevent escape/backdrop dismissal
  if(forced){
    const m = $('#modal'); m.dataset.locked = '1';
    const x = m.querySelector('.modal-x'); if(x) x.style.display = 'none';
  }
}
async function doChangePassword(){
  const cur=$('#cpCur').value, nw=$('#cpNew').value, conf=$('#cpConf').value;
  if(!cur){ $('#cpErr').textContent='Enter your current password'; return; }
  if(nw!==conf){ $('#cpErr').textContent='Passwords do not match'; return; }
  if(nw.length<8){ $('#cpErr').textContent='New password must be at least 8 characters'; return; }
  if(nw===cur){ $('#cpErr').textContent='New password must be different from current password'; return; }
  await withBusy($('#cpBtn'), async()=>{
    try{
      const r=await call('ipmChangePassword', state.token, cur, nw);
      if(!r.ok){ $('#cpErr').textContent=r.error; return; }
      // Unlock modal and close
      const m = $('#modal'); m.dataset.locked = '';
      const x = m.querySelector('.modal-x'); if(x) x.style.display = '';
      state._forcedPwChange = false;
      closeModal(); toast('Password updated successfully','ok');
    }catch(e){ $('#cpErr').textContent=e.message||'Error'; }
  });
}

// ============ HOI ============
async function enterHoi(){
  showView('view-hoi');
  // Guard: if state.user is missing (e.g. main-app reached us before SSO
  // finished seeding, or a previous logout detached the state reference),
  // throw a clear error instead of a cryptic "Cannot read property 'fullName'
  // of null" that gets swallowed by the caller's try/catch.
  if (!state || !state.user) {
    throw new Error('Session not ready. Please click "Dashboard" or "Submit Report" again to re-authenticate.');
  }
  $('#hoiName').textContent=state.user.fullName||state.user.username;
  $('#hoiMeta').textContent=(state.user.campus||'')+' · '+(state.user.institution||'');
  const hoiLogo=$('#hoiLogo');
  const instData=state.tree&&state.tree[state.user.campus]?state.tree[state.user.campus].find(x=>x.code===state.user.institution):null;

async function loadHoiDashboard(){
  try{
    const k = await call('ipmHoiKpis', state.token);
    if(!k){ console.warn('[IPM] hoiKpis returned null'); return; }

    // ── Greeting banner ────────────────────────────────────────────────
    const hr = new Date().getHours();
    const greet = hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
    const grEl=$('#dashGreeting'), nmEl=$('#dashUserName'), wlEl=$('#dashWeekLabel');
    if(grEl) grEl.textContent = greet;
    if(nmEl) nmEl.textContent = state.user?.fullName || state.user?.username || '';
    if(wlEl && k.thisWeekMon){
      const mon=new Date(k.thisWeekMon+'T00:00:00');
      const sun=new Date(mon); sun.setDate(mon.getDate()+6);
      wlEl.textContent = mon.toLocaleDateString('en-IN',{day:'numeric',month:'short'})
        +' – '+sun.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    }

    // ── CTA ────────────────────────────────────────────────────────────
    const ctaEl=$('#dashSubmitCta');
    if(ctaEl){
      ctaEl.innerHTML = k.thisWeekDone ? ''
        : '<button class="btn-primary" style="white-space:nowrap;background:#c8a24b;color:#1a2332;border:none;font-weight:800" onclick="switchToSubmit()">Submit This Week →</button>';
    }

    // ── This Week KPI ─────────────────────────────────────────────────
    const statusMain=$('#dashStatusMain');
    if(statusMain){
      statusMain.innerHTML = k.thisWeekDone
        ? '<span class="chip ok" style="font-size:13px;padding:5px 14px">✓ Submitted</span>'
        : '<span class="chip chip-warn" style="font-size:13px;padding:5px 14px">⚠ Pending</span>';
    }

    // ── KPI values: Week / Month / Year / All Time ───────────────────
    const moEl=$('#kpiMonth'), yrEl=$('#kpiYear'), totEl=$('#kpiTotal');
    if(moEl)  moEl.textContent  = k.thisMonth!=null ? k.thisMonth : 0;
    if(yrEl)  yrEl.textContent  = k.thisYear!=null  ? k.thisYear  : 0;
    if(totEl) totEl.textContent = k.total!=null ? k.total : 0;

    // Pending alert removed — cleared to keep dashboard clean
    const alertEl=$('#dashPendingAlert');
    if(alertEl) alertEl.innerHTML='';

    // ── Bar chart ──────────────────────────────────────────────────────
    const chartHost=$('#dashBarChart');
    if(chartHost && k.monthly){
      // BUG FIX: The chart used to render `Object.entries(k.monthly)` directly,
      // trusting server insertion order. Under some Apps Script runtimes (Rhino,
      // or post-JSON re-key) the object came back with keys shuffled — producing
      // scrambled axis labels like "APR · MAY · JAN · MAR · FEB · DEC" instead of
      // the intended chronological order. We now generate the axis client-side
      // from `now` (last 6 months, oldest → newest) and READ values from the
      // server map. The server map's order no longer matters; missing keys
      // default to 0.
      const monAbbr = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const _now = new Date();
      const entries = [];
      for (let _j = 5; _j >= 0; _j--) {
        const _d = new Date(_now.getFullYear(), _now.getMonth() - _j, 1);
        const _mon = monAbbr[_d.getMonth()];
        const _yy  = String(_d.getFullYear()).slice(-2);
        // Match the server's 'MMM yy' key format (see ipmHoiKpis in Code.gs)
        const _key = _mon + ' ' + _yy;
        const _val = (k.monthly[_key] != null) ? k.monthly[_key] : 0;
        entries.push([_key, _val]);
      }
      const maxVal=Math.max(...entries.map(e=>e[1]),1);
      chartHost.innerHTML=`<div class="dash-bar-chart">
        ${entries.map(([lbl,val])=>{
          const pct=Math.max(4,Math.round((val/maxVal)*100));
          return `<div class="dash-bar-col">
            <div class="dash-bar-wrap">
              <div class="dash-bar-fill" style="height:${pct}%"></div>
            </div>
            <div class="dash-bar-val">${val}</div>
            <div class="dash-bar-lbl">${esc(lbl.split(' ')[0])}</div>
          </div>`;
        }).join('')}
      </div>`;
    }

    // ── Recent submissions ─────────────────────────────────────────────
    const rHost=$('#recentSubsHost');
    if(rHost){
      if(!k.recent||!k.recent.length){
        rHost.innerHTML='<p class="muted" style="padding:16px 0 4px">No submissions yet.</p>';
      } else {
        rHost.innerHTML=k.recent.map(sub=>{
          const wk=fmtWeekLabel(sub.weekOf, sub.timestamp);
          const dt=sub.timestamp?new Date(sub.timestamp).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—';
          const isRev=sub.status==='Reviewed';
          return `<div class="dash-recent-row">
            <div class="dash-recent-dot ${isRev?'dot-rev':'dot-sub'}"></div>
            <div class="dash-recent-info">
              <div class="dash-recent-week">${esc(wk)}</div>
              <div class="dash-recent-meta">${esc(sub.semester)} Semester · ${esc(dt)}</div>
            </div>
            <span class="chip ${isRev?'reviewed':'ok'}" style="font-size:10px;flex-shrink:0">${esc(sub.status)}</span>
          </div>`;
        }).join('');
      }
    }
  }catch(e){ console.warn('[IPM] loadHoiDashboard error:',e); }
}

async function loadActivitiesForm(){

    host.innerHTML =
      '<div style="padding:18px 20px;border:1.5px solid #fcd7d7;background:#fef5f5;border-radius:10px">' +
        '<div style="font-size:13.5px;font-weight:700;color:#9a1f1f;margin-bottom:4px">Weekly Updates couldn\'t load</div>' +
        '<div style="font-size:13px;color:#5a2b2b;line-height:1.5;margin-bottom:10px">' + esc(msg || 'Unknown error') + '</div>' +
        '<button type="button" class="btn-secondary" onclick="loadActivitiesForm()" style="font-size:12.5px">Retry</button>' +
      '</div>';
  };

  // Attempt the fetch, with one transparent token-refresh retry if the server
  // says the session has expired (6-hour TTL).
  const fetchActivities = async () => {
    try {
      return await call('ipmGetActivities', state.token);
    } catch (e) {
      const msg = String(e && e.message || e);
      if (/session expired/i.test(msg) && typeof window.ipmRefreshToken === 'function') {
        // Ask the main app to re-mint a token via SSO, then retry once.
        const newToken = await new Promise(res => window.ipmRefreshToken(res));
        if (newToken) {
          state.token = newToken;
          return await call('ipmGetActivities', state.token);
        }
      }
      throw e;
    }
  };

  let sections;

    sections = await fetchActivities();
  } catch (e) {

    toast(e && e.message || 'Failed to load Weekly Updates', 'err');

  state.activities = sections || [];

  // Empty-state: the server returned no sections for this HOI's campus.

    host.innerHTML =
      '<div style="padding:18px 20px;border:1.5px dashed var(--line);background:var(--surface-2);border-radius:10px">' +
        '<div style="font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:4px">No Weekly Updates defined</div>' +
        '<div style="font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:10px">' +
          'No activity template was found for <strong>' + esc(state.user && state.user.campus || 'your campus') +
          '</strong>. Contact the IMO or re-run <code>ipmSetup</code> to seed the Activities sheet.' +
        '</div>' +
        '<button type="button" class="btn-secondary" onclick="loadActivitiesForm()" style="font-size:12.5px">Retry</button>' +
      '</div>';
    return;
  }

  try {
    host.innerHTML='';
    let counter = 0;
    state.activities.forEach(sec=>{
      const block=document.createElement('div'); block.className='section-block';
      block.innerHTML=`<div class="section-head" style="cursor:pointer;user-select:none">
        <span class="section-no">${esc(String(sec.sectionNo))}</span>
        ${esc(sec.sectionTitle)}
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left:auto;flex-shrink:0;transition:transform .22s ease"><polyline points="6 9 12 15 18 9"/></svg>
      </div>`;
      sec.items.forEach(it=>{
        it._key = 'item_' + (counter++);
        const itemKey = it._key;
        const row=document.createElement('div'); row.className='item-row';
        row.style.display='none';
        // Item title row — just the activity name. The "Add another entry"
        // button has been moved DOWN into each entry-box (next to the
        // Minutes / Action Items / Follow Up / Responsibility fields) so
        // it sits with the fields it adds, not with the section header.
        const head = document.createElement('div');
        head.className = 'item-title';
        head.textContent = it.title;
        row.appendChild(head);

        // Entries host — contains the per-field lists for this item
        const entriesHost = document.createElement('div');
        entriesHost.className = 'entries-host';
        entriesHost.dataset.itemKey = itemKey;
        entriesHost.dataset.itemTitle = it.title;
        row.appendChild(entriesHost);

        // Build the per-field blocks (followUp+status, minutes, actionItems,
        // responsibility, plus ONE item-level attachments area).
        entriesHost.appendChild(_ipmBuildItemFields(itemKey));

        block.appendChild(row);
      });
      const head=block.querySelector('.section-head');
      const chev=head.querySelector('svg');
      head.addEventListener('click',()=>{
        const rows=block.querySelectorAll('.item-row');
        const wasOpen=rows[0]&&rows[0].style.display!=='none';
        rows.forEach(r=>r.style.display=wasOpen?'none':'');
        chev.style.transform=wasOpen?'':'rotate(180deg)';
      });
      host.appendChild(block);
    });

    // After rendering, fetch carry-forward state from the server and apply.
    // Runs in background — form is fully usable immediately.
    _ipmRefreshCarryForward();
  } catch(e){
    console.error('[IPM] loadActivitiesForm render error:', e);

/* ════════ Per-field rendering helpers ═════════════════════════════════════
   Each activity item renders FOUR independent field lists:
     - followUp + status (paired)          data-field="followUp"/"status"
     - minutes                              data-field="minutes"
     - actionItems                          data-field="actionItems"
     - responsibility                       data-field="responsibility"
   Each list has its own "+ Add another" button. Each instance past the
   first has a "×" to remove itself. Attachments live ONCE at the item
   level (not per-field).

   Wire format: when submitting, all instances of each field are joined
   with IPM_FIELD_JOIN ("|||") and stored in the corresponding column of
   SubmissionItems. The server doesn't need to know about arrays — it
   stores the joined string as-is. Draft loading splits the string back
   into instances. */

const IPM_FIELD_JOIN = '|||';

/* Per-field metadata used by the render helpers. */
function _ipmFieldLabels(field) {
  const map = {
    followUp:       { label: 'Follow Up Action Items', placeholder: 'Auto-filled from previous week action items', addLabel: 'Add another follow-up', inputType: 'textarea', rows: 2 },
    minutes:        { label: 'Minutes',                placeholder: 'Minutes of meeting',                              addLabel: 'Add another minute', inputType: 'textarea', rows: 2 },
    actionItems:    { label: 'Action Items',           placeholder: 'Action items',                                    addLabel: 'Add another action item', inputType: 'textarea', rows: 2 },
    responsibility: { label: 'Responsibility',         placeholder: 'Responsibility',                                  addLabel: 'Add another responsibility', inputType: 'input', rows: 1 }
  };
  return map[field] || { label: field, placeholder: '', addLabel: 'Add another', inputType: 'textarea', rows: 2 };
}

/* Build the complete set of fields for ONE activity item.
   New model — each item is a stack of "entry cards", where each card is a
   self-contained group of all four fields (Minutes, Follow-up + Status,
   Action Items, Responsibility). Clicking "+ Add entry" appends a NEW
   complete card so the entire group is repeated separately. The single
   item-level attachments area sits below all cards. */
function _ipmBuildItemFields(itemKey) {
  const container = document.createElement('div');
  container.className = 'item-fields';
  container.dataset.itemKey = itemKey;
  // Outer item box now uses a dashed-light feel; each entry-card has its
  // own solid border, so cards read as discrete units within the item.
  container.style.cssText = 'padding:0;margin-bottom:10px;background:transparent';

  // Host that holds the stacked entry-cards.
  const cardsHost = document.createElement('div');
  cardsHost.className = 'entry-cards-host';
  cardsHost.dataset.itemKey = itemKey;
  cardsHost.style.cssText = 'display:flex;flex-direction:column;gap:10px';
  container.appendChild(cardsHost);

  // Initial entry card (idx 0).
  cardsHost.appendChild(_ipmBuildEntryCard(itemKey, 0));

  // Single "+ Add entry" button with a paired "× Cancel entry" button.
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin:10px 0';
  const addAllBtn = _ipmBuildAddButton('Add entry', function(){ _ipmAddAllFields(itemKey); });
  const cancelBtn = document.createElement('button');
  cancelBtn.type = 'button';
  cancelBtn.className = 'cancel-entry-btn';
  cancelBtn.dataset.itemKey = itemKey;
  cancelBtn.style.cssText = 'display:none;align-items:center;gap:5px;background:var(--surface-2);border:1.5px solid var(--line);color:#b91c1c;padding:5px 11px;border-radius:7px;font-size:12px;line-height:1;cursor:pointer;font-weight:600;font-family:inherit';
  cancelBtn.innerHTML = '<span style="font-size:15px;font-weight:700;line-height:1">×</span><span>Cancel last entry</span>';
  cancelBtn.onclick = function(ev){ ev.preventDefault(); ev.stopPropagation(); _ipmCancelLastEntry(itemKey); };
  btnRow.appendChild(addAllBtn);
  btnRow.appendChild(cancelBtn);
  container.appendChild(btnRow);
  // ONE attachments area per item (item-level, shared across all entries).
  container.appendChild(_ipmBuildAttachmentArea(itemKey));

  return container;
}

/* Build ONE entry-card — a self-contained block holding one row of every
   field (Minutes, Follow-up + Status, Action Items, Responsibility).
   The header strip ("Entry N" + × remove) is rendered for every card
   except the first; refresh of card numbering is handled centrally by
   _ipmRefreshEntryHeaders after add/remove. */
function _ipmBuildEntryCard(itemKey, idx) {
  const card = document.createElement('div');
  card.className = 'entry-card';
  card.dataset.itemKey  = itemKey;
  card.dataset.entryIdx = String(idx);
  card.style.cssText = 'border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:var(--surface)';

  // Header strip — only meaningful when there are 2+ cards. Hidden by
  // default for the first card; toggled by _ipmRefreshEntryHeaders.
  const hdr = document.createElement('div');
  hdr.className = 'entry-card-header';
  hdr.style.cssText = 'display:none;align-items:center;justify-content:space-between;gap:8px;margin:-2px 0 10px;padding-bottom:8px;border-bottom:1px dashed var(--line)';
  const hdrLabel = document.createElement('span');
  hdrLabel.className = 'entry-card-label';
  hdrLabel.style.cssText = 'font-size:11px;font-weight:700;color:var(--ink-2);text-transform:uppercase;letter-spacing:.5px';
  hdrLabel.textContent = 'Entry ' + (idx + 1);
  const rmBtn = document.createElement('button');
  rmBtn.type = 'button';
  rmBtn.className = 'entry-remove-btn';
  rmBtn.title = 'Remove this entry';
  rmBtn.style.cssText = 'display:inline-flex;align-items:center;gap:4px;background:transparent;border:1px solid var(--line);color:#b91c1c;padding:3px 9px;border-radius:6px;font-size:11px;line-height:1;cursor:pointer;font-weight:700;font-family:inherit';
  rmBtn.innerHTML = '<span style="font-size:13px;line-height:1">×</span><span>Remove</span>';
  rmBtn.onclick = function(ev){
    ev.preventDefault(); ev.stopPropagation();
    _ipmRemoveEntryCard(itemKey, parseInt(card.dataset.entryIdx || '0', 10));
  };
  hdr.appendChild(hdrLabel);
  hdr.appendChild(rmBtn);
  card.appendChild(hdr);

  // Minutes
  card.appendChild(_ipmBuildFieldList(itemKey, 'minutes', idx));
  // Follow-up + Status (paired)
  card.appendChild(_ipmBuildPairedFollowUpList(itemKey, idx));
  // Action Items
  card.appendChild(_ipmBuildFieldList(itemKey, 'actionItems', idx));
  // Responsibility
  card.appendChild(_ipmBuildFieldList(itemKey, 'responsibility', idx));

  return card;
}

/* Build a single field-list (minutes, actionItems, or responsibility) for
   ONE entry-card. Contains a label and exactly ONE field-instance whose
   data-field-idx matches the card's entry-idx. */
function _ipmBuildFieldList(itemKey, field, idx) {
  if (idx == null) idx = 0;
  const labels = _ipmFieldLabels(field);
  const wrap = document.createElement('div');
  wrap.className = 'field-list-wrap';
  wrap.dataset.itemKey = itemKey;
  wrap.dataset.field = field;
  wrap.style.cssText = 'margin-bottom:14px';

  const lbl = document.createElement('label');
  lbl.style.cssText = 'display:block;font-size:11px;font-weight:700;color:var(--ink-2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px';
  lbl.textContent = labels.label;
  wrap.appendChild(lbl);

  const list = document.createElement('div');
  list.className = 'field-list';
  list.dataset.itemKey = itemKey;
  list.dataset.field = field;
  wrap.appendChild(list);

  list.appendChild(_ipmNewFieldInstance(itemKey, field, idx));
  return wrap;
}

/* Follow-up + Status are paired inside one entry-card. Labels live in a
   header row inside the wrap (every card shows them, since each card is
   a self-contained entry); the instance itself never renders labels. */
function _ipmBuildPairedFollowUpList(itemKey, idx) {
  if (idx == null) idx = 0;
  const wrap = document.createElement('div');
  wrap.className = 'field-list-wrap';
  wrap.dataset.itemKey = itemKey;
  wrap.dataset.field = 'followUp';
  wrap.style.cssText = 'margin-bottom:14px';

  // Two-column header: Follow Up Action Items | Status
  const lblRow = document.createElement('div');
  lblRow.style.cssText = 'display:grid;grid-template-columns:1fr 180px auto;gap:10px;margin-bottom:6px';
  const fuLbl = document.createElement('label');
  fuLbl.style.cssText = 'font-size:11px;font-weight:700;color:var(--ink-2);text-transform:uppercase;letter-spacing:.5px';
  fuLbl.textContent = 'Follow Up Action Items';
  const stLbl = document.createElement('label');
  stLbl.style.cssText = 'font-size:11px;font-weight:700;color:var(--ink-2);text-transform:uppercase;letter-spacing:.5px';
  stLbl.textContent = 'Status';
  const spacerLbl = document.createElement('span');
  lblRow.appendChild(fuLbl);
  lblRow.appendChild(stLbl);
  lblRow.appendChild(spacerLbl);
  wrap.appendChild(lblRow);

  const list = document.createElement('div');
  list.className = 'field-list';
  list.dataset.itemKey = itemKey;
  list.dataset.field = 'followUp';
  wrap.appendChild(list);

  list.appendChild(_ipmNewFollowUpInstance(itemKey, idx));
  return wrap;
}

/* Build a single field-instance (textarea or input). The per-row × button
   has moved to the entry-card header (one × removes a whole card), so
   instances no longer render their own remove control. */
function _ipmNewFieldInstance(itemKey, field, idx) {
  const labels = _ipmFieldLabels(field);
  const inst = document.createElement('div');
  inst.className = 'field-instance';
  inst.dataset.itemKey = itemKey;
  inst.dataset.field = field;
  inst.dataset.fieldIdx = String(idx);
  inst.style.cssText = 'display:flex;align-items:flex-start;gap:6px;margin-bottom:6px';

  let input;
  if (labels.inputType === 'input') {
    input = document.createElement('input');
    input.type = 'text';
  } else {
    input = document.createElement('textarea');
    input.rows = labels.rows;
  }
  input.setAttribute('data-field', field);
  input.setAttribute('data-field-idx', String(idx));
  input.placeholder = labels.placeholder;
  input.style.cssText = 'flex:1';
  inst.appendChild(input);

  return inst;
}

/* Build a paired follow-up + status instance (followUp textarea + status
   select sharing the same fieldIdx). Labels live in the parent wrap, so
   the instance itself never renders inline labels. The grid keeps a third
   spacer column to preserve alignment with the wrap's header row. */
function _ipmNewFollowUpInstance(itemKey, idx) {
  const inst = document.createElement('div');
  inst.className = 'field-instance';
  inst.dataset.itemKey = itemKey;
  inst.dataset.field = 'followUp';
  inst.dataset.fieldIdx = String(idx);
  inst.style.cssText = 'display:grid;grid-template-columns:1fr 180px auto;gap:10px;margin-bottom:8px;align-items:start';

  // Follow-up textarea
  const fuWrap = document.createElement('div');
  const fu = document.createElement('textarea');
  fu.setAttribute('data-field', 'followUp');
  fu.setAttribute('data-field-idx', String(idx));
  fu.rows = 2;
  fu.placeholder = 'Auto-filled from previous week\'s action items';
  fu.style.cssText = 'width:100%';
  fuWrap.appendChild(fu);
  inst.appendChild(fuWrap);

  // Status select
  const stWrap = document.createElement('div');
  const st = document.createElement('select');
  st.setAttribute('data-field', 'status');
  st.setAttribute('data-field-idx', String(idx));
  st.style.cssText = 'width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;background:#fff;font-family:inherit;font-size:13px';
  st.innerHTML = '<option value="">—</option><option value="Completed">Completed</option><option value="In Progress">In Progress</option>';
  // Per-card lock: marking the paired Follow-Up Status to "Completed"
  // disables ONLY the Action Items textarea inside the SAME entry-card.
  // It does NOT touch the follow-up text itself, other entry-cards, or
  // newly-added "Add entry" cards (each card has its own status select,
  // empty by default, so its action items stay editable). Selecting
  // "In Progress" or clearing back to "—" re-enables the action items.
  // The carry-forward server logic (ipmGetCarryForward in Code.gs) still
  // drops Completed follow-ups and carries In Progress ones into next
  // week's follow-up list, and always carries this week's action items
  // forward as separate next-week follow-ups.
  st.addEventListener('change', function(){ _ipmSyncActionItemsLockState(inst); });
  stWrap.appendChild(st);
  inst.appendChild(stWrap);

  // Spacer column to align with the wrap header row.
  const ph = document.createElement('span');
  inst.appendChild(ph);

  // NB: no synchronous initial sync runs here. At this point the
  // enclosing entry-card has not yet appended its Action Items field-
  // list (the card appends siblings in order: minutes, followUp+status,
  // actionItems, responsibility — see _ipmBuildEntryCard), so
  // inst.closest('.entry-card') would be null and the lookup would
  // bail. That's fine: status defaults to "" on a fresh instance so no
  // lock is needed, and every subsequent path that may set the status
  // (_ipmApplyFollowUpStateTo after card append, draft restore via
  // setFollowUpAndStatus, and the change listener above) explicitly
  // calls the sync helper at the correct moment.

  return inst;
}

/* Per-card lock toggle for the Action Items textarea, driven by the
   paired Follow-Up Status value of THIS entry-card.
   Argument is the followUp+status field-instance. From it we walk up
   to the enclosing .entry-card, then down to the SAME card's Action
   Items textarea (each card contains exactly one of each field) and
   toggle its disabled state:
     • status === "Completed" → disable + readOnly + mark the entry-card
                                with `.entry-completed` so CSS paints
                                the Action Items textarea as locked.
     • anything else         → re-enable + remove the marker class.
   Scope is strictly per entry-card. Every "+ Add entry" card has its
   own independent status (empty by default), so locking one card has
   zero effect on any other card — add-on entries stay fully editable. */
function _ipmSyncActionItemsLockState(fuInst) {
  if (!fuInst) return;
  const st = fuInst.querySelector('[data-field="status"]');
  if (!st) return;
  // Walk up to the entry-card. Returns null if the instance isn't yet
  // attached (first synchronous render pass) — bail silently; a later
  // sync call will handle it once the card is in the DOM.
  const card = fuInst.closest('.entry-card');
  if (!card) return;
  // Each entry-card holds exactly ONE Action Items field-instance with
  // ONE textarea inside; querySelector returns it uniquely.
  const aiInst = card.querySelector('.field-instance[data-field="actionItems"]');
  const ai     = aiInst && aiInst.querySelector('[data-field="actionItems"]');
  if (!ai) return;
  const isCompleted = (st.value === 'Completed');
  ai.disabled = isCompleted;
  // readOnly as a secondary signal — keeps the text fully selectable for
  // copy/reference even while locked, and survives any third-party
  // styling that overlooks `disabled`.
  ai.readOnly = isCompleted;
  if (isCompleted) {
    card.classList.add('entry-completed');
    ai.setAttribute('title', 'Locked — this entry is marked Completed. Change the status to edit, or click "+ Add entry" to log unrelated new action items in a separate entry.');
  } else {
    card.classList.remove('entry-completed');
    ai.removeAttribute('title');
  }
}

/* DEPRECATED — formerly the per-row × button rendered inside each field
   instance for idx>0. The entry-card model replaced per-row removal with
   a single × in the entry-card header, so this is unused. Kept for
   backwards compatibility in case any extension references it. */
function _ipmBuildRemoveButton(itemKey, field, idx) {
  const rm = document.createElement('button');
  rm.type = 'button';
  rm.className = 'field-remove';
  rm.title = 'Remove this entry';
  rm.textContent = '×';
  rm.style.cssText = 'background:transparent;border:0;color:#b91c1c;font-size:18px;line-height:1;cursor:pointer;padding:4px 8px;flex-shrink:0';
  rm.onclick = function(ev){
    ev.preventDefault(); ev.stopPropagation();
    _ipmRemoveField(itemKey, field, idx);
  };
  return rm;
}

/* "+ Add another ..." button factory. */
function _ipmBuildAddButton(label, onClick) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'field-add';
  btn.style.cssText = 'display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1.5px solid var(--line);color:var(--navy);padding:5px 11px;border-radius:7px;font-size:12px;line-height:1;cursor:pointer;font-weight:600;font-family:inherit;margin-top:4px';

/* Item-level attachment area (one per activity item). File key = itemKey. */
function _ipmBuildAttachmentArea(itemKey) {
  const wrap = document.createElement('div');
  wrap.className = 'attachments-box';
  wrap.dataset.itemKey = itemKey;
  wrap.style.cssText = 'margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);display:flex;align-items:center;flex-wrap:wrap;gap:8px';

  lbl.style.cssText = 'display:inline-flex;align-items:center;gap:5px;cursor:pointer;padding:5px 12px;border:1px solid var(--line);border-radius:7px;font-size:12px;font-weight:600;color:var(--ink-2);background:var(--surface-2);user-select:none;flex-shrink:0';
  lbl.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>Attach files<input type="file" multiple hidden data-field="files" onchange="ipmFileChange(event,\'' + itemKey + '\')">';

  list.id = 'attach-list-' + itemKey;
  list.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px';
  wrap.appendChild(list);

/* Append a new entry-card. Kept under the legacy name `_ipmAddField` so
   existing callers (carry-forward, draft-restore) that previously asked
   for "one more instance of field X" now grow the card count instead.
   The `field` argument is accepted for backwards compatibility but is
   only used to focus the matching input on the new card. */
function _ipmAddField(itemKey, field) {
  const inst = _ipmAppendEntryCard(itemKey);
  if (!inst) return;
  // Focus the field that was requested (if recognised) on the new card.
  const focusSel = (field === 'status' || field === 'followUp')
    ? '[data-field="' + (field === 'status' ? 'status' : 'followUp') + '"]'
    : '[data-field="' + field + '"]';
  const focusable = inst.querySelector(focusSel) || inst.querySelector('textarea,input[type="text"]');
  if (focusable && focusable.focus) setTimeout(function(){ try{ focusable.focus(); }catch(_){} }, 30);
}

/* Add a complete new entry — i.e. a whole new card containing one row of
   all four fields (Minutes, Follow-up + Status, Action Items,
   Responsibility). Triggered by the "+ Add entry" button. */
function _ipmAddAllFields(itemKey) {
  const card = _ipmAppendEntryCard(itemKey);
  if (!card) return;
  // Reveal the bottom Cancel-last-entry button (it's hidden while only
  // one card exists).
  const cancelBtn = document.querySelector('.cancel-entry-btn[data-item-key="' + itemKey + '"]');
  if (cancelBtn) cancelBtn.style.display = 'inline-flex';
  // Move focus to the new card's first input.
  const focusable = card.querySelector('textarea,input[type="text"]');
  if (focusable) setTimeout(function(){ try{ focusable.focus(); }catch(_){} }, 30);
}

/* Append one new entry-card to the host. Returns the card element. */
function _ipmAppendEntryCard(itemKey) {
  const host = document.querySelector('.entry-cards-host[data-item-key="' + itemKey + '"]');
  if (!host) return null;
  // Compute the next entry index — one above the current max (gaps are
  // tolerated; the data collector iterates DOM order and ignores idx).
  let nextIdx = 0;
  host.querySelectorAll('.entry-card').forEach(function(c){
    const v = parseInt(c.dataset.entryIdx || '0', 10);
    if (!isNaN(v) && v >= nextIdx) nextIdx = v + 1;
  });
  const card = _ipmBuildEntryCard(itemKey, nextIdx);
  host.appendChild(card);
  // Apply Week-1 / carry-forward state to the new card's followUp instance.
  const fuInst = card.querySelector('.field-instance[data-field="followUp"]');
  if (fuInst) _ipmApplyFollowUpStateTo(fuInst);
  // Refresh card headers (now that the card count has changed).
  _ipmRefreshEntryHeaders(itemKey);
  return card;
}

/* Remove the most-recently-added entry-card. The first card is the
   anchor and can never be removed. Hides the bottom Cancel button once
   only one card remains. */
function _ipmCancelLastEntry(itemKey) {
  const host = document.querySelector('.entry-cards-host[data-item-key="' + itemKey + '"]');
  if (!host) return;
  const cards = host.querySelectorAll('.entry-card');
  if (cards.length <= 1) return;
  cards[cards.length - 1].remove();
  _ipmRefreshEntryHeaders(itemKey);
  if (host.querySelectorAll('.entry-card').length <= 1) {
    const cancelBtn = document.querySelector('.cancel-entry-btn[data-item-key="' + itemKey + '"]');
    if (cancelBtn) cancelBtn.style.display = 'none';
  }
}

/* Remove a specific entry-card by its data-entry-idx. Wired to the per-
   card × button. The first card (entry-idx 0) can never be removed; if
   the user removes the card whose idx==0 was renumbered (via gaps), the
   ANCHOR card — i.e. the first card in DOM order — is what we protect. */
function _ipmRemoveEntryCard(itemKey, entryIdx) {
  const host = document.querySelector('.entry-cards-host[data-item-key="' + itemKey + '"]');
  if (!host) return;
  const cards = host.querySelectorAll('.entry-card');
  if (cards.length <= 1) return;
  // Refuse to remove the anchor (first DOM card).
  const target = host.querySelector('.entry-card[data-entry-idx="' + entryIdx + '"]');
  if (!target || target === cards[0]) return;
  target.remove();
  _ipmRefreshEntryHeaders(itemKey);
  if (host.querySelectorAll('.entry-card').length <= 1) {
    const cancelBtn = document.querySelector('.cancel-entry-btn[data-item-key="' + itemKey + '"]');
    if (cancelBtn) cancelBtn.style.display = 'none';
  }
}

/* Show / hide / renumber the per-card "Entry N" headers. The first card
   never shows a header (it looks like the default form). All later cards
   show "Entry N" with a × Remove button. */
function _ipmRefreshEntryHeaders(itemKey) {
  const host = document.querySelector('.entry-cards-host[data-item-key="' + itemKey + '"]');
  if (!host) return;
  const cards = host.querySelectorAll('.entry-card');
  cards.forEach(function(card, i){
    const hdr = card.querySelector('.entry-card-header');
    const lbl = card.querySelector('.entry-card-label');
    if (!hdr) return;
    if (i === 0) {
      hdr.style.display = 'none';
    } else {
      hdr.style.display = 'flex';
      if (lbl) lbl.textContent = 'Entry ' + (i + 1);
    }
  });
}

/* Backwards-compat shim. The old per-row × removed a single field's
   instance; in the entry-card model that no longer makes sense, so this
   maps to "remove the whole card whose data-entry-idx matches idx".
   Retained so any stray external caller continues to work. */
function _ipmRemoveField(itemKey, field, idx) {
  _ipmRemoveEntryCard(itemKey, idx);
}

/* Apply baseline state to a single paired followUp instance.
   Placeholder + status-select-enabled are always set here; the per-card
   Action Items lock is delegated to _ipmSyncActionItemsLockState so that
   an existing "Completed" selection (e.g. after a draft restore or a
   carry-forward refresh) keeps the matching Action Items textarea
   locked instead of being silently re-enabled. The follow-up textarea
   itself is never locked — only the Action Items field inside the same
   entry-card is. */
function _ipmApplyFollowUpStateTo(inst) {
  const fu = inst.querySelector('[data-field="followUp"]');
  const st = inst.querySelector('[data-field="status"]');
  if (fu) {
    fu.placeholder = 'Follow up on previous week action item';
  }
  if (st) { st.disabled = false; }
  // Drive the SAME card's Action Items disabled state from this instance's
  // status value.
  _ipmSyncActionItemsLockState(inst);
}

/* Ask the server for carry-forward data for the currently selected
   semester+weekOf, then apply it to the form (disable or pre-fill). */
async function _ipmRefreshCarryForward() {
  const sem = ($('#semester')||{}).value || 'Odd';
  // Guard: if _mySubs hasn't been loaded yet, fetch it now so priorCount is accurate
  if (!state._mySubs) {
    try { state._mySubs = await call('ipmMySubmissions', state.token); } catch(_) { state._mySubs = []; }
  }
  // Week 1 = user has no prior non-draft submissions at all
  const priorCount = (state._mySubs||[]).filter(function(s){ return s.status !== 'Draft'; }).length;
  try {
    if (priorCount === 0) {
      state._carryForward = { hasPrevious:false, byItem:{} };
    } else {
      // Pass a far-future date so backend returns latest submission regardless of weekOf
      state._carryForward = await call('ipmGetCarryForward', state.token, sem, '9999-12-31') || { hasPrevious:false, byItem:{} };
    }
  } catch(_) {
    state._carryForward = { hasPrevious:false, byItem:{} };
  }
  _ipmApplyCarryForwardToForm();
}

/* Apply the carry-forward data to every item's follow-up list. */
function _ipmApplyCarryForwardToForm() {
  const cf = state._carryForward || { hasPrevious:false, byItem:{} };
  document.querySelectorAll('.item-fields').forEach(function(itemFields){
    const itemKey = itemFields.dataset.itemKey;
    const host = itemFields.closest('.entries-host');
    const title = host ? (host.dataset.itemTitle || '') : '';

    // Apply block-state to every follow-up instance ACROSS all entry-cards.
    itemFields.querySelectorAll('.field-instance[data-field="followUp"]')
              .forEach(_ipmApplyFollowUpStateTo);

    // Pre-fill follow-up field on each card with last week's action items
    // (Always — even Week 1 — so users see the carryover text.)
    const carried = (cf.byItem && cf.byItem[title]) || [];
    if (!carried.length) return;
    // Ensure there are enough entry-cards to host every carried item.
    let fuInstances = itemFields.querySelectorAll('.field-instance[data-field="followUp"]');
    while (fuInstances.length < carried.length) {
      _ipmAppendEntryCard(itemKey);
      fuInstances = itemFields.querySelectorAll('.field-instance[data-field="followUp"]');
    }
    // Iterate in DOM order — i-th followUp instance gets the i-th carried value.
    for (let i = 0; i < carried.length; i++) {
      const inst = fuInstances[i];
      if (!inst) continue;
      const fu = inst.querySelector('[data-field="followUp"]');
      if (fu) fu.value = carried[i] || '';
    }
    // If we grew the card count above 1, make sure the bottom Cancel-last
    // button is visible so users can collapse extras if they want.
    if (carried.length > 1) {
      const cancelBtn = document.querySelector('.cancel-entry-btn[data-item-key="' + itemKey + '"]');
      if (cancelBtn) cancelBtn.style.display = 'inline-flex';
    }
  });
}

// ── Attachment helpers ──────────────────────────────────────────────────
function ipmFileChange(e, key){
  const MAX = 10 * 1024 * 1024;
  const all = Array.from(e.target.files);
  const big = all.filter(f => f.size > MAX);
  if(big.length) toast(big.length + ' file(s) exceed 10 MB and were skipped', 'err');
  const ok = all.filter(f => f.size <= MAX);
  window._ipmFiles[key] = (window._ipmFiles[key] || []).concat(ok);
  e.target.value = '';
  ipmRenderList(key);
}
function ipmRenderList(key){
  const el = document.getElementById('attach-list-' + key);
  if(!el) return;
  const files = window._ipmFiles[key] || [];
  el.innerHTML = files.map((f, i) =>
    `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--surface-2);border:1px solid var(--line);border-radius:6px;font-size:11px;color:var(--ink-2)">` +
    esc(f.name) +
    `<button type="button" onclick="ipmRemoveFile('${key}',${i})" style="background:none;border:none;cursor:pointer;color:var(--muted);padding:0;font-size:15px;line-height:1">\u00d7</button></span>`
  ).join('');
}
function ipmRemoveFile(key, idx){
  if(window._ipmFiles && window._ipmFiles[key]){
    window._ipmFiles[key].splice(idx, 1);
    ipmRenderList(key);
  }
}
async function ipmReadFiles(key){
  const files = (window._ipmFiles && window._ipmFiles[key]) || [];
  return Promise.all(files.map(f => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = ev => res({ name: f.name, type: f.type || 'application/octet-stream', data: ev.target.result.split(',')[1] });
    r.onerror = rej;
    r.readAsDataURL(f);
  })));
}
// Semester segment buttons use inline onclick="setSemester(...)" on the markup
(function(){
  const rf = $('#reportForm');
  if(!rf){ console.error('[IPM] #reportForm not found at attach time'); return; }
  console.log('[IPM] reportForm listeners attaching');
  rf.addEventListener('input', ()=>{ state.dirty=true; });
  rf.addEventListener('submit', async e=>{
    e.preventDefault();
    try {
      const semEl=$('#semester'), wkEl=$('#weekOf');
      const payload={
        semester: semEl ? semEl.value : 'Odd',
        weekOf: wkEl ? wkEl.value : '',
        tasks: '',
        items: []
      };
      if(!payload.weekOf){ toast('Please select a week before submitting','err'); return; }
      // Duplicate check (non-Draft)
      // Duplicate check: only one submission per calendar date allowed
      const _nw = v=>String(v||'').trim().slice(0,10);
      const todayStr = _monStr(new Date());
      const _dup=(state._mySubs||[]).find(sub=>
        sub.status !== 'Draft' && _nw(sub.weekOf)===todayStr
      );
      if(_dup){ toast('You have already submitted a report today. Come back next week!','err'); return; }

      // ── Collect per-item field arrays and validate ─────────────────────
      // For each activity item, gather all instances of each field type,
      // join them with IPM_FIELD_JOIN ("|||"), and send as ONE record per
      // item. The server stores the joined string as-is — no schema change.
      // Attachments live once per item, so we read files via itemKey.
      // Collect all item fields — no required validation, all fields optional
      for(const sec of (state.activities||[])){
        for(const it of (sec.items||[])){
          if(!it._key) continue;
          const itemFields = document.querySelector('.item-fields[data-item-key="' + it._key + '"]');
          if(!itemFields) continue;

          // Walk field-instances in DOM order across ALL entry-cards.
          // For status (which lives inside the paired followUp instance),
          // we look up the followUp wrapper and read the inner status select.
          const collectField = function(field) {
            const wrapperField = (field === 'status') ? 'followUp' : field;
            return Array.from(
              itemFields.querySelectorAll('.field-instance[data-field="' + wrapperField + '"]')
            ).map(function(inst){
              const el = inst.querySelector('[data-field="' + field + '"]');
              return el ? (el.value || '').trim() : '';
            });
          };
          const minutesArr = collectField('minutes');
          const actionArr  = collectField('actionItems');
          const respArr    = collectField('responsibility');
          const fuArr      = collectField('followUp');
          const stArr      = collectField('status');

          let files = [];
          try { files = await ipmReadFiles(it._key); } catch(_){}

          payload.items.push({
            title: it.title,
            minutes:        minutesArr.join(IPM_FIELD_JOIN),
            actionItems:    actionArr .join(IPM_FIELD_JOIN),
            responsibility: respArr   .join(IPM_FIELD_JOIN),
            followUp:       fuArr     .join(IPM_FIELD_JOIN),
            status:         stArr     .join(IPM_FIELD_JOIN),
            files:          files
          });
        }
      }

      // Filter out items where all three are "NA" (or all-empty — won't happen after validation)
      // Keep all items for submission — NA is a valid value
      const ok=await confirmDialog({
        title: 'Submit weekly report?',
        message: `Submit Week ${(state._mySubs||[]).filter(s=>s.status!=='Draft').length + 1} report (${payload.semester} semester)?`,
        okText: 'Yes, submit', cancelText: 'Review again'
      });
      if(!ok) return;

      const btn=e.submitter||$('#reportForm button[type=submit]');
      await withBusy(btn, async()=>{
        try{ await call('ipmSubmitReport', state.token, payload); }
        catch(err){ toast((err&&err.message)||'Submit failed','err'); return; }
        // Clear draft for this week if one existed
        if(state._currentDraftId){
          try{ await call('ipmDeleteDraft', state.token, state._currentDraftId); }catch(_){}
          state._currentDraftId=null;
        }
        state.dirty=false;
        const draftBanner=document.getElementById('draftBanner'); if(draftBanner) draftBanner.style.display='none';
        toast('Report submitted successfully','ok');
        try{
          const rf=$('#reportForm'); if(rf) rf.reset();
          $$('#hoi-submit .seg-btn').forEach(b=>b.classList.toggle('active', b.dataset.sem==='Odd'));
          const semEl2=$('#semester'); if(semEl2) semEl2.value='Odd';
          populateWeekSelect('Odd');
        }catch(_){}
        window._ipmFiles={};
        loadActivitiesForm();
        loadHoiDashboard();
        loadMySubs();
      });
    } catch(outerErr) {
      toast('Submit error: ' + (outerErr.message || outerErr), 'err');
    }
  });
})();
async function loadMySubs(){
  const body=$('#mySubsBody'); body.innerHTML='<tr><td colspan="5" class="muted">Loading…</td></tr>';
  try{
    state._mySubs = await call('ipmMySubmissions', state.token);
    renderMySubs();
    // Update sequential week label now that submission count is known
    try { _ipmUpdateWeekLabel(); } catch(_){}
  }catch(e){ body.innerHTML=`<tr><td colspan="5" class="muted">${esc(e.message)}</td></tr>`; }
}
function renderMySubs(){
  const body=$('#mySubsBody');
  const q = ($('#mySubsSearch')?.value || '').toLowerCase().trim();
  const all = state._mySubs || [];
  const filtered = q
    ? all.filter(s => {
        const hay = [
          s.semester, s.status, s.tasks,
          new Date(s.timestamp).toLocaleString(),
          fmtWeek(s.weekOf)
        ].join(' ').toLowerCase();
        return hay.indexOf(q) !== -1;
      })
    : all;
  const cnt = $('#mySubsCount');
  if(cnt) cnt.textContent = filtered.length === all.length
    ? `${all.length} submission${all.length!==1?'s':''}`
    : `${filtered.length} of ${all.length} match`;
  if(!filtered.length){ body.innerHTML='<tr><td colspan="5" class="muted">'+(q?'No matches':'No submissions yet')+'</td></tr>'; return; }
  // Build sequential week numbers — non-drafts sorted oldest first get Week 1, 2, 3...
  const nonDraftsSorted = all.filter(s => s.status !== 'Draft')
    .slice().sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
  const weekNumMap = {};
  nonDraftsSorted.forEach((s, i) => { weekNumMap[s.id] = i + 1; });

  body.innerHTML = filtered.map(s=>{
    const isDraft    = s.status === 'Draft';
    const isReviewed = s.status === 'Reviewed';
    const chipClass  = isDraft ? 'chip-draft' : isReviewed ? 'reviewed' : 'ok';
    const canDelete  = !isReviewed;
    const weekLabel  = isDraft ? 'Draft' : ('Week ' + (weekNumMap[s.id] || '?'));
    const actions = isDraft
      ? `<button class="btn-view btn-continue-draft" onclick="loadDraftIntoForm('${s.id}')">Continue</button>
         <button class="btn-view btn-discard-draft"  onclick="deleteSub('${s.id}','draft')">Discard</button>`
      : `<button class="btn-view" onclick="viewSub('${s.id}')">View</button>
         ${!isReviewed?`<button class="btn-view btn-edit-sub" onclick="editSub('${s.id}')">Edit</button>`:''}
         <button class="btn-view btn-pdf-sub" title="Download PDF" onclick="generateSubPdf('${s.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> PDF</button>
         ${canDelete?`<button class="btn-view btn-delete-sub" onclick="deleteSub('${s.id}','submit')">Delete</button>`:''}`;
    return `
      <tr class="${isDraft?'draft-row':''}">
        <td style="color:var(--ink-2)">${new Date(s.timestamp).toLocaleString()}</td>
        <td style="font-weight:600">${esc(weekLabel)}</td>
        <td>${esc(s.semester)}</td>
        <td><span class="chip ${chipClass}">${esc(s.status)}</span></td>
        <td style="white-space:nowrap">${actions}</td>
      </tr>`;
  }).join('');
}

// ============ VIEW SUBMISSION (shared HOI + IMO) ============
async function viewSub(id){
  try{
    const d=await call('ipmSubmissionDetail', state.token, id);
    let logo='';
    if(state.tree&&state.tree[d.head.campus]){
      const inst=state.tree[d.head.campus].find(x=>x.code===d.head.institution);
      if(inst) logo=inst.logo||'';
    }

    // Render helper: one activity item (with attachments)
    const _item = i => {
      const atts = (i.attachmentList||[]).filter(a=>a&&a.url);
      const attHtml = atts.length ? `
        <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Attachments</span>
          ${atts.map(a=>`<a href="${esc(a.url)}" target="_blank"
              style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
                     background:var(--surface-2);border:1px solid var(--line);border-radius:6px;
                     font-size:12px;color:var(--brand);text-decoration:none">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              ${esc(a.name||'File')}</a>`).join('')}
        </div>` : '';
      return `
      <div class="detail-item">
        <div class="detail-item-title">${esc(i.itemTitle||i.title||'')}</div>
        <div class="detail-fields">
          ${i.followUp ? `<div class="detail-field"><label>Follow Up Action Items</label><p>${esc(i.followUp)}</p></div>` : ''}
          ${i.status   ? `<div class="detail-field"><label>Status</label><p><span class="chip ${i.status==='Completed'?'ok':i.status==='In Progress'?'chip-warn':''}" style="font-size:11px">${esc(i.status)}</span></p></div>` : ''}
          <div class="detail-field"><label>Minutes</label><p>${esc(i.minutes)||'<span style="color:var(--muted)">—</span>'}</p></div>
          <div class="detail-field"><label>Action Items</label><p>${esc(i.actionItems)||'<span style="color:var(--muted)">—</span>'}</p></div>
          <div class="detail-field"><label>Responsibility</label><p>${esc(i.responsibility)||'<span style="color:var(--muted)">—</span>'}</p></div>
        </div>
        ${attHtml}
      </div>`;
    };

    // Use sections (grouped with headings) if available, else flat list
    const hasSections = d.sections && d.sections.length;
    const itemsHtml = hasSections
      ? d.sections.map(sec=>`
          <div class="detail-section">
            <div style="display:flex;align-items:center;gap:8px;padding:8px 14px;
                        background:linear-gradient(135deg,#1a2332,#28375a);color:#fff;
                        border-radius:8px;margin-top:12px;margin-bottom:0">
              ${sec.sectionNo?`<span style="background:rgba(255,255,255,.2);font-size:10px;font-weight:800;padding:1px 8px;border-radius:5px;flex-shrink:0">${esc(sec.sectionNo)}</span>`:''}
              <span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em">${esc(sec.sectionTitle)}</span>
              <span style="margin-left:auto;font-size:10px;color:rgba(255,255,255,.5)">${sec.items.length} item${sec.items.length!==1?'s':''}</span>
            </div>
            ${sec.items.map(_item).join('')}
          </div>`)
        .join('')
      : d.items.length
        ? `<div class="detail-section">${d.items.map(_item).join('')}</div>`
        : '<p class="muted">No activity items recorded</p>';

    openModal(`
      <div class="modal-header">
        ${logo?`<div class="modal-logo"><img src="${logo}" alt=""></div>`:''}
        <div style="flex:1">
          <div style="font-size:11px;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">${esc(d.head.campus)} · ${esc(d.head.institution)}</div>
          <h2 style="margin:0;font-size:20px;color:var(--navy)">Weekly Report</h2>
          <p style="margin:4px 0 0;color:var(--muted);font-size:13px">
            ${fmtWeekLabel(d.head.weekOf, d.head.timestamp)} &nbsp;·&nbsp;
            ${esc(d.head.semester)} Semester &nbsp;·&nbsp;
            Submitted ${new Date(d.head.timestamp).toLocaleString()}
          </p>
        </div>
        <span class="chip ${d.head.status==='Reviewed'?'reviewed':'ok'}" style="flex-shrink:0">${esc(d.head.status)}</span>
      </div>
      ${itemsHtml}
      ${d.head.tasks?`
        <div style="background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-top:12px">
          <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Tasks / Notes</div>
          <p style="margin:0;font-size:13px;line-height:1.6;color:var(--ink)">${esc(d.head.tasks)}</p>
        </div>`:''}
    `);
  }catch(e){ toast(e.message,'err'); }
}

// Breadcrumb renderer
function setCrumbs(list){
  const c=$('#imoCrumbs'); c.innerHTML='';
  list.forEach((x,i)=>{
    const span=document.createElement('span');
    span.className='crumb'+(i===list.length-1?' active-crumb':'');
    span.textContent=x.label;
    if(i<list.length-1) span.addEventListener('click',()=>{
      if(x.level==='root') enterImo();
      else if(x.level==='campus') imoOpenCampus(state.selectedCampus);
    });
    c.appendChild(span);
    if(i<list.length-1){
      const sep=document.createElement('span');
      sep.className='sep'; sep.textContent='›'; c.appendChild(sep);
    }
  });
}

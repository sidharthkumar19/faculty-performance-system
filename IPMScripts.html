async function imoOpenInstitution(campus, code, name){
  setCrumbs([
    {label:'Dashboard',level:'root'},
    {label:campus,level:'campus'},
    {label:code,level:'inst'}
  ]);

  const body=$('#imoBody');
  body.innerHTML=`<div class="skeleton" style="height:110px;border-radius:16px;margin-bottom:20px"></div>
    <div class="skeleton" style="height:64px;border-radius:12px;margin-bottom:18px"></div>
    <div class="skeleton" style="height:300px;border-radius:14px"></div>`;

  try{
    state._imoSubs = await call('ipmImoInstitutionSubmissions', state.token, campus, code);
    state._imoCampus = campus; state._imoCode = code; state._imoName = name;
    const subs = state._imoSubs;

    let logo='';
    if(state._logos) logo=state._logos[code]||'';
    else if(state.tree&&state.tree[campus]){ const inst=state.tree[campus].find(x=>x.code===code); if(inst) logo=inst.logo||''; }

    const now=new Date();
    const yr=now.getFullYear(), mo=now.getMonth();

    // This week: Monday–Sunday containing today
    const todayMs=now.setHours(0,0,0,0);
    const dow=now.getDay(); // 0=Sun
    const monMs=todayMs-(dow===0?6:dow-1)*86400000;
    const sunMs=monMs+6*86400000;
    const thisWeek=subs.filter(s=>{
      const t=new Date(s.timestamp).setHours(0,0,0,0);
      return t>=monMs && t<=sunMs;
    }).length;

    const thisMonth=subs.filter(s=>{
      const d=new Date(s.timestamp);
      return d.getMonth()===mo && d.getFullYear()===yr;
    }).length;

    const thisYear=subs.filter(s=>new Date(s.timestamp).getFullYear()===yr).length;

    const lastSub=subs.length?new Date(subs[0].timestamp).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—';

    body.innerHTML=`
      <button onclick="imoOpenCampus('${esc(campus)}')" style="display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--line);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;margin-bottom:16px;transition:.15s">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Back to ${esc(campus)}
      </button>

        <div class="inst-view-logo">
          ${logo
            ?`<img src="${logo}" alt="${esc(code)}">`
            :`<div class="inst-view-logo-fallback">${esc(code)}</div>`}
        </div>
        <div class="inst-view-info">
          <div class="inst-view-code">${esc(campus)} · ${esc(code)}</div>
          <div class="inst-view-name">${esc(name)}</div>
          <div class="inst-view-campus">Institutional Performance Reports</div>
        </div>
      </div>

      <!-- Institution KPI row -->
      <div class="inst-kpi-row">
        <div class="inst-kpi inst-kpi-week">
          <div class="inst-kpi-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <div class="inst-kpi-val">${thisWeek}</div>
          <div class="inst-kpi-lbl">This Week</div>
        </div>
        <div class="inst-kpi inst-kpi-month">
          <div class="inst-kpi-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          </div>
          <div class="inst-kpi-val">${thisMonth}</div>
          <div class="inst-kpi-lbl">This Month</div>
        </div>
        <div class="inst-kpi inst-kpi-year">
          <div class="inst-kpi-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <div class="inst-kpi-val">${thisYear}</div>
          <div class="inst-kpi-lbl">This Year</div>
        </div>
        <div class="inst-kpi inst-kpi-total">
          <div class="inst-kpi-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div class="inst-kpi-val">${subs.length}</div>
          <div class="inst-kpi-lbl">All Time</div>
        </div>
        <div class="inst-kpi inst-kpi-last">
          <div class="inst-kpi-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          </div>
          <div class="inst-kpi-val" style="font-size:15px">${esc(lastSub)}</div>
          <div class="inst-kpi-lbl">Last Submit</div>
        </div>
      </div>

      <div class="card" style="padding:0;overflow:hidden">
        <div class="toolbar" style="padding:16px 20px;border-bottom:1px solid var(--line)">
          <input type="search" id="imoSubsSearch" class="search-input" placeholder="Search by user, week, semester, status...">
          <span class="muted-sm" id="imoSubsCount"></span>
          <button class="btn-secondary" onclick="generateInstitutionPdf()" id="pdfBtn" ${subs.length?'':'disabled'}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            Generate PDF Report
          </button>
        </div>
        <table class="tbl">
          <thead>
            <tr>
              <th>Submitted</th>
              <th>Week Of</th>
              <th>By</th>
              <th>Semester</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="imoSubsBody"></tbody>
        </table>
      </div>`;
    renderImoSubs();
  }catch(e){ toast(e.message,'err'); }
}

function renderImoSubs(){
  const body = document.getElementById('imoSubsBody');
  if(!body) return;
  const q = ($('#imoSubsSearch')?.value || '').toLowerCase().trim();
  const all = state._imoSubs || [];
  const filtered = q
    ? all.filter(s => {
        const hay = [
          s.username, s.semester, s.status, s.tasks,
          new Date(s.timestamp).toLocaleString(),
          fmtWeekLabel(s.weekOf, s.timestamp)
        ].join(' ').toLowerCase();
        return hay.indexOf(q) !== -1;
      })
    : all;
  const cnt = $('#imoSubsCount');
  if(cnt) cnt.textContent = filtered.length === all.length
    ? `${all.length} record${all.length!==1?'s':''}`
    : `${filtered.length} of ${all.length} match`;
  if(!filtered.length){
    body.innerHTML = `<tr><td colspan="6" class="muted" style="padding:40px">${q?'No matches found':'No submissions yet for this institution'}</td></tr>`;
    return;
  }
  body.innerHTML = filtered.map(s => {
    const reviewed = s.status === 'Reviewed';
    return `
      <tr>
        <td style="color:var(--ink-2)">${new Date(s.timestamp).toLocaleString()}</td>
        <td style="font-weight:600">${fmtWeekLabel(s.weekOf, s.timestamp)}</td>
        <td style="color:var(--ink-2)">${esc(s.username)}</td>
        <td>${esc(s.semester)}</td>
        <td><span class="chip ${reviewed?'reviewed':'ok'}">${esc(s.status)}</span></td>
        <td style="white-space:nowrap">
          <button class="btn-view" onclick="viewSub('${s.id}')">View</button>
          <button class="btn-view" onclick="exportSubPdf('${s.id}')" title="Export PDF" style="padding:6px 10px">

// ── helpers ───────────────────────────────────────────────────────
// fmtWeekLabel: show "W2: 15 Apr 2026" — week number from weekOf, date from timestamp
function fmtWeekLabel(weekOf, timestamp){
  const monStr = _weekOfMonday(weekOf);
  if(!monStr) return fmtWeek(weekOf);
  const wn = _weekNumInMonth(monStr);
  // Use timestamp date if available, else use weekOf Monday
  const dateD = timestamp ? new Date(timestamp) : new Date(monStr+'T00:00:00');
  const dateLbl = dateD.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  return 'W'+wn+': '+dateLbl;
}
// Local-timezone YYYY-MM-DD — avoids UTC shift for IST and other UTC+ zones
function _localStr(dt){
  const d=new Date(dt), y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate();
  return y+'-'+(m<10?'0':'')+m+'-'+(day<10?'0':'')+day;
}
function _monStr(d){            // date → "YYYY-MM-DD" of its Monday
  const t = new Date(d);
  t.setHours(0,0,0,0);
  const dow = t.getDay();
  t.setDate(t.getDate() - (dow === 0 ? 6 : dow - 1));
  return _localStr(t);
}
function _addDays(dateStr, n){
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return _localStr(d);
}
function _weekNumInMonth(monStr){ // which Monday-of-month is this?
  const d  = new Date(monStr + 'T00:00:00');
  const yr = d.getFullYear(), mo = d.getMonth();
  let cur  = new Date(yr, mo, 1);
  while(cur.getDay() !== 1) cur.setDate(cur.getDate()+1);
  let n = 0;
  while(true){
    const cs = _localStr(cur);
    if(cs > monStr) break;
    n++;
    if(cs === monStr) return n;
    cur.setDate(cur.getDate()+7);
    if(cur.getMonth() !== mo && _localStr(cur) > monStr) break;
  }
  return n || 1;
}
function fmtWeekRange(monStr, sunStr){
  const mon = new Date(monStr + 'T00:00:00');
  const sun = new Date(sunStr + 'T00:00:00');
  const wn  = _weekNumInMonth(monStr);
  const mLbl = mon.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  const sLbl = sun.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  return 'W'+wn+': '+mLbl+' \u2013 '+sLbl;
}
// fmtWeek: for display in tables/modals — handles all stored formats
// Robustly extract the Monday date string from any weekOf representation.
// Handles: "YYYY-MM-DD", "YYYY-MM-DDThh:mm:ss.sssZ" (UTC from server), "W2" etc.
function _weekOfMonday(v){
  if(!v) return null;
  const str = String(v).trim();
  if(/^W\d+$/.test(str)) return null; // already a label, no date
  let d;
  if(str.length > 10){
    // Full ISO datetime from server — new Date() converts UTC to local
    // e.g. "2026-04-12T18:30:00Z" → April 13 00:00 IST (correct)
    const p = new Date(str);
    if(!isNaN(p)) d = new Date(p.getFullYear(), p.getMonth(), p.getDate());
    else d = new Date(str.slice(0,10)+'T00:00:00');
  } else {
    d = new Date(str.slice(0,10)+'T00:00:00');
  }
  if(!d || isNaN(d)) return null;
  const dow = d.getDay();
  if(dow !== 1){
    if(dow === 0){
      // Sunday: IST timezone shifted Monday back 1 day — snap FORWARD to Monday
      d.setDate(d.getDate() + 1);
    } else {
      // Tue–Sat: snap backward to the Monday of this week
      d.setDate(d.getDate() - (dow - 1));
    }
  }
  return _localStr(d);
}
function fmtWeek(v){
  if(!v) return '\u2014';
  const str = String(v).trim();
  // Already a W-label
  if(/^Week\s+(\d+)$/i.test(str)) return 'W'+str.match(/\d+/)[0];
  if(/^W\d+$/.test(str)) return str;
  // Compute from date
  const monStr = _weekOfMonday(str);
  if(!monStr) return str;
  const sunStr = _addDays(monStr, 6);
  return fmtWeekRange(monStr, sunStr);
}

// ── state ─────────────────────────────────────────────────────────
var _wkOpen = false;
var _wkCalYr, _wkCalMo;

// ── toggleWeekPicker ──────────────────────────────────────────────
// Deprecated: the calendar is now rendered inline on the page (not a
// dropdown), so there is nothing to toggle.  Kept as a no-op so any
// older callers don't crash.

// ── wkCalNav ──────────────────────────────────────────────────────
function wkCalNav(dir, e){
  if(e) e.stopPropagation();
  _wkCalMo += dir;
  if(_wkCalMo < 0){ _wkCalMo=11; _wkCalYr--; }
  if(_wkCalMo > 11){ _wkCalMo=0; _wkCalYr++; }
  _renderWkCal();
}

// ── _renderWkCal ──────────────────────────────────────────────────
// Renders the inline calendar into #wkInlineCal. Full-page visible
// (no dropdown). Clicking any day snaps to that week's Monday.
function _renderWkCal(){
  const host = document.getElementById('wkInlineCal')
            || document.getElementById('wkPickerDrop'); // back-compat
  if(!host) return;
  const yr=_wkCalYr, mo=_wkCalMo;
  const monthLabel = new Date(yr,mo,1)
    .toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  const selVal   = document.getElementById('weekOf')?.value || '';
  const selMon   = selVal ? selVal.slice(0,10) : '';
  const todayStr = _localStr(new Date());
  // This week's Monday — anything strictly after is "future" (cannot submit)
  const thisMonStr = _monStr(new Date());

  // Build a 6×7 grid from the Monday on-or-before the 1st through the
  // Sunday on-or-after the last day of the month.
  const first = new Date(yr,mo,1);
  const last  = new Date(yr,mo+1,0);
  const startMon = new Date(first);
  const sd = first.getDay();
  startMon.setDate(first.getDate()-(sd===0?6:sd-1));
  const endSun = new Date(last);
  const ed = last.getDay();
  if(ed!==0) endSun.setDate(last.getDate()+(7-ed));

  let rowsHtml = '';
  let cur = new Date(startMon);
  while (cur <= endSun) {
    let rowCells = '';
    for (let i = 0; i < 7; i++) {
      const ds      = _localStr(cur);
      const mon     = _monStr(cur);
      const other   = cur.getMonth() !== mo;
      const isToday = ds === todayStr;
      const inSelWk = selMon && mon === selMon;
      const isFuture = mon > thisMonStr;

      let cls = 'wk-day';
      if (other)    cls += ' wk-other';
      if (isToday)  cls += ' wk-today';
      if (inSelWk)  cls += ' wk-sel';
      if (isFuture) cls += ' wk-future';

      const clickAttr = isFuture
        ? ' title="Cannot submit for a future week"'
        : ' onclick="selectWeek(\'' + mon + '\',\'' + _addDays(mon, 6) + '\')"';

      rowCells += '<td class="' + cls + '"' + clickAttr + '>'
               +   '<span>' + cur.getDate() + '</span>'
               + '</td>';
      cur.setDate(cur.getDate() + 1);
    }
    rowsHtml += '<tr>' + rowCells + '</tr>';
  }

  host.innerHTML =
    '<div class="wk-cal-hd">'
  +   '<button type="button" onclick="wkCalNav(-1, event)">&#8249;</button>'
  +   '<strong>' + monthLabel + '</strong>'
  +   '<button type="button" onclick="wkCalNav(1, event)">&#8250;</button>'
  + '</div>'
  + '<table class="wk-cal-tbl-inline">'
  +   '<thead><tr>'
  +     '<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>'
  +   '</tr></thead>'
  +   '<tbody>' + rowsHtml + '</tbody>'
  + '</table>';
}

// ── selectWeek ────────────────────────────────────────────────────
// Called when any day in the inline calendar is clicked. Stores the
// chosen week's Monday in #weekOf, updates the status label, refreshes
// carry-forward, and re-renders the inline calendar so the chosen week
// is highlighted.
function selectWeek(monStr, sunStr){
  const inp   = document.getElementById('weekOf');
  const label = document.getElementById('wkPickerLabel');
  if(inp)   inp.value       = monStr;
  if(label) label.textContent = fmtWeekRange(monStr, sunStr);
  state.dirty=true;
  // Re-render the inline calendar so the selection highlight updates
  try { _renderWkCal(); } catch(_){}
  // Refresh carry-forward state for the newly-chosen week (async, non-blocking)
  try { if (typeof _ipmRefreshCarryForward === 'function') _ipmRefreshCarryForward(); } catch(_){}
}

function _ipmUpdateWeekLabel(){

  const mon = new Date(monStr + 'T00:00:00');

async function saveDraftNow(){
  const weekOf   = document.getElementById('weekOf')?.value;
  const semester = document.getElementById('semester')?.value || 'Odd';
  if(!weekOf){ toast('Select a week before saving a draft','err'); return; }
  const btn = document.getElementById('saveDraftBtn');
  if(btn){ btn.disabled=true; btn.textContent='Saving…'; }
  try{
    const items=[];
    for(const sec of (state.activities||[])){
      for(const it of (sec.items||[])){
        if(!it._key) continue;
        const itemFields = document.querySelector('.item-fields[data-item-key="' + it._key + '"]');
        if(!itemFields) continue;
        const collect = function(field) {
          const wrapperField = (field === 'status') ? 'followUp' : field;
          return Array.from(
            itemFields.querySelectorAll('.field-instance[data-field="' + wrapperField + '"]')
          ).map(function(inst){
            const el = inst.querySelector('[data-field="' + field + '"]');
            return el ? (el.value || '').trim() : '';
          });
        };
        const m  = collect('minutes').join(IPM_FIELD_JOIN);
        const a  = collect('actionItems').join(IPM_FIELD_JOIN);
        const r  = collect('responsibility').join(IPM_FIELD_JOIN);
        const fu = collect('followUp').join(IPM_FIELD_JOIN);
        const st = collect('status').join(IPM_FIELD_JOIN);
        if(m||a||r||fu||st) items.push({title:it.title,minutes:m,actionItems:a,responsibility:r,followUp:fu,status:st});
      }
    }
    const res=await call('ipmSaveDraft',state.token,{weekOf,semester,items,tasks:''});
    if(!res.ok) throw new Error(res.error||'Failed to save draft');
    state._currentDraftId=res.id;
    state.dirty=false;
    const banner=document.getElementById('draftBanner');
    if(banner){
      const now=new Date().toLocaleString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
      const bannerText=document.getElementById('draftBannerText');
      if(bannerText) bannerText.textContent=`Draft saved on ${now} — ${items.length} item${items.length!==1?'s':''} filled. Complete and submit when ready.`;
      banner.style.display='flex';
    }
    toast(`Draft saved — ${items.length} item${items.length!==1?'s':''} stored`,'ok');
    loadMySubs();
  }catch(e){
    toast(e.message||'Failed to save draft','err');

function _applyDraftToForm(items){
  // Each draft item is ONE record per activity title (the old model stored
  // one row per entry-box; both shapes can be read here — we coalesce by
  // title and prefer the first record found, which is how the new model
  // writes).  Then for each field we split the stored "|||"-joined string
  // back into an array and materialise one field-instance per value.
  const byTitle = {};
  items.forEach(function(it){
    const t = String(it.itemTitle||'').trim();
    if (!t) return;
    if (!byTitle[t]) byTitle[t] = it; // first one wins
  });

  // Helper: ensure the item has at least `n` entry-cards, creating new
  // cards as needed. Returns the up-to-date list of field-instances for
  // the given field across all cards in DOM order.
  const ensureCardsAndGetInstances = function(itemKey, wrapperField, n) {
    const itemFields = document.querySelector('.item-fields[data-item-key="' + itemKey + '"]');
    if (!itemFields) return [];
    let instances = itemFields.querySelectorAll('.field-instance[data-field="' + wrapperField + '"]');
    while (instances.length < n) {
      const card = _ipmAppendEntryCard(itemKey);
      if (!card) break;
      instances = itemFields.querySelectorAll('.field-instance[data-field="' + wrapperField + '"]');
    }
    // If we ended up with more than one card, surface the bottom Cancel
    // button so users can collapse extras after the draft is restored.
    if (instances.length > 1) {
      const cancelBtn = document.querySelector('.cancel-entry-btn[data-item-key="' + itemKey + '"]');
      if (cancelBtn) cancelBtn.style.display = 'inline-flex';
    }
    return instances;
  };

  const setInstanceValues = function(itemKey, field, values) {
    if (!values || !values.length) return;
    const instances = ensureCardsAndGetInstances(itemKey, field, values.length);
    values.forEach(function(val, i){
      const inst = instances[i]; if (!inst) return;
      const el = inst.querySelector('[data-field="' + field + '"]');
      if (!el) return;
      if (el.disabled) return; // honour Week-1 block (followUp)
      el.value = val;
    });
  };

  const setFollowUpAndStatus = function(itemKey, fuValues, stValues) {
    const n = Math.max(fuValues.length, stValues.length);
    if (!n) return;
    const instances = ensureCardsAndGetInstances(itemKey, 'followUp', n);
    for (let i = 0; i < n; i++) {
      const inst = instances[i]; if (!inst) continue;
      const fuEl = inst.querySelector('[data-field="followUp"]');
      const stEl = inst.querySelector('[data-field="status"]');
      const fuV = fuValues[i] || '';
      const stV = stValues[i] || '';
      if (fuEl && !fuEl.disabled && fuV) fuEl.value = fuV;
      if (stEl && !stEl.disabled && stV) stEl.value = stV;
      // Re-sync the Action Items lock for this entry-card. If the saved
      // status is "Completed", this re-locks the SAME card's Action Items
      // textarea (the actionItems value was already restored earlier in
      // _applyDraftToForm, before this call, so the saved text is safely
      // in place before the lock takes effect). Per-card, so other cards
      // and any add-on entries are unaffected.
      _ipmSyncActionItemsLockState(inst);
    }
  };

  for(const sec of (state.activities||[])){
    for(const it of (sec.items||[])){
      if(!it._key) continue;
      const saved = byTitle[String(it.title).trim()];
      if (!saved) continue;
      const splitVal = function(v){
        if (v == null) return [];
        const s = String(v);
        if (s.indexOf(IPM_FIELD_JOIN) >= 0) {
          return s.split(IPM_FIELD_JOIN).map(function(x){return x;});
        }
        return s ? [s] : [];
      };
      setInstanceValues(it._key, 'minutes',        splitVal(saved.minutes));
      setInstanceValues(it._key, 'actionItems',    splitVal(saved.actionItems));
      setInstanceValues(it._key, 'responsibility', splitVal(saved.responsibility));
      setFollowUpAndStatus(it._key, splitVal(saved.followUp), splitVal(saved.status));
    }
  }
}

async function deleteSub(id, type){
  const isDraft=type==='draft';
  const ok=await confirmDialog({
    title:isDraft?'Discard draft?':'Delete submission?',
    message:isDraft?'Permanently delete this saved draft? This cannot be undone.':'Permanently delete this submission and all its activity data? This cannot be undone.',
    okText:isDraft?'Discard':'Delete',cancelText:'Cancel'
  });
  if(!ok) return;
  try{
    const r=await call(isDraft?'ipmDeleteDraft':'ipmDeleteSubmission',state.token,id);
    if(!r.ok) throw new Error(r.error||'Failed');
    if(state._currentDraftId===id) state._currentDraftId=null;
    const banner=document.getElementById('draftBanner');
    if(banner&&isDraft) banner.style.display='none';
    toast(isDraft?'Draft discarded':'Submission deleted','ok');
    loadMySubs(); loadHoiDashboard();
  }catch(e){ toast(e.message||'Failed','err'); }
}

async function cmpLoad(){
  const campus=document.getElementById('cmpCampus')?.value||'';
  window._cmpCampus = campus;       // captured for B7 drill-down (cell click → ipmGetCellSubmissions)
  const status=document.getElementById('cmpStatus');
  const body=document.getElementById('cmpBody');
  const legend=document.getElementById('cmpLegend');
  if(!body) return;
  if(status) status.textContent='Loading…';
  body.innerHTML='<div class="skeleton" style="height:320px;border-radius:12px"></div>';
  if(legend) legend.innerHTML='';
  try{
    // B5: pick the endpoint based on group mode. Campus mode aggregates
    // institutions into per-campus rows; the campus filter dropdown is
    // ignored in this mode (the endpoint doesn't accept one).
    let r;
    if (window._cmpGroup === 'campus') {
      r = await call('ipmGetCampusComparisonReport', state.token);
    } else {
      r = await call('ipmGetComparisonReport', state.token, campus);
    }
    if(!r||!r.ok) throw new Error('Failed');
    window._cmpData=r;
    // Build legend
    const C=['#4f46e5','#c8a24b','#10b981','#f59e0b','#3b82f6','#8b5cf6','#ef4444','#06b6d4','#84cc16','#f97316','#ec4899','#14b8a6'];
    if(legend) legend.innerHTML=r.institutions.map((inst,ci)=>`
      <div style="display:flex;align-items:center;gap:6px;padding:4px 10px;background:#fff;border:1px solid var(--line);border-radius:20px;font-size:11px">
        <div style="width:10px;height:10px;border-radius:50%;background:${C[ci%C.length]};flex-shrink:0"></div>
        <span style="font-weight:700;color:var(--navy-ink)">${esc(inst.code)}</span>
        <span style="color:var(--muted)">${esc(inst.name)}</span>
      </div>`).join('');
    cmpRender();
    const noun = (window._cmpGroup === 'campus') ? 'campus' : 'institution';
    if(status) status.textContent = r.institutions.length + ' ' + noun + (r.institutions.length!==1 ? (noun==='campus'?'es':'s') : '');
  }catch(e){
    body.innerHTML=`<div style="padding:32px;text-align:center;color:#b91c1c;background:#fef2f2;border-radius:10px">${esc(e.message||'Failed to load')}</div>`;
    if(status) status.textContent='';
  }
}

function cmpSwitch(mode){
  window._cmpMode=mode;
  document.getElementById('cmpTabMonth')?.classList.toggle('cmp-tab-active',mode==='month');
  document.getElementById('cmpTabWeek')?.classList.toggle('cmp-tab-active',mode==='week');
  // B6 toggle is week-mode only — disable the button visually in month mode
  const maBtn = document.getElementById('cmpMaToggle');
  if (maBtn) {
    maBtn.style.opacity = (mode === 'week') ? '1' : '.4';
    maBtn.style.pointerEvents = (mode === 'week') ? 'auto' : 'none';
  }
  cmpRender();
}

// B5: switch row grouping between institutions and campuses. Different endpoint.
async function cmpSwitchGroup(group){
  if (window._cmpGroup === group) return;
  window._cmpGroup = group;
  const instBtn = document.getElementById('cmpGroupInst');
  const campBtn = document.getElementById('cmpGroupCampus');
  if (instBtn && campBtn) {
    const setActive = (btn, on) => {
      btn.style.background = on ? '#1a2332' : '#fff';
      btn.style.color      = on ? '#fff'    : 'var(--ink)';
      btn.style.fontWeight = on ? '800'     : '600';
    };
    setActive(instBtn,  group === 'institution');
    setActive(campBtn,  group === 'campus');
  }
  // Campus dropdown is meaningful only in institution mode
  const campusSel = document.getElementById('cmpCampus');
  if (campusSel) {
    campusSel.disabled = (group === 'campus');
    campusSel.style.opacity = (group === 'campus') ? '.5' : '1';
  }
  await cmpLoad();
}

// B6: toggle the 4-week moving-average overlay (week mode only)
function cmpToggleMA(){
  window._cmpShowMA = !window._cmpShowMA;
  const btn = document.getElementById('cmpMaToggle');
  if (btn) {
    btn.style.background = window._cmpShowMA ? '#1a2332' : '#fff';
    btn.style.color      = window._cmpShowMA ? '#fff'    : 'var(--ink)';
    const icon = document.getElementById('cmpMaIcon');
    if (icon) icon.style.background = window._cmpShowMA ? '#fff' : '#1a2332';
  }
  cmpRender();
}

// ── B7: drill-down panel — opens when a heatmap cell is clicked ─────────────
async function _cmpOpenDrilldown(instCode, mode, bucketKey, instName){
  let panel = document.getElementById('cmpDrilldown');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'cmpDrilldown';
    panel.style.cssText = 'position:fixed;top:0;right:0;width:380px;max-width:90vw;height:100vh;'+
      'background:#fff;border-left:2px solid var(--line);box-shadow:-8px 0 24px rgba(0,0,0,.12);'+
      'z-index:9999;overflow-y:auto;transform:translateX(100%);transition:transform .25s ease-out';
    document.body.appendChild(panel);
  }
  const fmtBucket = mode === 'month' ? bucketKey : (() => {
    const sun = _addDays(bucketKey, 6);
    const d = new Date(bucketKey + 'T00:00:00');
    if (isNaN(d)) return bucketKey;
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) +
           ' – ' + sun.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  })();

  panel.innerHTML = `
    <div style="background:linear-gradient(135deg,#1a2332,#28375a);padding:16px 20px;
                position:sticky;top:0;z-index:1">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div style="min-width:0">
          <div style="font-size:10px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.06em;font-weight:700">${esc(instCode)}</div>
          <div style="font-size:14px;font-weight:800;color:#fff;margin:2px 0">${esc(instName)}</div>
          <div style="font-size:11px;color:rgba(255,255,255,.7)">${esc(fmtBucket)}</div>
        </div>
        <button onclick="document.getElementById('cmpDrilldown').style.transform='translateX(100%)';setTimeout(()=>document.getElementById('cmpDrilldown').remove(),250)"
          style="background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;
                 font-size:22px;line-height:1;padding:0 4px;font-family:inherit">×</button>
      </div>
    </div>
    <div id="cmpDrilldownBody" style="padding:16px 20px">
      <div style="padding:32px 0;text-align:center;color:var(--muted);font-size:13px">Loading…</div>
    </div>`;
  // Slide in
  requestAnimationFrame(()=>{ panel.style.transform = 'translateX(0)'; });

  try {
    const r = await call('ipmGetCellSubmissions', state.token,
      window._cmpCampus || '', instCode, mode, bucketKey);
    const body = document.getElementById('cmpDrilldownBody');
    if (!body) return;
    if (!r.ok || !r.submissions || !r.submissions.length) {
      body.innerHTML = `<div style="padding:32px 0;text-align:center;color:var(--muted);font-size:13px">
        ${r.ok ? 'No submissions in this period' : esc(r.error||'Failed to load')}
      </div>`;
      return;
    }
    body.innerHTML = `
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px">${r.submissions.length} submission${r.submissions.length===1?'':'s'}</div>
      ${r.submissions.map(s => `
        <div style="border:1px solid var(--line-2);border-radius:8px;padding:12px;margin-bottom:8px;background:#fff">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px">
            <div style="font-size:12px;font-weight:700;color:var(--navy-ink)">${esc(s.weekOf||s.timestamp)}</div>
            <span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:9px;
                         background:${s.status==='Reviewed'||s.status==='Approved'?'#dcfce7':s.status==='Rejected'?'#fee2e2':'#fef3c7'};
                         color:${s.status==='Reviewed'||s.status==='Approved'?'#166534':s.status==='Rejected'?'#991b1b':'#92400e'}">${esc(s.status)}</span>
          </div>
          <div style="font-size:10.5px;color:var(--muted);margin-bottom:6px">
            Submitted ${esc(s.timestamp)} · by ${esc(s.username||'—')}
          </div>
          <div style="font-size:11px;color:var(--ink)">
            <strong style="font-weight:700;color:var(--navy-ink)">${s.itemsFilled}</strong> activity item${s.itemsFilled===1?'':'s'} filled
          </div>
        </div>`).join('')}
    `;
  } catch(e) {
    const body = document.getElementById('cmpDrilldownBody');
    if (body) body.innerHTML = `<div style="padding:32px 0;text-align:center;color:#991b1b;font-size:13px">${esc(e.message||'Error')}</div>`;
  }
}

function cmpRender(){
  const r=window._cmpData, mode=window._cmpMode||'month';
  const body=document.getElementById('cmpBody');
  if(!r||!body) return;

  const labels  = mode==='month' ? r.months : r.weeks;
  const dataMap = mode==='month' ? r.monthlyData : r.weeklyData;
  const fmtL = lbl=>{
    if(mode==='month') return lbl; // "Mar 2026"
    const d=new Date(lbl+'T00:00:00');
    if(isNaN(d)) return lbl;
    const sun=new Date(d); sun.setDate(d.getDate()+6);
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})
      +' – '+sun.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  };

  const C=['#4f46e5','#c8a24b','#10b981','#f59e0b','#3b82f6','#8b5cf6','#ef4444','#06b6d4','#84cc16','#f97316','#ec4899','#14b8a6'];

  // ── Cell readers — tolerate the old shape (number) AND the new shape (object) ──
  // Older deployments may still return numeric cell values; this guards us
  // against deploy-skew between Code.gs and the cached HTML.
  const cellCount   = c => (c && typeof c === 'object') ? (c.count||0)         : (c||0);
  const cellFilled  = c => (c && typeof c === 'object') ? (c.itemsFilled||0)   : 0;
  const cellExpect  = c => (c && typeof c === 'object') ? (c.expectedItems||0) : 0;
  const cellStatus  = c => (c && typeof c === 'object' && c.byStatus) ? c.byStatus : null;

  // ── B3: status palette. Stack order is bottom→top so 'Approved' settles at
  //   the foot of the bar (visually anchored), then Reviewed/Submitted, with
  //   transient states (Draft/Rejected) at the top. Unknown statuses fall
  //   back to the institution colour so nothing goes invisible.
  const STATUS_STACK_ORDER = ['Approved','Reviewed','Submitted','Pending','Draft','Rejected'];
  const STATUS_PALETTE = {
    'Approved':  '#10b981',
    'Reviewed':  '#3b82f6',
    'Submitted': null,            // null → use institution colour
    'Pending':   '#f59e0b',
    'Draft':     '#9ca3af',
    'Rejected':  '#ef4444'
  };

  let gMax=1;
  r.institutions.forEach(inst=>labels.forEach(lbl=>{
    const c=(dataMap[inst.code]||{})[lbl];
    const v=cellCount(c); if(v>gMax) gMax=v;
  }));

  // Column headers
  const ths = labels.map(lbl=>`
    <th style="padding:8px 6px;text-align:center;white-space:nowrap;font-size:9px;font-weight:700;
               color:var(--muted);text-transform:uppercase;letter-spacing:.06em;
               border-left:1px solid var(--line-2);min-width:60px">${esc(fmtL(lbl))}</th>`).join('');

  // Track which statuses actually appear in the dataset — used for the legend
  const seenStatuses = new Set();

  // Rows
  const rows = r.institutions.map((inst,ci)=>{
    const color=C[ci%C.length];
    const cellsRaw = labels.map(lbl=>(dataMap[inst.code]||{})[lbl]);
    const cellsCount = cellsRaw.map(cellCount);
    const total = cellsCount.reduce((a,b)=>a+b,0);
    // Aggregate row-level completeness for the totals column
    const rowFilled  = cellsRaw.reduce((a,c)=>a+cellFilled(c), 0);
    const rowExpect  = cellsRaw.reduce((a,c)=>a+cellExpect(c), 0);
    const rowCompletePct = rowExpect>0 ? Math.round((rowFilled/rowExpect)*100) : null;

    const cells=cellsRaw.map((cell,i)=>{
      const v = cellsCount[i];
      const filled = cellFilled(cell);
      const expect = cellExpect(cell);
      const completePct = expect>0 ? Math.round((filled/expect)*100) : null;
      const heightPct = Math.round((v/gMax)*100);

      if(v===0) return `<td style="padding:4px 6px;text-align:center;border-left:1px solid var(--line-2)">
        <div style="font-size:11px;color:var(--line);font-weight:600">—</div></td>`;

      // Build the status-stacked bar fill (B3). Each segment height is
      //   (statusCount / v) * heightPct, expressed as a % of the bar's container.
      const statusMap = cellStatus(cell);
      let segments = '';
      if (statusMap && Object.keys(statusMap).length) {
        // Order: known stack first, then any others sorted by count desc
        const known = STATUS_STACK_ORDER.filter(k => statusMap[k]);
        const extras = Object.keys(statusMap)
          .filter(k => !STATUS_STACK_ORDER.includes(k) && statusMap[k])
          .sort((a,b)=>statusMap[b]-statusMap[a]);
        const ordered = [...known, ...extras];
        ordered.forEach(s => seenStatuses.add(s));
        // Build from bottom up — earliest in array = bottom of bar
        let cum = 0;
        segments = ordered.map(st => {
          const segCount = statusMap[st]||0;
          const segH = (segCount / v) * heightPct;       // % of bar container
          const segColor = STATUS_PALETTE[st] || color;
          const seg = `<div title="${esc(st)}: ${segCount}"
                            style="position:absolute;left:0;right:0;
                                   bottom:${cum}%;height:${segH}%;
                                   background:${segColor};opacity:.95"></div>`;
          cum += segH;
          return seg;
        }).join('');
      } else {
        // No status data — fall back to original solid gradient bar
        segments = `<div style="position:absolute;bottom:0;left:0;right:0;height:${heightPct}%;
                                background:linear-gradient(180deg,${color}cc,${color});border-radius:4px"></div>`;
      }

      // Optional B2 completeness micro-bar — only shown when expected>0
      const qBar = (completePct !== null) ? `
        <div title="Completeness: ${filled}/${expect} items filled (${completePct}%)"
             style="width:36px;height:3px;background:#e5e7eb;border-radius:2px;overflow:hidden;flex-shrink:0">
          <div style="height:100%;width:${completePct}%;
                      background:${completePct>=80?'#10b981':completePct>=50?'#f59e0b':'#ef4444'}"></div>
        </div>` : '';

      // B6: 4-week moving-average overlay — a horizontal tick on the bar at
      // the height representing the rolling mean. Only meaningful in week mode
      // (mode==='week') and when the user has the overlay toggle enabled.
      let maOverlay = '';
      if (mode === 'week' && window._cmpShowMA && r.weeklyMovingAvg) {
        const maVal = (r.weeklyMovingAvg[inst.code] || {})[labels[i]];
        if (typeof maVal === 'number' && maVal > 0) {
          const maHeight = Math.min(100, Math.round((maVal / gMax) * 100));
          maOverlay = `<div title="4-week moving avg: ${maVal.toFixed(1)}"
            style="position:absolute;left:-2px;right:-2px;bottom:${maHeight}%;
                   height:2px;background:#1a2332;border-radius:1px;
                   box-shadow:0 0 2px rgba(0,0,0,.3);pointer-events:none;z-index:1"></div>`;
        }
      }

      return `<td style="padding:4px 6px;text-align:center;border-left:1px solid var(--line-2)">
        <div onclick="_cmpOpenDrilldown('${esc(inst.code)}','${mode}','${esc(labels[i])}','${esc(inst.name)}')"
             title="${v} submission${v===1?'':'s'}${completePct!==null?', '+completePct+'% complete':''} — click for details"
             style="display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;
                    padding:2px;border-radius:4px;transition:.15s"
             onmouseenter="this.style.background='rgba(26,35,50,.06)'"
             onmouseleave="this.style.background='none'">
          <div style="width:36px;height:36px;background:var(--surface-2);border-radius:6px;
                      overflow:hidden;position:relative;flex-shrink:0">${segments}${maOverlay}</div>
          <span style="font-size:11px;font-weight:800;color:${color}">${v}</span>
          ${qBar}
        </div></td>`;
    }).join('');

    return `<tr style="border-bottom:1px solid var(--line-2)">
      <td style="padding:10px 12px;white-space:nowrap;position:sticky;left:0;z-index:2;background:#fff;border-right:2px solid var(--line)">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:12px;height:12px;border-radius:50%;background:${color};flex-shrink:0;box-shadow:0 1px 4px ${color}66"></div>
          <div>
            <div style="font-size:12px;font-weight:800;color:var(--navy-ink)">${esc(inst.code)}</div>
            <div style="font-size:10px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(inst.name)}</div>
          </div>
        </div>
      </td>
      ${cells}
      <td style="padding:10px 12px;text-align:center;border-left:2px solid var(--line);position:sticky;right:0;z-index:2;background:#fff">
        <div style="font-size:18px;font-weight:800;color:${color}">${total}</div>
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">total</div>
        ${rowCompletePct!==null?`<div title="Row-level completeness across all periods"

async function wucRun(){

  if(btn){btn.disabled=true;btn.textContent='Loading…';}

  try{
    // C6: fetch best-practice tags in parallel — no extra latency, fail-soft if
    // the IPM_Tags sheet doesn't exist yet (returns ok:false → empty tags list)
    const [r, tagsResp] = await Promise.all([
      call('ipmGetWeeklyUpdatesComparison', state.token, {
        campus:window._wucCampus,
        institutionCodes:window._wucInsts,
        weekKeys:window._wucWeeks
      }),
      call('ipmListBestPracticeTags', state.token).catch(()=>({ok:false,tags:[]}))
    ]);
    if(!r.ok) throw new Error(r.error||'Failed');
    // Stash tags as a Set keyed by 'instCode||weekKey||itemTitle' for O(1) cell lookup
    window._wucBpTags = new Map();
    if (tagsResp && tagsResp.ok && Array.isArray(tagsResp.tags)) {
      tagsResp.tags.forEach(t => {
        const sc = t.scope || {};
        const key = (sc.institutionCode||'') + '||' + (sc.weekKey||'') + '||' + (sc.itemTitle||'');
        window._wucBpTags.set(key, t.tagId);   // value = tagId so we can untag
      });
    }
    wucRender(r);
  }catch(e){
    body.innerHTML=`<div style="padding:32px;text-align:center">
      <div style="color:#b91c1c;background:#fef2f2;border-radius:10px;padding:20px;font-size:13px">${esc(e.message)}</div>
    </div>`;
  }finally{
    if(btn){btn.disabled=false;btn.textContent='Generate Comparison';}
  }
}

// ── C6: tag/untag a cell as a "Best Practice" example ───────────────────────
// Cell = (institutionCode, weekKey, itemTitle). Uses the IPM_Tags sheet via
// the ipmAdd/RemoveBestPracticeTag endpoints. Re-renders after the round-trip
// so the star indicator updates. Failure is shown as a toast.
async function _wucToggleBpTag(instCode, weekKey, itemTitle){
  if (!window._wucBpTags) window._wucBpTags = new Map();
  const key = instCode + '||' + weekKey + '||' + itemTitle;
  const existingTagId = window._wucBpTags.get(key);
  try {
    if (existingTagId) {
      const r = await call('ipmRemoveBestPracticeTag', state.token, existingTagId);
      if (r && r.ok) {
        window._wucBpTags.delete(key);
        if (typeof toast === 'function') toast('Removed best-practice tag', 'ok');
      } else {
        throw new Error((r && r.error) || 'Failed to remove tag');
      }
    } else {
      const r = await call('ipmAddBestPracticeTag', state.token, {
        institutionCode: instCode, weekKey: weekKey, itemTitle: itemTitle
      });
      if (r && r.ok) {
        window._wucBpTags.set(key, r.tagId);
        if (typeof toast === 'function') toast('Tagged as best practice', 'ok');
      } else {
        throw new Error((r && r.error) || 'Failed to add tag');
      }
    }
    if (window._wucLastResult) wucRender(window._wucLastResult);
  } catch (e) {
    if (typeof toast === 'function') toast(e.message || 'Tag error', 'err');
  }
}

// ── C3: filter the side-by-side comparison rows ──────────────────────────────
// Three modes:
//   'all'       — show every activity item from every section that has data
//   'responded' — hide items where NO institution-week cell has data
//   'diverged'  — show only items where ≥2 distinct non-empty value tuples appear
// Pure UI filter — never mutates the original `r` payload.
function _wucFilterSections(sections, mode){
  if (mode !== 'responded' && mode !== 'diverged') return sections;
  const sigOfCell = c => c
    ? [c.minutes, c.actionItems, c.responsibility, c.followUp, c.status]
        .map(v => String(v||'').trim()).join('||')
    : '';
  const filtered = sections.map(sec => {
    const items = sec.items.filter(item => {
      const sigs = item.cells.map(sigOfCell).filter(s => s && s.replace(/\|/g,'') !== '');
      if (sigs.length === 0) return false;          // no responses
      if (mode === 'responded') return true;        // ≥1 non-blank response = keep
      if (mode === 'diverged') {
        // Show only when institutions disagree — i.e. at least 2 distinct signatures
        const uniq = new Set(sigs);
        return uniq.size >= 2;
      }
      return true;
    });
    return { ...sec, items, hasData: items.length > 0 };
  }).filter(sec => sec.items.length > 0);
  return filtered;
}

// ── C5: search across all cells in the comparison view ──────────────────────
// Filters items to those where ANY cell contains the query (case-insensitive
// substring match across minutes/actionItems/responsibility/followUp/status
// and the activity title itself). Returns the same shape as filtered sections
// — the caller can chain this with _wucFilterSections.
function _wucSearchSections(sections, query){
  const q = String(query||'').trim().toLowerCase();
  if (!q) return sections;
  const matchesCell = c => {
    if (!c) return false;
    return ['minutes','actionItems','responsibility','followUp','status'].some(k =>
      String(c[k]||'').toLowerCase().indexOf(q) !== -1);
  };
  return sections.map(sec => {
    const items = sec.items.filter(item =>
      String(item.title||'').toLowerCase().indexOf(q) !== -1 ||
      item.cells.some(matchesCell)
    );
    return { ...sec, items };
  }).filter(sec => sec.items.length > 0);
}

// ── C5 helper: highlight `query` matches in a value with <mark> ──────────
function _wucHighlight(text, query){
  if (!query) return esc(text);
  const safeText = esc(text);
  const re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'ig');
  return safeText.replace(re, m =>
    `<mark style="background:#fef08a;color:#1a2332;padding:0 2px;border-radius:2px">${m}</mark>`);
}

// ── C4: length-normalise long cell values with a "Show more" toggle ───────
// Returns the inline HTML for a value, truncating at TRUNCATE_AT chars and
// appending an inline "+ N more" pill the user can click to expand.
const _WUC_TRUNCATE_AT = 180;
function _wucRenderCellValue(value, query){
  const v = String(value||'');
  if (v.length <= _WUC_TRUNCATE_AT) return _wucHighlight(v, query);
  const head = v.slice(0, _WUC_TRUNCATE_AT);
  const remaining = v.length - _WUC_TRUNCATE_AT;
  // Two-state: collapsed ↔ expanded, controlled via inline onclick. We pre-
  // render both halves and toggle visibility client-side so there's no
  // round-trip on expand.
  const headEsc = _wucHighlight(head, query);
  const tailEsc = _wucHighlight(v.slice(_WUC_TRUNCATE_AT), query);
  return `<span class="wuc-truncated">${headEsc}<span class="wuc-tail" style="display:none">${tailEsc}</span><a href="javascript:void(0)" onclick="this.parentElement.querySelector('.wuc-tail').style.display='inline';this.style.display='none'" style="display:inline-block;margin-left:6px;padding:1px 7px;background:#e5e7eb;color:#374151;border-radius:9px;font-size:10px;font-weight:700;text-decoration:none">+${remaining} more</a></span>`;
}

// Returns the currently-displayed sections honouring the active filter mode AND
// search query. Used by both the live render and the PDF export so "what you
// see is what you export".
function _wucCurrentSections(r){
  let secs = _wucFilterSections(r.sections || [], window._wucFilterMode || 'all');
  secs = _wucSearchSections(secs, window._wucSearchQuery || '');
  return secs;
}

// Toggle handler — wired to the segmented control in the info bar.
function _wucChangeFilter(mode){
  window._wucFilterMode = mode;
  if (window._wucLastResult) wucRender(window._wucLastResult);
}

// Search handler — debounced re-render
function _wucChangeSearch(q){
  window._wucSearchQuery = String(q||'');
  // Debounce to avoid re-rendering on every keystroke
  if (window._wucSearchDebounce) clearTimeout(window._wucSearchDebounce);
  window._wucSearchDebounce = setTimeout(function(){
    if (window._wucLastResult) wucRender(window._wucLastResult);
  }, 250);
}

function wucRender(r){
  const body=document.getElementById('wucBody');
  if(!body) return;
  if(!r.sections.length){
    body.innerHTML='<div style="padding:48px;text-align:center;color:var(--muted)"><p style="font-size:14px">No activity data found.</p></div>';
    return;
  }
  // Default filter mode = 'all' on first load. Mode persists across re-renders
  // because we only set it when the user toggles. C5 search query likewise.
  const filterMode = window._wucFilterMode || (window._wucFilterMode = 'all');
  const searchQuery = String(window._wucSearchQuery || '').trim();
  let visibleSections = _wucFilterSections(r.sections, filterMode);
  if (searchQuery) visibleSections = _wucSearchSections(visibleSections, searchQuery);

  const C=['#4f46e5','#c8a24b','#10b981','#f59e0b','#3b82f6','#8b5cf6','#ef4444','#06b6d4','#84cc16','#f97316'];

  // Column header per institution×week
  const colHeaders=r.columns.map((col,ci)=>{
    const color=C[window._wucInsts.indexOf(col.instCode)%C.length];
    const sun=_addDays(col.weekKey,6);
    const wkLbl=fmtWeekRange(col.weekKey,sun);
    return `<th style="padding:10px 12px;text-align:center;min-width:200px;max-width:240px;
                       border-left:1px solid rgba(255,255,255,.12);vertical-align:middle">
      <div style="display:inline-flex;align-items:center;gap:5px;margin-bottom:3px">
        <div style="width:9px;height:9px;border-radius:50%;background:${color};box-shadow:0 0 0 2px ${color}33"></div>
        <span style="font-size:12px;font-weight:800;color:${color};letter-spacing:.01em">${esc(col.instCode)}</span>
      </div>
      <div style="font-size:9.5px;color:rgba(255,255,255,.5);font-weight:500">${esc(wkLbl)}</div>
    </th>`;
  }).join('');

  // FIELD LABELS column — 5 fixed field rows per activity.
  // Status is rendered as a coloured chip; the rest are free-text cells.
  // (Follow-Up and Status were stored on SubmissionItems all along but were
  //  previously dropped on the way to the UI — see ipmGetWeeklyUpdatesComparison.)
  const FIELDS = [
    { key:'minutes',        label:'Minutes',        bg:'#f8f7ff', labelColor:'#4f46e5' },
    { key:'actionItems',    label:'Action Items',   bg:'#fffbf0', labelColor:'#c8a24b' },
    { key:'responsibility', label:'Responsibility', bg:'#f0fdf4', labelColor:'#10b981' },
    { key:'followUp',       label:'Follow-Up',      bg:'#eff6ff', labelColor:'#2563eb' },
    { key:'status',         label:'Status',         bg:'#fdf2f8', labelColor:'#be185d' }
  ];
  const FIELD_COUNT = FIELDS.length;

  // Status chip palette — common values across institutions
  const STATUS_COLORS = {
    'open':        { bg:'#fef3c7', fg:'#92400e' },
    'in progress': { bg:'#dbeafe', fg:'#1e40af' },
    'ongoing':     { bg:'#dbeafe', fg:'#1e40af' },
    'closed':      { bg:'#dcfce7', fg:'#166534' },
    'completed':   { bg:'#dcfce7', fg:'#166534' },
    'done':        { bg:'#dcfce7', fg:'#166534' },
    'on hold':     { bg:'#fee2e2', fg:'#991b1b' },
    'pending':     { bg:'#fef3c7', fg:'#92400e' },
    'deferred':    { bg:'#e5e7eb', fg:'#374151' }
  };
  const renderStatusChip = (s) => {
    const txt = String(s||'').trim(); if(!txt) return '';
    const k = txt.toLowerCase();
    const c = STATUS_COLORS[k] || { bg:'#e5e7eb', fg:'#374151' };
    return `<span style="display:inline-block;padding:2px 9px;border-radius:11px;
                         background:${c.bg};color:${c.fg};font-size:10.5px;font-weight:700;
                         letter-spacing:.02em;white-space:nowrap">${esc(txt)}</span>`;
  };

  // Build tbody: section header + one group of FIELD_COUNT rows per activity
  // Iterate over the FILTERED sections so the live view honours the current
  // diff-only / responded-only / all toggle. The original `r.sections` is
  // preserved on `window._wucLastResult` for re-render and for "M of N" counts.
  const tbody = visibleSections.map(sec=>{
    // Section divider row
    const secRow=`<tr>
      <td colspan="${r.columns.length+2}"
          style="padding:0;border-top:3px solid #1a2332">
        <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;
                    background:linear-gradient(135deg,#1a2332,#28375a)">
          ${sec.sectionNo?`<span style="background:rgba(255,255,255,.18);color:#fff;
                                       font-size:10px;font-weight:800;padding:2px 8px;
                                       border-radius:5px;flex-shrink:0">${esc(sec.sectionNo)}</span>`:''}
          <span style="font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;
                       letter-spacing:.07em">${esc(sec.sectionTitle)}</span>
        </div>
      </td></tr>`;

    // FIELD_COUNT rows per activity item (one per field)
    const itemRows = sec.items.map((item, itemIdx)=>{
      const isLast = itemIdx === sec.items.length - 1;
      // True if ANY cell in this item has an attachment (used to show paperclip
      // indicator next to the activity title — saves vertical space vs a 6th row).
      const anyAttachment = item.cells.some(c => c && c.hasAttachments);
      return FIELDS.map((field, fi)=>{
        const isFirstField = fi===0;
        const isLastField  = fi===(FIELD_COUNT-1);
        // Activity name cell — spans all field rows
        const actCell = isFirstField
          ? `<td rowspan="${FIELD_COUNT}"
               style="padding:10px 14px;vertical-align:middle;
                      font-size:12px;font-weight:700;color:var(--navy-ink);
                      border-right:2px solid var(--line);
                      background:#fff;position:sticky;left:0;z-index:1;
                      min-width:180px;max-width:200px;
                      border-top:2px solid var(--line-2);
                      ${isLast?'border-bottom:3px solid #1a2332':''}">
              <div style="display:flex;align-items:flex-start;gap:6px">
                <span style="flex:1;min-width:0">${esc(item.title)}</span>
                ${anyAttachment?`<span title="One or more institutions attached supporting documents"
                  style="flex-shrink:0;color:#c8a24b;font-size:13px;line-height:1">📎</span>`:''}
              </div>
            </td>`
          : '';

        // Field label cell
        const labelCell = `<td style="padding:6px 10px;font-size:9px;font-weight:800;
                                      color:${field.labelColor};text-transform:uppercase;
                                      letter-spacing:.08em;background:${field.bg};
                                      border-right:1px solid var(--line-2);white-space:nowrap;
                                      ${isFirstField?'border-top:2px solid var(--line-2)':''}
                                      ${isLastField&&isLast?'border-bottom:3px solid #1a2332':''}">
          ${field.label}
        </td>`;

        // Data cells
        const dataCells = item.cells.map((cell, ci)=>{
          const color=C[window._wucInsts.indexOf(r.columns[ci].instCode)%C.length];
          // C6: best-practice tag indicator. Only rendered on the first field
          // (Minutes) and only when the cell has any submitted content. The
          // star toggles per (institution, week, item).
          const colInst = r.columns[ci].instCode;
          const colWeek = r.columns[ci].weekKey;
          const bpKey   = colInst + '||' + colWeek + '||' + item.title;
          const isTagged = !!(window._wucBpTags && window._wucBpTags.get(bpKey));
          let val='', style='', bpStar='';
          if(!cell){
            // No submission at all for this inst+week
            val='<span style="color:var(--line);font-size:16px;line-height:1">·</span>';
            style='text-align:center';
          } else {
            const v = cell[field.key]||'';
            if(!v){
              val='<span style="color:var(--muted);font-style:italic;font-size:11px">—</span>';
              style='text-align:center';
            } else if (field.key === 'status') {
              // Render Status as a coloured chip rather than plain text
              val = renderStatusChip(v);
              style='text-align:center';
            } else {
              val=`<span style="font-size:11.5px;line-height:1.5;color:var(--ink)">${_wucRenderCellValue(v, searchQuery)}</span>`;
            }
            // Show star button on the first-field row only, and only when
            // the cell has at least SOMETHING submitted (a non-empty signature
            // across any of its tracked fields — otherwise tagging an empty
            // cell as "best practice" is meaningless).
            if (isFirstField) {
              const cellHasContent = !!(cell.minutes||cell.actionItems||cell.responsibility||cell.followUp||cell.status);
              if (cellHasContent || isTagged) {
                const onClick = `_wucToggleBpTag('${esc(colInst)}','${esc(colWeek)}','${esc(item.title).replace(/'/g, "\\'")}')`;
                bpStar = `<button onclick="${onClick}"
                  title="${isTagged?'Remove best-practice tag':'Mark as best practice'}"
                  style="position:absolute;top:4px;right:4px;background:none;border:none;
                         cursor:pointer;font-size:13px;line-height:1;padding:2px;font-family:inherit;
                         color:${isTagged?'#c8a24b':'#d1d5db'};
                         opacity:${isTagged?'1':'0'};transition:.15s"
                  onmouseenter="this.style.opacity='1';this.style.color='${isTagged?'#9a7a36':'#c8a24b'}'"
                  onmouseleave="this.style.opacity='${isTagged?'1':'0'}';this.style.color='${isTagged?'#c8a24b':'#d1d5db'}'">${isTagged?'★':'☆'}</button>`;
              }
            }
          }
          return `<td style="padding:6px 12px;border-left:1px solid var(--line-2);
                             vertical-align:middle;${style};background:#fff;position:relative;
                             ${isFirstField?'border-top:2px solid var(--line-2)':''}
                             ${isFirstField&&isTagged?'box-shadow:inset 0 0 0 2px #c8a24b66':''}
                             ${isLastField&&isLast?'border-bottom:3px solid #1a2332':''}"
                     onmouseenter="this.querySelectorAll('button').forEach(b=>{if(b.style.opacity==='0')b.style.opacity='0.7'})"
                     onmouseleave="this.querySelectorAll('button').forEach(b=>{if(b.dataset.tagged!=='1')b.style.opacity='0'})">
            ${bpStar}${val}
          </td>`;
        }).join('');

        return `<tr>${actCell}${labelCell}${dataCells}</tr>`;
      }).join('');
    }).join('');

    return secRow + itemRows;
  }).join('');

  // Legend
  const legend = r.columns.map((col,ci)=>{
    const color=C[window._wucInsts.indexOf(col.instCode)%C.length];
    const sun=_addDays(col.weekKey,6);
    return `<span style="display:inline-flex;align-items:center;gap:5px;
                         padding:3px 10px;border:1px solid ${color}44;
                         border-radius:20px;background:${color}0d;font-size:11px">
      <span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0"></span>
      <strong style="color:${color}">${esc(col.instCode)}</strong>
      <span style="color:var(--muted)">${fmtWeekRange(col.weekKey,sun)}</span>
    </span>`;
  }).join(' ');

  // Pre-compute count strings honouring the active filter
  const totalSecCount   = r.sections.length;
  const totalActCount   = r.sections.reduce((n,s)=>n+s.items.length,0);
  const visSecCount     = visibleSections.length;
  const visActCount     = visibleSections.reduce((n,s)=>n+s.items.length,0);
  const isFiltered      = filterMode !== 'all';
  const countText       = isFiltered
    ? `${visSecCount} of ${totalSecCount} section${totalSecCount!==1?'s':''} · ${visActCount} of ${totalActCount} activities`
    : `${totalSecCount} section${totalSecCount!==1?'s':''} · ${totalActCount} activities`;

  // Filter segmented control — wired to _wucChangeFilter()
  const _filterModes = [
    ['all',       'All',       'Show every activity item'],
    ['responded', 'Responded', 'Hide items where no institution submitted any content'],
    ['diverged',  'Differ',    'Show only items where institutions disagree (≥2 distinct entries)']
  ];
  const filterSeg = `
    <div role="tablist" aria-label="Activity filter"
         style="display:inline-flex;border:1.5px solid var(--line);border-radius:8px;overflow:hidden;flex-shrink:0">
      ${_filterModes.map(([m, lbl, tip], i)=>{
        const active = (m === filterMode);
        const isLast = (i === _filterModes.length - 1);
        return `<button onclick="_wucChangeFilter('${m}')" title="${esc(tip)}"
                       aria-pressed="${active}"
                       style="padding:6px 12px;border:none;cursor:pointer;font-family:inherit;
                              font-size:11.5px;font-weight:${active?'800':'600'};
                              background:${active?'#1a2332':'#fff'};
                              color:${active?'#fff':'var(--ink)'};
                              ${isLast?'':'border-right:1px solid var(--line-2);'}
                              transition:.15s">${esc(lbl)}</button>`;
      }).join('')}
    </div>`;

  // C5: search input — debounced re-render via _wucChangeSearch
  const searchBox = `
    <div style="position:relative;display:inline-flex;align-items:center;flex-shrink:0">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9ca3af"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
           style="position:absolute;left:9px;pointer-events:none">
        <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search" placeholder="Search cells…"
        value="${esc(searchQuery)}"
        oninput="_wucChangeSearch(this.value)"
        style="padding:6px 10px 6px 28px;border:1.5px solid var(--line);border-radius:8px;
               font-family:inherit;font-size:11.5px;outline:none;width:160px;
               background:#fff;color:var(--ink);transition:.15s"
        onfocus="this.style.borderColor='#1a2332'"
        onblur="this.style.borderColor='var(--line)'">
      ${searchQuery ? `<button onclick="_wucChangeSearch('');this.previousElementSibling.value=''"
        title="Clear search"
        style="position:absolute;right:6px;background:none;border:none;cursor:pointer;
               padding:2px;color:#9ca3af;line-height:1;font-family:inherit">×</button>` : ''}
    </div>`;

  window._wucLastResult=r;
  body.style.cssText='flex:1;overflow:auto;display:block;background:#f8f8f8;min-width:0';

  // Tier-5 / C7: cross-week mode — a single institution across multiple weeks.
  // Render a banner so the user sees "this is one institution's history",
  // not the usual side-by-side institution comparison.
  const isCrossWeek = r.mode === 'cross-week' && r.subjectInstitution;
  const crossWeekBanner = isCrossWeek
    ? `<div style="padding:10px 20px;background:linear-gradient(135deg,#fffbf0,#fff8e1);
                   border-bottom:1px solid #c8a24b44;display:flex;align-items:center;gap:10px;flex-shrink:0">
        <span style="background:#c8a24b;color:#fff;font-size:9px;font-weight:800;letter-spacing:.06em;
                     padding:3px 8px;border-radius:5px;text-transform:uppercase">Cross-week view</span>
        <span style="font-size:12px;color:var(--ink)">
          Showing <strong style="font-weight:700;color:var(--navy-ink)">${esc(r.subjectInstitution.name)}</strong>
          (<code style="background:rgba(26,35,50,.06);padding:1px 6px;border-radius:3px;font-size:11px">${esc(r.subjectInstitution.code)}</code>)
          across ${r.columns.length} week${r.columns.length===1?'':'s'}
        </span>
       </div>`
    : '';

  body.innerHTML=`
    ${crossWeekBanner}
    <!-- Info bar -->
    <div style="padding:14px 20px;border-bottom:1px solid var(--line);background:#fff;
                display:flex;align-items:center;
                justify-content:space-between;flex-wrap:wrap;gap:8px;flex-shrink:0">
      <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">${legend}</div>
      <div style="display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap">
        ${filterSeg}
        ${searchBox}
        <span style="font-size:11px;color:var(--muted)">${countText}</span>
        <button onclick="wucGeneratePdf()"
          style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
                 background:linear-gradient(135deg,#1a2332,#28375a);color:#fff;
                 border:none;border-radius:8px;font-size:12px;font-weight:700;
                 cursor:pointer;font-family:inherit;flex-shrink:0">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 1 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          Export PDF
        </button>
      </div>
    </div>

    ${visSecCount === 0 ? `<div style="padding:48px 20px;text-align:center;color:var(--muted)">
        <p style="font-size:14px;margin-bottom:8px">No activities match the current filter.</p>
        <p style="font-size:12px">Try the <em>All</em> or <em>Responded</em> filter to see more rows.</p>
      </div>` : `

    <!-- Field key -->
    <div style="padding:8px 20px;border-bottom:1px solid var(--line-2);background:var(--surface-2);
                display:flex;gap:16px;flex-wrap:wrap;flex-shrink:0">
      <span style="font-size:10px;color:var(--muted)">Field colour key:</span>
      ${FIELDS.map(f=>`<span style="display:inline-flex;align-items:center;gap:5px;font-size:10px">
        <span style="width:10px;height:10px;border-radius:3px;background:${f.bg};
                     border:1px solid ${f.labelColor}44;flex-shrink:0"></span>
        <span style="color:${f.labelColor};font-weight:700">${f.label}</span>
      </span>`).join('')}
      <span style="font-size:10px;color:var(--muted);margin-left:8px">
        <strong>·</strong> = no submission &nbsp; <em>—</em> = submitted but blank
        &nbsp;&nbsp;<span style="color:#c8a24b">📎</span> = attachment present
      </span>
    </div>

    <!-- Table -->
    <div>
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="background:linear-gradient(135deg,#1a2332,#212f45)">
            <th style="padding:12px 14px;text-align:left;font-size:11px;font-weight:700;
                       color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.06em;
                       white-space:nowrap;border-right:2px solid rgba(255,255,255,.1);
                       position:sticky;left:0;z-index:3;background:#1a2332;min-width:180px">Activity</th>
            <th style="padding:12px 10px;text-align:center;font-size:11px;font-weight:700;
                       color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.06em;
                       border-left:1px solid rgba(255,255,255,.1);white-space:nowrap;min-width:110px">Field</th>
            ${colHeaders}
          </tr>
        </thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`}`;
}


// ══════════════════════════════════════════════════════════════════
// WEEKLY UPDATES COMPARISON — PDF EXPORT
// ══════════════════════════════════════════════════════════════════
function wucGeneratePdf(){
  const r = window._wucLastResult;
  if(!r || !r.sections){ toast('No comparison data — generate first','err'); return; }

  const C=['#4f46e5','#c8a24b','#10b981','#f59e0b','#3b82f6','#8b5cf6','#ef4444','#06b6d4','#84cc16','#f97316'];
  const vmrfLogo = document.getElementById('vmrfMainLogo')?.src||'';
  const campus   = window._wucCampus||'';

  const he = t=>String(t==null?'':t)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  const fmtWkPdf = wk=>{
    const d=new Date(wk+'T00:00:00');
    if(isNaN(d)) return wk;
    const sun=new Date(d); sun.setDate(d.getDate()+6);
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})
      +' – '+sun.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  };

  // ── Column headers ────────────────────────────────────────────────────
  const colThs = r.columns.map((col,ci)=>{
    const color=C[window._wucInsts.indexOf(col.instCode)%C.length];
    return `<th style="padding:8px 10px;text-align:center;border-left:1px solid rgba(255,255,255,.15);
                       min-width:160px;vertical-align:bottom">
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
        <div style="display:flex;align-items:center;gap:4px">
          <div style="width:8px;height:8px;border-radius:50%;background:${he(color)}"></div>
          <span style="font-size:10pt;font-weight:800;color:${he(color)}">${he(col.instCode)}</span>
        </div>
        <div style="font-size:7.5pt;color:rgba(255,255,255,.55)">${he(fmtWkPdf(col.weekKey))}</div>
      </div>
    </th>`;
  }).join('');

  // ── Build tbody — 5 rows per activity (Minutes / Action / Resp / Follow-Up / Status) ──
  const FIELDS=[
    {key:'minutes',       label:'Minutes',        bg:'#f0f0ff',lc:'#4f46e5'},
    {key:'actionItems',   label:'Action Items',   bg:'#fffbf0',lc:'#b8860b'},
    {key:'responsibility',label:'Responsibility', bg:'#f0fff4',lc:'#15803d'},
    {key:'followUp',      label:'Follow-Up',      bg:'#eff6ff',lc:'#2563eb'},
    {key:'status',        label:'Status',         bg:'#fdf2f8',lc:'#be185d'}
  ];
  const FIELD_COUNT_PDF = FIELDS.length;
  const STATUS_COLORS_PDF = {
    'open':{bg:'#fef3c7',fg:'#92400e'}, 'in progress':{bg:'#dbeafe',fg:'#1e40af'},
    'ongoing':{bg:'#dbeafe',fg:'#1e40af'}, 'closed':{bg:'#dcfce7',fg:'#166534'},
    'completed':{bg:'#dcfce7',fg:'#166534'}, 'done':{bg:'#dcfce7',fg:'#166534'},
    'on hold':{bg:'#fee2e2',fg:'#991b1b'}, 'pending':{bg:'#fef3c7',fg:'#92400e'},
    'deferred':{bg:'#e5e7eb',fg:'#374151'}
  };
  const renderStatusChipPdf = (s)=>{
    const t=String(s||'').trim(); if(!t) return '';
    const c=STATUS_COLORS_PDF[t.toLowerCase()]||{bg:'#e5e7eb',fg:'#374151'};
    return `<span style="display:inline-block;padding:1px 7px;border-radius:9px;
                         background:${c.bg};color:${c.fg};font-size:8.5pt;
                         font-weight:700;letter-spacing:.02em;white-space:nowrap">${he(t)}</span>`;
  };

  // ── Honour the same filter the user has on screen — "what you see is what
  //   you export". Falls back to all sections if the helper isn't loaded.
  const _pdfSections = (typeof _wucCurrentSections === 'function')
    ? _wucCurrentSections(r)
    : r.sections;

  const tbody = _pdfSections.map(sec=>{
    const secRow=`<tr>
      <td colspan="${r.columns.length+2}"
          style="padding:7px 14px;background:linear-gradient(135deg,#1a2332,#28375a);
                 border-top:3px solid #1a2332;page-break-inside:avoid">
        ${sec.sectionNo?`<span style="background:rgba(255,255,255,.2);color:#fff;font-size:8.5pt;
                                     font-weight:800;padding:1px 7px;border-radius:4px;
                                     margin-right:8px">${he(sec.sectionNo)}</span>`:''}
        <span style="font-size:9pt;font-weight:700;color:#fff;text-transform:uppercase;
                     letter-spacing:.07em">${he(sec.sectionTitle)}</span>
      </td></tr>`;

    const itemRows=sec.items.map((item,ii)=>{
      const isLast=ii===sec.items.length-1;
      const anyAttachmentPdf = item.cells.some(c => c && c.hasAttachments);
      return FIELDS.map((field,fi)=>{
        const isLastField = fi===(FIELD_COUNT_PDF-1);
        const actCell=fi===0
          ?`<td rowspan="${FIELD_COUNT_PDF}" style="padding:8px 12px;font-size:9.5pt;font-weight:700;
                                   color:#1a2332;border-right:2px solid #e2ddd5;

            </td>`
          :'';
        const labelCell=`<td style="padding:5px 8px;font-size:7.5pt;font-weight:800;
                                    color:${he(field.lc)};text-transform:uppercase;letter-spacing:.08em;

        }).join('');
        return `<tr>${actCell}${labelCell}${dataCells}</tr>`;
      }).join('');

async function saveSub(){
  const id=window._editId; if(!id){toast('No submission selected','err');return;}
  const btn=document.getElementById('editSaveBtn');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try{
    const items=[];
    for(const sec of (window._editActivities||[])){
      for(const it of (sec.items||[])){
        if(!it._editKey) continue;
        const m=(document.querySelector(`[data-edit-key="${it._editKey}"][data-field="minutes"]`)?.value||'').trim();
        const a=(document.querySelector(`[data-edit-key="${it._editKey}"][data-field="actionItems"]`)?.value||'').trim();
        const r=(document.querySelector(`[data-edit-key="${it._editKey}"][data-field="responsibility"]`)?.value||'').trim();
        if(m||a||r) items.push({title:it.title,minutes:m,actionItems:a,responsibility:r,files:[]});
      }
    }
    if(!items.length){
      const e=document.getElementById('editErr');
      // validation removed — activity items are optional
      if(btn){btn.disabled=false;btn.textContent='Save Changes';}
      return;
    }
    const res=await call('ipmUpdateSubmission',state.token,id,{items,tasks:''});
    if(!res.ok){
      const e=document.getElementById('editErr');
      if(e) e.textContent=res.error||'Failed';
      if(btn){btn.disabled=false;btn.textContent='Save Changes';}
      return;
    }
    closeModal();
    toast('Submission updated successfully','ok');
    window._editId=null;
    loadMySubs(); loadHoiDashboard();
  }catch(e){
    const errEl=document.getElementById('editErr');
    if(errEl) errEl.textContent=e.message||'Failed';
    if(btn){btn.disabled=false;btn.textContent='Save Changes';}
  }
}

    if(!r||!r.ok) throw new Error((r&&r.error)||'Report data fetch failed');
    const inst=r.institution, subs=r.submissions, genAt=r.generatedAt;

/* ═══════════════════════════════════════════════════
   Custom dropdown controller — Campus & Institution
   ═══════════════════════════════════════════════════ */
(function(){
  function Cd(nativeId, wrapId, listId){
    var nat  = document.getElementById(nativeId);
    var wrap = document.getElementById(wrapId);
    if(!nat || !wrap) return;
    var btn   = wrap.querySelector('.cd-trigger');
    var valEl = wrap.querySelector('.cd-val');
    var panel = wrap.querySelector('.cd-panel');
    var list  = document.getElementById(listId);

    function syncList(){
      list.innerHTML = '';
      var opts = Array.from(nat.options).filter(function(o){ return o.value; });
      if(!opts.length){
        list.innerHTML = '<div class="cd-empty">No options available yet</div>';
        updateDisplay(); return;
      }
      opts.forEach(function(opt){
        var el = document.createElement('button');
        el.type = 'button';
        el.className = 'cd-item' + (opt.value === nat.value ? ' cd-sel' : '');
        el.dataset.value = opt.value;
        el.textContent = opt.textContent;
        el.addEventListener('click', function(){ pick(opt.value); });
        list.appendChild(el);
      });
      updateDisplay();
    }

    function updateDisplay(){
      var sel = Array.from(nat.options).find(function(o){ return o.value === nat.value; });
      if(sel && sel.value){
        valEl.textContent = sel.textContent;
        valEl.classList.remove('cd-ph');
      } else {
        valEl.textContent = nat.options[0] ? nat.options[0].textContent : '';
        valEl.classList.add('cd-ph');
      }
      list.querySelectorAll('.cd-item').forEach(function(el){
        el.classList.toggle('cd-sel', el.dataset.value === nat.value);
      });
    }

    function pick(val){
      nat.value = val;
      nat.dispatchEvent(new Event('change', { bubbles: true }));
      updateDisplay();
      close();
    }

    function open(){
      syncList();
      panel.style.display = 'block';
      wrap.classList.add('cd-open');
      btn.setAttribute('aria-expanded', 'true');
      setTimeout(function(){ document.addEventListener('click', outside); }, 0);
    }

    function close(){
      panel.style.display = 'none';
      wrap.classList.remove('cd-open');
      btn.setAttribute('aria-expanded', 'false');
      document.removeEventListener('click', outside);
    }

    function outside(e){
      if(!wrap.contains(e.target)) close();
    }

    btn.addEventListener('click', function(e){
      e.stopPropagation();
      wrap.classList.contains('cd-open') ? close() : open();
    });

    // Keyboard navigation
    btn.addEventListener('keydown', function(e){
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); wrap.classList.contains('cd-open') ? close() : open(); }
      if(e.key === 'Escape') close();
    });

    // Watch native for option additions (when JS populates the select)
    new MutationObserver(function(){ syncList(); }).observe(nat, { childList: true, subtree: true });

    // Track external value resets
    nat.addEventListener('change', updateDisplay);

    // Expose reset hook
    nat._cdReset = function(){ syncList(); updateDisplay(); };

    updateDisplay();
  }

  function init(){
    Cd('campus',      'campus-cd',      'campus-cd-list');
    Cd('institution', 'institution-cd', 'institution-cd-list');
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // Called from doLogout to refresh display after value reset
  window.cdReset = function(id){
    var el = document.getElementById(id);
    if(el && el._cdReset) el._cdReset();
  };
})();
